# Configuration for typos spell checker
# https://github.com/crate-ci/typos

[default]
extend-ignore-identifiers-re = [
    # Hex strings and base64 blobs
    "[A-Za-z0-9+/]{20,}",
]

[default.extend-words]
# Common Go short variable names flagged as false positives
pn  = "pn"
ba  = "ba"
ot  = "ot"
lik = "lik"
fo  = "fo"
ure = "ure"
# Harbor-specific identifiers
cfg          = "cfg"
ctx          = "ctx"
req          = "req"
resp         = "resp"
impl         = "impl"
registryctl  = "registryctl"
jobservice   = "jobservice"
# Container/OCI terminology
oci  = "oci"
oras = "oras"
# Public API field names - fixing would be a breaking API change
unknow    = "unknow"
unsupport = "unsupport"
parms     = "parms"
togglable = "togglable"
# Valid Go plural variable names (not typos - Go uses these as slice suffixes)
Datas    = "Datas"
sortings = "sortings"

[files]
extend-exclude = [
    # Non-English i18n translation files
    "src/portal/src/i18n/",

    # Upstream API spec (has known typos in field descriptions, fixing is a breaking change)
    "api/v2.0/swagger.yaml",

    # Upstream test suite
    "tests/",

    # Upstream files with company names, non-English brands
    "ADOPTERS.md",
    "CONTRIBUTORS.md",

    # Lock files and dependency hashes
    "go.sum",
    "src/go.mod",
    "bun.lock",
    "package-lock.json",

    # Build and vendor artifacts
    "vendor/",
    "node_modules/",
    "dist/",
    "bin/",

    # Keys and certs
    "*.pem",
    "*.crt",
    "*.key",

    # SQL migration files contain SQL aliases (fo = filter_objects, eto = event_type_objects)
    "make/migrations/",
]

[type.md]
extend-ignore-re = [
    # URLs
    "https?://[^\\s]+",
    # Code blocks
    "```[\\s\\S]*?```",
    # Inline code
    "`[^`]+`",
]
