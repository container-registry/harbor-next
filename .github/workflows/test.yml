name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Pure unit tests — no external services, full parallelism
  # --------------------------------------------------------------------------
  test-unit:
    name: Unit Tests (pure)
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)) && vars.RUNNER || 'ubuntu-latest' }}
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Restore Go build cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('src/**/*.go', 'src/go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure C toolchain for race detector
        run: command -v gcc >/dev/null || sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc

      - name: Generate API code
        run: task build:gen-apis

      - name: Run pure unit tests
        working-directory: src
        run: go test -race -count=1 -timeout=15m -cover ./...

  # --------------------------------------------------------------------------
  # DB-dependent unit tests — need PostgreSQL + Redis, run serially
  # --------------------------------------------------------------------------
  test-db:
    name: Unit Tests (DB)
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)) && vars.RUNNER || 'ubuntu-latest' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root123
          POSTGRES_DB: registry
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379/tcp
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRESQL_HOST: localhost
      POSTGRESQL_USR: postgres
      POSTGRESQL_PORT: ${{ job.services.postgres.ports[5432] }}
      POSTGRESQL_PWD: root123
      POSTGRESQL_DATABASE: registry
      POSTGRES_MIGRATION_SCRIPTS_PATH: ${{ github.workspace }}/make/migrations/postgresql
      UTTEST: "true"
      JOB_SERVICE_POOL_REDIS_URL: "redis://localhost:${{ job.services.redis.ports[6379] }}"
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Restore Go build cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('src/**/*.go', 'src/go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure C toolchain for race detector
        run: command -v gcc >/dev/null || sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc

      - name: Generate API code
        run: task build:gen-apis

      - name: Run DB unit tests
        working-directory: src
        run: go test -race -count=1 -timeout=15m -tags db -cover -p 1 -parallel 1 ./...
