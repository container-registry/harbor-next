name: Playwright Tests

on:
  pull_request:
    branches: [main, "release-[0-9]*.[0-9]*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "CLAUDE.md"

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: playwright-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BUN_VERSION: 1.2.13

jobs:
  e2e-playwright:
    name: Playwright E2E
    runs-on: ${{ (github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)) && vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "$GITHUB_PATH"

      - name: Install portal dependencies
        working-directory: src/portal
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Validate Playwright tests
        working-directory: src/portal
        run: bun x playwright test --list

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/portal/playwright-report/
          retention-days: 30
