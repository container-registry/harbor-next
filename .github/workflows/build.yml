name: Build

on:
  pull_request:
    branches: [main, "release-[0-9]*.[0-9]*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CLAUDE.md"
      # Covered by their own path-filtered workflows (chart-ci, compose-ci);
      # nothing in the image build consumes deploy/.
      - "deploy/chart/**"
      - "deploy/compose/**"
  push:
    branches: [main, "release-[0-9]*.[0-9]*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CLAUDE.md"
      - "deploy/chart/**"
      - "deploy/compose/**"

permissions:
  contents: read

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # arduino/setup-task (latest) still declares node20; opt in to the
  # 2026-06-16 node24 default early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Binaries
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)) && vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: src/go.mod
          go-sum-path: src/go.sum

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries (linux/amd64)
        run: PLATFORMS=linux/amd64 task build
