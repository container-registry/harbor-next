name: Build

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CLAUDE.md"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CLAUDE.md"

permissions:
  contents: read

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Binaries
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)) && vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/go.mod
          cache: false

      - name: Restore Go module cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-build-${{ hashFiles('src/go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-mod-${{ runner.os }}-build-${{ hashFiles('src/go.sum') }}-
            go-mod-${{ runner.os }}-

      - name: Restore Go build cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-build-${{ hashFiles('src/go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-build-${{ runner.os }}-build-${{ hashFiles('src/go.sum') }}-
            go-build-${{ runner.os }}-

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API code
        run: task build:gen-apis

      - name: Build binaries (linux/amd64)
        run: PLATFORMS=linux/amd64 task build
