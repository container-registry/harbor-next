name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release-[0-9]*.[0-9]*"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-release-ref:
    name: Validate Release Ref
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Allow only release refs
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" =~ ^release-[0-9]+\.[0-9]+$ ]]; then
            exit 0
          fi

          echo "::error::Release Please can only run on main or release-X.Y branches. Current ref: ${GITHUB_REF_NAME}"
          exit 1

  release-please:
    needs: [validate-release-ref]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
          config-file: ${{ github.ref_name == 'main' && 'release-please-config.json' || 'release-please-config-maintenance.json' }}
          manifest-file: .release-please-manifest.json

  create-maintenance-branch:
    name: Create Maintenance Branch
    needs: [release-please]
    if: >-
      ${{
        github.ref_name == 'main' &&
        needs.release-please.outputs.release_created == 'true' &&
        needs.release-please.outputs.patch == '0'
      }}
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      MAJOR: ${{ needs.release-please.outputs.major }}
      MINOR: ${{ needs.release-please.outputs.minor }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Create branch for patch releases
        run: |
          branch="release-${MAJOR}.${MINOR}"
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            echo "${branch} already exists"
            exit 0
          fi

          git fetch --depth=1 origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          sha=$(git rev-list -n 1 "${TAG_NAME}")
          git push origin "${sha}:refs/heads/${branch}"

  build:
    name: "${{ matrix.component }} (${{ matrix.platform }})"
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter]
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Prepare
        id: prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          if [ "${{ matrix.component }}" = "trivy-adapter" ]; then
            echo "image_name=trivy-adapter" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=harbor-${{ matrix.component }}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: container-registry
          repositories: 8gcr

      - name: Apply commercial patches
        env:
          PATCHES_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@github.com/container-registry/8gcr" \
            /tmp/patches-repo
          while IFS= read -r patch; do
            patch=$(echo "$patch" | sed 's/#.*//' | xargs)
            [ -z "$patch" ] && continue
            git apply --binary "/tmp/patches-repo/8gcr-ee/patches/$patch"
          done < /tmp/patches-repo/8gcr-ee/patches/series
          rm -rf /tmp/patches-repo

      - name: Load versions
        run: grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"

      - name: Setup Go
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: src/go.mod
          go-sum-path: src/go.sum

      - name: Install Task
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API code
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:gen-apis

      - name: Compile Go binary
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:binary:${{ matrix.component }}:${{ env.PLATFORM_PAIR }} GIT_COMMIT="${GITHUB_SHA:0:8}"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: env.BUILDX_HOST == ''

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: dockerfile/${{ matrix.component }}.dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            LPROBE_VERSION=${{ env.LPROBE_VERSION }}
            NGINX_VERSION=${{ env.NGINX_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            GO_VERSION=${{ env.GO_VERSION }}
            DISTRIBUTION_VERSION=${{ env.DISTRIBUTION_VERSION }}
            TRIVY_VERSION=${{ env.TRIVY_VERSION }}
            TRIVY_BASE_IMAGE_VERSION=${{ env.TRIVY_BASE_IMAGE_VERSION }}
            HARBOR_SCANNER_TRIVY_VERSION=${{ env.HARBOR_SCANNER_TRIVY_VERSION }}
          tags: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/${{ steps.prepare.outputs.image_name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.component }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: "Merge ${{ matrix.component }}"
    needs: [release-please, build]
    strategy:
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Prepare BuildKit
        id: prepare
        run: |
          if [ "${{ matrix.component }}" = "trivy-adapter" ]; then
            echo "image_name=trivy-adapter" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=harbor-${{ matrix.component }}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.component }}-*
          merge-multiple: true

      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/${{ steps.prepare.outputs.image_name }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG_NAME}" \
            $(printf "${IMAGE}@sha256:%s " *)

  sign:
    name: Sign and Release
    needs: [release-please, merge]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write
      id-token: write
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install envsubst
        run: command -v envsubst || (sudo apt-get update && sudo apt-get install -y gettext-base)

      - name: Install gh CLI
        uses: actions4gh/setup-gh@44a12005484c53be5bf51bebe8c985b4be8ba8de # v1.0.2
        with:
          gh-version: latest

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Sign images
        run: |
          for image in core jobservice registryctl exporter portal registry trivy-adapter; do
            image_name="harbor-${image}"
            if [ "${image}" = "trivy-adapter" ]; then
              image_name="trivy-adapter"
            fi

            cosign sign --yes \
              "${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/${image_name}:${TAG_NAME}"
          done

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: container-registry
          repositories: 8gcr

      - name: Collect commercial patch descriptions
        id: patches
        env:
          PATCHES_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@github.com/container-registry/8gcr" \
            /tmp/patches-repo
          if [ -f /tmp/patches-repo/8gcr-ee/patches/series ]; then
            while IFS= read -r patch; do
              patch=$(echo "$patch" | sed 's/#.*//' | xargs)
              [ -z "$patch" ] && continue
              node .github/scripts/format-commercial-patch.mjs "/tmp/patches-repo/8gcr-ee/patches/$patch" >> applied-patches.txt
            done < /tmp/patches-repo/8gcr-ee/patches/series
            echo "has_patches=true" >> "$GITHUB_OUTPUT"
          fi
          rm -rf /tmp/patches-repo

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}"
          IMAGES="core jobservice registryctl exporter portal registry trivy-adapter"
          GENERATED_NOTES="$(mktemp)"
          RELEASE_BODY="$(mktemp)"
          FORMATTED_BODY="$(mktemp)"

          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f "tag_name=${TAG_NAME}" \
            --jq .body > "${GENERATED_NOTES}"
          gh release view "${TAG_NAME}" --json body -q .body > "${RELEASE_BODY}"
          node .github/scripts/format-release-notes.mjs \
            "${RELEASE_BODY}" \
            "${GENERATED_NOTES}" \
            "${FORMATTED_BODY}"

          HIGHLIGHTS=""
          git fetch --tags --force
          PREV_TAG=$(git tag --merged HEAD --sort=-creatordate \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${TAG_NAME}$" \
            | head -n 1 || true)
          if [ -n "${PREV_TAG}" ]; then
            SINCE=$(gh release view "${PREV_TAG}" --json createdAt -q '.createdAt')
            SINCE_DATE="${SINCE%T*}"
            HIGHLIGHTS=$(gh pr list \
              --state merged \
              --base "${RELEASE_BRANCH}" \
              --search "merged:>=${SINCE_DATE}" \
              --json number,title,url,body \
              --limit 100 \
              --jq '
                [.[] | select(.body | test("(?m)^## Release Notes"))] |
                if length == 0 then ""
                else
                  "## Highlights\n\n" +
                  (map(
                    "### [#\(.number)](\(.url)) \(.title)\n" +
                    (.body |
                      gsub("(?s).*\n## Release Notes\n"; "") |
                      gsub("(?s)\n## .*"; "") |
                      gsub("<!--[\\s\\S]*?-->"; "") |
                      ltrimstr("\n") | rtrimstr("\n")
                    ) + "\n"
                  ) | join("\n"))
                end
              ')
          fi

          {
            if [ -f applied-patches.txt ] && [ -s applied-patches.txt ]; then
              echo "## Commercial Features"
              echo ""
              echo "This release includes the following commercial enhancements:"
              cat applied-patches.txt
              echo ""
            fi
            if [ -n "${HIGHLIGHTS}" ]; then
              printf '%s\n\n' "${HIGHLIGHTS}"
            fi
            echo "## Container Images"
            echo ""
            echo "Multi-arch images (\`linux/amd64\`, \`linux/arm64\`) signed with [cosign](https://github.com/sigstore/cosign)."
            echo ""
            echo "| Image | Reference |"
            echo "|-------|-----------|"
            for image in $IMAGES; do
              image_name="harbor-${image}"
              if [ "${image}" = "trivy-adapter" ]; then
                image_name="trivy-adapter"
              fi
              echo "| \`${image_name}\` | \`${REGISTRY}/${image_name}:${TAG_NAME}\` |"
            done
            echo ""
            echo "**Verify an image signature:**"
            echo "\`\`\`sh"
            echo "cosign verify \\"
            echo "  --certificate-identity \"https://github.com/${{ github.repository }}/.github/workflows/release-please.yml@refs/heads/${RELEASE_BRANCH}\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  ${REGISTRY}/harbor-core:${TAG_NAME}"
            echo "\`\`\`"
            echo ""
            echo "---"
            echo ""
            cat "${FORMATTED_BODY}"
          } | gh release edit "${TAG_NAME}" --notes-file -
