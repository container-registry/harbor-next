name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release-[0-9]*.[0-9]*"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-release-ref:
    name: Validate Release Ref
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Allow only release refs
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" =~ ^release-[0-9]+\.[0-9]+$ ]]; then
            exit 0
          fi

          echo "::error::Release Please can only run on main or release-X.Y branches. Current ref: ${GITHUB_REF_NAME}"
          exit 1

  release-please:
    needs: [validate-release-ref]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
          config-file: ${{ github.ref_name == 'main' && 'release-please-config.json' || 'release-please-config-maintenance.json' }}
          manifest-file: .release-please-manifest.json

      - name: Check out release PR branch
        if: ${{ github.ref_name == 'main' && steps.release.outputs.prs_created == 'true' && steps.release.outputs.release_created != 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}

      - name: Setup Node
        if: ${{ github.ref_name == 'main' && steps.release.outputs.prs_created == 'true' && steps.release.outputs.release_created != 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Advance main development version
        if: ${{ github.ref_name == 'main' && steps.release.outputs.prs_created == 'true' && steps.release.outputs.release_created != 'true' }}
        run: |
          release_version=$(node -e "const manifest = require('./.release-please-manifest.json'); const version = manifest['.']; if (!version) { throw new Error('missing root release version'); } console.log(version);")
          if [[ ! "${release_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Unsupported release version: ${release_version}"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          next_version="${major}.$((minor + 1)).0"
          printf '%s\n' "${next_version}" > VERSION

          if git diff --quiet -- VERSION; then
            echo "VERSION already targets ${next_version}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -s -m "chore: target next development version ${next_version}"
          git push

  create-maintenance-branch:
    name: Create Maintenance Branch
    needs: [release-please]
    if: >-
      ${{
        github.ref_name == 'main' &&
        needs.release-please.outputs.release_created == 'true' &&
        needs.release-please.outputs.patch == '0'
      }}
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      VERSION: ${{ needs.release-please.outputs.version }}
      MAJOR: ${{ needs.release-please.outputs.major }}
      MINOR: ${{ needs.release-please.outputs.minor }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create branch for patch releases
        run: |
          branch="release-${MAJOR}.${MINOR}"
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            echo "${branch} already exists"
            exit 0
          fi

          git fetch --depth=1 origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          sha=$(git rev-list -n 1 "${TAG_NAME}")
          git switch --detach "${sha}"

          printf '%s\n' "${VERSION}" > VERSION
          if git diff --quiet -- VERSION; then
            git push origin "${sha}:refs/heads/${branch}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -s -m "chore: initialize ${branch} version"
          git push origin "HEAD:refs/heads/${branch}"

  publish-images:
    name: Publish Release Images
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-images.yml
    with:
      checkout_ref: ${{ needs.release-please.outputs.tag_name }}
      image_tag: ${{ needs.release-please.outputs.tag_name }}
      version: ${{ needs.release-please.outputs.version }}
      artifact_prefix: release-${{ needs.release-please.outputs.tag_name }}
      registry_address: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      registry_project: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
    secrets: inherit

  update-release-notes:
    name: Update Release Notes
    needs: [release-please, publish-images]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install envsubst
        run: command -v envsubst || (sudo apt-get update && sudo apt-get install -y gettext-base)

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install gh CLI
        run: |
          case "$(uname -m)" in
            x86_64|amd64) arch="amd64" ;;
            aarch64|arm64) arch="arm64" ;;
            *) echo "Unsupported architecture for gh: $(uname -m)" >&2; exit 1 ;;
          esac

          version=$(awk -F= '$1 == "GH_CLI_VERSION" { print $2 }' versions.env)
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "GH_CLI_VERSION must be X.Y.Z" >&2
            exit 1
          fi

          archive="gh_${version}_linux_${arch}.tar.gz"
          tool_dir="${RUNNER_TEMP:-${PWD}/.tools}/gh-cli"
          mkdir -p "${tool_dir}/bin"
          curl -fsSL "https://github.com/cli/cli/releases/download/v${version}/${archive}" -o "${tool_dir}/${archive}"
          curl -fsSL "https://github.com/cli/cli/releases/download/v${version}/gh_${version}_checksums.txt" -o "${tool_dir}/gh_checksums.txt"
          (cd "${tool_dir}" && grep "  ${archive}$" gh_checksums.txt | sha256sum -c -)
          tar -xzf "${tool_dir}/${archive}" -C "${tool_dir}"
          install -m 0755 "${tool_dir}/gh_${version}_linux_${arch}/bin/gh" "${tool_dir}/bin/gh"
          echo "${tool_dir}/bin" >> "${GITHUB_PATH}"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: container-registry
          repositories: 8gcr

      - name: Collect commercial patch descriptions
        id: patches
        env:
          PATCHES_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@github.com/container-registry/8gcr" \
            /tmp/patches-repo
          if [ -f /tmp/patches-repo/8gcr-ee/patches/series ]; then
            while IFS= read -r patch; do
              patch=$(echo "$patch" | sed 's/#.*//' | xargs)
              [ -z "$patch" ] && continue
              node .github/scripts/format-commercial-patch.mjs "/tmp/patches-repo/8gcr-ee/patches/$patch" >> applied-patches.txt
            done < /tmp/patches-repo/8gcr-ee/patches/series
            echo "has_patches=true" >> "$GITHUB_OUTPUT"
          fi
          rm -rf /tmp/patches-repo

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}"
          IMAGES=(core jobservice registryctl exporter portal registry trivy-adapter)
          GENERATED_NOTES="$(mktemp)"
          RELEASE_BODY="$(mktemp)"
          FORMATTED_BODY="$(mktemp)"
          CONTRIBUTORS="$(mktemp)"

          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f "tag_name=${TAG_NAME}" \
            --jq .body > "${GENERATED_NOTES}"
          gh release view "${TAG_NAME}" --json body -q .body > "${RELEASE_BODY}"
          node .github/scripts/format-release-notes.mjs \
            "${RELEASE_BODY}" \
            "${GENERATED_NOTES}" \
            "${FORMATTED_BODY}" \
            "${CONTRIBUTORS}"

          {
            if [ -f applied-patches.txt ] && [ -s applied-patches.txt ]; then
              while IFS= read -r line; do
                echo "${line}"
                if [ "${line}" = "## What's Changed" ]; then
                  echo ""
                  echo "### Commercial Features"
                  echo ""
                  echo "This release includes the following commercial enhancements:"
                  echo ""
                  cat applied-patches.txt
                fi
              done < "${FORMATTED_BODY}"
            else
              cat "${FORMATTED_BODY}"
            fi
            echo ""
            echo "---"
            echo ""
            echo "## Container Images"
            echo ""
            echo "Multi-arch images (\`linux/amd64\`, \`linux/arm64\`) signed with [cosign](https://github.com/sigstore/cosign)."
            echo ""
            echo "| Image | Reference |"
            echo "|-------|-----------|"
            for image in "${IMAGES[@]}"; do
              image_name="harbor-${image}"
              if [ "${image}" = "trivy-adapter" ]; then
                image_name="trivy-adapter"
              fi
              echo "| \`${image_name}\` | \`${REGISTRY}/${image_name}:${TAG_NAME}\` |"
            done
            echo ""
            echo "**Verify an image signature:**"
            echo "\`\`\`sh"
            echo "cosign verify \\"
            echo "  --certificate-identity \"https://github.com/${{ github.repository }}/.github/workflows/publish-images.yml@refs/heads/${RELEASE_BRANCH}\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  ${REGISTRY}/harbor-core:${TAG_NAME}"
            echo "\`\`\`"
            if [ -s "${CONTRIBUTORS}" ]; then
              echo ""
              echo "---"
              echo ""
              cat "${CONTRIBUTORS}"
            fi
          } | gh release edit "${TAG_NAME}" --notes-file -
