name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: "${{ matrix.component }} (${{ matrix.platform }})"
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter, nginx]
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Apply enterprise patches
        env:
          PATCHES_TOKEN: ${{ secrets.REPO_READ_TOKEN_8GCR }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@github.com/container-registry/8gcr" \
            /tmp/patches-repo
          while IFS= read -r patch; do
            patch=$(echo "$patch" | sed 's/#.*//' | xargs)
            [ -z "$patch" ] && continue
            git apply --binary "/tmp/patches-repo/8gcr-ee/patches/$patch"
          done < /tmp/patches-repo/8gcr-ee/patches/series
          rm -rf /tmp/patches-repo

      - name: Load versions
        run: grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"

      - name: Setup Go
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Install Task
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API code
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:gen-apis

      - name: Compile Go binary
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:binary:${{ matrix.component }}:${{ env.PLATFORM_PAIR }} GIT_COMMIT="${GITHUB_SHA:0:8}"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        if: env.BUILDX_HOST == ''

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: dockerfile/${{ matrix.component }}.dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            LPROBE_VERSION=${{ env.LPROBE_VERSION }}
            NGINX_VERSION=${{ env.NGINX_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            GO_VERSION=${{ env.GO_VERSION }}
            DISTRIBUTION_VERSION=${{ env.DISTRIBUTION_VERSION }}
            TRIVY_VERSION=${{ env.TRIVY_VERSION }}
            TRIVY_BASE_IMAGE_VERSION=${{ env.TRIVY_BASE_IMAGE_VERSION }}
            HARBOR_SCANNER_TRIVY_VERSION=${{ env.HARBOR_SCANNER_TRIVY_VERSION }}
          tags: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/harbor-${{ matrix.component }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digest-${{ matrix.component }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: "Merge ${{ matrix.component }}"
    needs: [release-please, build]
    strategy:
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter, nginx]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Prepare BuildKit
        run: |
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.component }}-*
          merge-multiple: true

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/harbor-${{ matrix.component }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            $(printf "${IMAGE}@sha256:%s " *)

  sign:
    name: Sign and Release
    needs: [release-please, merge]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write
      id-token: write
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Sign images
        run: |
          for image in core jobservice registryctl exporter portal registry trivy-adapter nginx; do
            cosign sign --yes \
              "${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/harbor-${image}:${VERSION}"
          done

      - name: Collect enterprise patch descriptions
        id: patches
        env:
          PATCHES_TOKEN: ${{ secrets.REPO_READ_TOKEN_8GCR }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@github.com/container-registry/8gcr" \
            /tmp/patches-repo
          if [ -f /tmp/patches-repo/8gcr-ee/patches/series ]; then
            while IFS= read -r patch; do
              patch=$(echo "$patch" | sed 's/#.*//' | xargs)
              [ -z "$patch" ] && continue
              desc=$(head -1 "/tmp/patches-repo/8gcr-ee/patches/$patch" | sed 's/^Subject: //')
              echo "- ${desc}" >> applied-patches.txt
            done < /tmp/patches-repo/8gcr-ee/patches/series
            echo "has_patches=true" >> "$GITHUB_OUTPUT"
          fi
          rm -rf /tmp/patches-repo

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}"
          IMAGES="core jobservice registryctl exporter portal registry trivy-adapter nginx"

          HIGHLIGHTS=""
          PREV_TAG=$(gh release list --limit 20 --json tagName \
            --jq "[.[] | .tagName | select(. != \"${TAG_NAME}\")] | .[0]")
          if [ -n "${PREV_TAG}" ]; then
            SINCE=$(gh release view "${PREV_TAG}" --json createdAt -q '.createdAt')
            SINCE_DATE="${SINCE%T*}"
            HIGHLIGHTS=$(gh pr list \
              --state merged \
              --base main \
              --search "merged:>=${SINCE_DATE}" \
              --json number,title,url,body \
              --limit 100 \
              --jq '
                [.[] | select(.body | test("(?m)^## Release Notes"))] |
                if length == 0 then ""
                else
                  "## Highlights\n\n" +
                  (map(
                    "### [#\(.number)](\(.url)) \(.title)\n" +
                    (.body |
                      gsub("(?s).*\n## Release Notes\n"; "") |
                      gsub("(?s)\n## .*"; "") |
                      gsub("<!--[\\s\\S]*?-->"; "") |
                      ltrimstr("\n") | rtrimstr("\n")
                    ) + "\n"
                  ) | join("\n"))
                end
              ')
          fi

          {
            if [ -n "${HIGHLIGHTS}" ]; then
              printf '%s\n\n' "${HIGHLIGHTS}"
            fi
            if [ -f applied-patches.txt ] && [ -s applied-patches.txt ]; then
              echo "## Enterprise Features"
              echo ""
              echo "This release includes the following enterprise enhancements:"
              cat applied-patches.txt
              echo ""
            fi
            echo "## Container Images"
            echo ""
            echo "Multi-arch images (\`linux/amd64\`, \`linux/arm64\`) signed with [cosign](https://github.com/sigstore/cosign)."
            echo ""
            echo "| Image | Reference |"
            echo "|-------|-----------|"
            for image in $IMAGES; do
              echo "| \`harbor-${image}\` | \`${REGISTRY}/harbor-${image}:${VERSION}\` |"
            done
            echo ""
            echo "**Verify an image signature:**"
            echo "\`\`\`sh"
            echo "cosign verify \\"
            echo "  --certificate-identity \"https://github.com/${{ github.repository }}/.github/workflows/release-please.yml@refs/heads/main\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  ${REGISTRY}/harbor-core:${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "---"
            echo ""
            gh release view "${TAG_NAME}" --json body -q .body
          } | gh release edit "${TAG_NAME}" --notes-file -
