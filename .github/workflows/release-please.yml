name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  artifacts:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: container-registry
          repositories: 8gcr

      - name: Setup Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: src/go.mod
          go-sum-path: src/go.sum

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        if: env.BUILDX_HOST == ''

      - name: Apply enterprise patches
        env:
          PATCHES_TOKEN: ${{ steps.app-token.outputs.token }}
        run: task release:patches:apply

      - name: Log in to registry
        run: task release:docker:login

      - name: Prepare BuildKit
        run: task release:buildx:setup

      - name: Generate API code
        run: task build:gen-apis

      - name: Build and push image digests
        run: task release:build-images VERSION="${VERSION}" GIT_COMMIT="${GITHUB_SHA:0:8}"

      - name: Create manifest lists
        run: task release:merge-images VERSION="${VERSION}"

      - name: Sign images
        run: task release:sign-images VERSION="${VERSION}"

      - name: Generate SBOMs and attest
        run: task release:attest-sboms VERSION="${VERSION}"

  notes:
    needs: [release-please, artifacts]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: container-registry
          repositories: 8gcr

      - name: Collect enterprise patch descriptions
        env:
          PATCHES_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -eu
          rm -rf tmp/patches-repo applied-patches.txt
          mkdir -p tmp
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@github.com/container-registry/8gcr" \
            tmp/patches-repo
          if [ -f tmp/patches-repo/8gcr-ee/patches/series ]; then
            while IFS= read -r line; do
              patch="${line%%#*}"
              patch="$(printf '%s' "$patch" | xargs)"
              [ -z "$patch" ] && continue
              IFS= read -r desc < "tmp/patches-repo/8gcr-ee/patches/$patch"
              echo "- ${desc#Subject: }" >> applied-patches.txt
            done < tmp/patches-repo/8gcr-ee/patches/series
          fi
          rm -rf tmp/patches-repo

      - name: Update release notes
        run: |
          set -eu
          REGISTRY="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}"
          IMAGES="core jobservice registryctl exporter portal registry trivy-adapter nginx"

          HIGHLIGHTS=""
          PREV_TAG=$(gh release list --limit 20 --json tagName \
            --jq "[.[] | .tagName | select(. != \"${TAG_NAME}\")] | .[0] // \"\"")
          if [ -n "${PREV_TAG}" ]; then
            SINCE=$(gh release view "${PREV_TAG}" --json createdAt -q '.createdAt')
            SINCE_DATE="${SINCE%T*}"
            HIGHLIGHTS=$(gh pr list \
              --state merged \
              --base main \
              --search "merged:>=${SINCE_DATE}" \
              --json number,title,url,body \
              --limit 100 \
              --jq '
                [.[] | select(.body | test("(?m)^## Release Notes"))] |
                if length == 0 then ""
                else
                  "## Highlights\n\n" +
                  (map(
                    "### [#\(.number)](\(.url)) \(.title)\n" +
                    (.body |
                      gsub("(?s).*\n## Release Notes\n"; "") |
                      gsub("(?s)\n## .*"; "") |
                      gsub("<!--[\\s\\S]*?-->"; "") |
                      ltrimstr("\n") | rtrimstr("\n")
                    ) + "\n"
                  ) | join("\n"))
                end
              ')
          fi

          {
            if [ -n "${HIGHLIGHTS}" ]; then
              printf '%s\n\n' "${HIGHLIGHTS}"
            fi
            if [ -s applied-patches.txt ]; then
              echo "## Enterprise Features"
              echo ""
              echo "This release includes the following enterprise enhancements:"
              cat applied-patches.txt
              echo ""
            fi
            echo "## Container Images"
            echo ""
            echo "Multi-arch images (\`linux/amd64\`, \`linux/arm64\`) signed with [cosign](https://github.com/sigstore/cosign) and published with SPDX SBOM attestations."
            echo ""
            echo "| Image | Reference |"
            echo "|-------|-----------|"
            for image in $IMAGES; do
              echo "| \`harbor-${image}\` | \`${REGISTRY}/harbor-${image}:${VERSION}\` |"
            done
            echo ""
            echo "**Verify an image signature:**"
            echo "\`\`\`sh"
            echo 'cosign verify \'
            echo '  --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release-please.yml@refs/heads/main" \'
            echo '  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \'
            echo "  ${REGISTRY}/harbor-core:${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "**Verify an SBOM attestation:**"
            echo "\`\`\`sh"
            echo 'cosign verify-attestation \'
            echo '  --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release-please.yml@refs/heads/main" \'
            echo '  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \'
            echo '  --type spdxjson \'
            echo "  ${REGISTRY}/harbor-core:${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "---"
            echo ""
            gh release view "${TAG_NAME}" --json body -q .body
          } | gh release edit "${TAG_NAME}" --notes-file -
