name: Release Ready

on:
  workflow_dispatch:
  push:
    branches: [main, "release-[0-9]*.[0-9]*"]

permissions:
  contents: read

concurrency:
  group: release-ready-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-ready:
    name: Validate Release Patches
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install StGit
        run: |
          if command -v stg >/dev/null 2>&1; then
            stg --version
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y stgit
            else
              apt-get update
              apt-get install -y stgit
            fi
          elif command -v brew >/dev/null 2>&1; then
            brew install stgit
          else
            echo "::error::StGit is required but no supported package manager was found."
            exit 1
          fi

          stg --version

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: container-registry
          repositories: 8gcr

      - name: Verify release patches apply
        env:
          PATCHES_TOKEN: ${{ steps.app-token.outputs.token }}
        run: task --taskfile taskfile/release-ready.yml check
