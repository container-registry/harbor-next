name: Compose CI

on:
  pull_request:
    paths:
      - "deploy/compose/**"
      - "taskfile/compose.yml"
      - "versions.env"
      - ".github/workflows/compose-ci.yml"

permissions:
  contents: read

jobs:
  compose-check:
    name: Compose env drift
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load versions
        run: grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ys (YAMLScript)
        run: |
          arch="$(uname -m)"
          case "${arch}" in
            x86_64) asset_arch="x64" ;;
            aarch64|arm64) asset_arch="aarch64" ;;
            *) echo "unsupported arch: ${arch}" >&2; exit 1 ;;
          esac
          mkdir -p "${RUNNER_TEMP}/ys"
          curl -fsSL "https://github.com/yaml/yamlscript/releases/download/${YS_VERSION}/ys-${YS_VERSION}-linux-${asset_arch}.tar.xz" \
            -o "${RUNNER_TEMP}/ys.tar.xz"
          python3 -c "import lzma, shutil; shutil.copyfileobj(lzma.open('${RUNNER_TEMP}/ys.tar.xz'), open('${RUNNER_TEMP}/ys.tar', 'wb'))"
          tar -xf "${RUNNER_TEMP}/ys.tar" -C "${RUNNER_TEMP}/ys" --strip-components=1
          echo "${RUNNER_TEMP}/ys" >> "$GITHUB_PATH"

      - name: Compose env drift check
        run: task compose:check-env

      - name: Compose config renders
        # docker compose config validates interpolation + schema without
        # starting anything; .env.example doubles as a syntax fixture.
        run: |
          # Self-hosted runners may have a docker CLI without the compose
          # plugin — install it pinned, no sudo.
          if ! docker compose version >/dev/null 2>&1; then
            arch="$(uname -m)"
            case "${arch}" in
              x86_64) asset_arch="x86_64" ;;
              aarch64|arm64) asset_arch="aarch64" ;;
              *) echo "unsupported arch: ${arch}" >&2; exit 1 ;;
            esac
            mkdir -p "$HOME/.docker/cli-plugins"
            curl -fsSL -o "$HOME/.docker/cli-plugins/docker-compose" \
              "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-${asset_arch}"
            chmod +x "$HOME/.docker/cli-plugins/docker-compose"
          fi
          cd deploy/compose
          cp .env.example .env
          docker compose config --quiet
