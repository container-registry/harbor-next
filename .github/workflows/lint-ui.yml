name: UI Lint

on:
  pull_request:
    branches: [main, "release-[0-9]*.[0-9]*"]
    paths:
      - "src/portal/**"
      - "Taskfile.yml"
      - "versions.env"
      - "taskfile/test.yml"
      - ".github/workflows/lint-ui.yml"
  push:
    branches: [main, "release-[0-9]*.[0-9]*"]
    paths:
      - "src/portal/**"
      - "Taskfile.yml"
      - "versions.env"
      - "taskfile/test.yml"
      - ".github/workflows/lint-ui.yml"

permissions:
  contents: read

concurrency:
  group: ui-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # arduino/setup-task (latest) still declares node20; opt in to the
  # 2026-06-16 node24 default early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: UI Lint
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)) && vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load versions
        run: grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
          no-cache: true

      - name: Install UI dependencies
        working-directory: src/portal
        run: bun install --frozen-lockfile

      - name: Run UI lint
        run: task lint:ui
