name: Chart CI

on:
  pull_request:
    paths:
      - "deploy/chart/**"
      - "taskfile/helm.yml"
      - "versions.env"
      - ".github/workflows/chart-ci.yml"

permissions:
  contents: read

env:
  # arduino/setup-task v2.0.0 (latest) still declares node20, which is
  # deprecated and becomes node24-by-default on 2026-06-16. Opt in early
  # so the forced switch can't surprise us.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  chart-quality:
    name: Chart Quality Gate
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load versions
        # Helm homes: self-hosted runner images may ship a root-owned
        # ~/.cache; keep all helm state in the always-writable temp.
        run: |
          grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"
          {
            echo "HELM_CACHE_HOME=${RUNNER_TEMP}/helm/cache"
            echo "HELM_CONFIG_HOME=${RUNNER_TEMP}/helm/config"
            echo "HELM_DATA_HOME=${RUNNER_TEMP}/helm/data"
          } >> "$GITHUB_ENV"

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install helm-unittest plugin
        # --verify=false: Helm 4 verifies plugin provenance by default;
        # git-sourced plugins don't ship one.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version "${HELM_UNITTEST_VERSION}" --verify=false

      - name: Install helm-docs
        # No sudo: self-hosted runners may not have it.
        run: |
          arch="$(uname -m)"
          case "${arch}" in
            x86_64) asset_arch="x86_64" ;;
            aarch64|arm64) asset_arch="arm64" ;;
            *) echo "unsupported arch: ${arch}" >&2; exit 1 ;;
          esac
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_${asset_arch}.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}/bin" helm-docs
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

      - name: Install ys (YAMLScript, for migration golden tests)
        run: |
          arch="$(uname -m)"
          case "${arch}" in
            x86_64) asset_arch="x64" ;;
            aarch64|arm64) asset_arch="aarch64" ;;
            *) echo "unsupported arch: ${arch}" >&2; exit 1 ;;
          esac
          mkdir -p "${RUNNER_TEMP}/ys"
          curl -fsSL "https://github.com/yaml/yamlscript/releases/download/${YS_VERSION}/ys-${YS_VERSION}-linux-${asset_arch}.tar.xz" \
            -o "${RUNNER_TEMP}/ys.tar.xz"
          # Self-hosted runners may lack the xz binary; python stdlib lzma
          # decompresses without it.
          python3 -c "import lzma, shutil; shutil.copyfileobj(lzma.open('${RUNNER_TEMP}/ys.tar.xz'), open('${RUNNER_TEMP}/ys.tar', 'wb'))"
          tar -xf "${RUNNER_TEMP}/ys.tar" -C "${RUNNER_TEMP}/ys" --strip-components=1
          echo "${RUNNER_TEMP}/ys" >> "$GITHUB_PATH"

      # helm lint + ct lint + kube-linter + ah lint (Artifact Hub metadata)
      - name: Lint
        run: task helm:lint

      - name: Render templates
        run: task helm:helm-template

      - name: Unit tests
        run: task helm:unittest

      # Byte-identical double render of the pinned GitOps values —
      # guards against generated secret material leaking past the
      # autoGenSecrets pinning surface (Argo CD churn).
      - name: GitOps determinism
        run: task helm:gitops-determinism

      - name: Render examples
        run: task helm:examples

      - name: README in sync (helm-docs)
        run: task helm:helm-docs

      - name: Migration golden tests
        run: task helm:migrate:test

      - name: Trivy config scan
        run: task helm:trivy-chart
