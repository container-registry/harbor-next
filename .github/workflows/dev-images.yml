name: Publish Dev Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CLAUDE.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
  IMAGE_REGISTRY_PROJECT: 8gcr

jobs:
  build:
    name: "${{ matrix.component }} (${{ matrix.platform }})"
    strategy:
      fail-fast: false
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter]
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Prepare
        id: prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          echo "DEV_TAG=main-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          if [ "${{ matrix.component }}" = "trivy-adapter" ]; then
            echo "IMAGE_NAME=trivy-adapter" >> "$GITHUB_ENV"
            echo "image_name=trivy-adapter" >> "$GITHUB_OUTPUT"
          else
            echo "IMAGE_NAME=harbor-${{ matrix.component }}" >> "$GITHUB_ENV"
            echo "image_name=harbor-${{ matrix.component }}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load versions
        run: grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"

      - name: Setup Go
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: src/go.mod
          go-sum-path: src/go.sum

      - name: Install Task
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API code
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:gen-apis

      - name: Compile Go binary
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:binary:${{ matrix.component }}:${{ env.PLATFORM_PAIR }} GIT_COMMIT="${GITHUB_SHA:0:8}"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        if: env.BUILDX_HOST == ''

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: dockerfile/${{ matrix.component }}.dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            LPROBE_VERSION=${{ env.LPROBE_VERSION }}
            NGINX_VERSION=${{ env.NGINX_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            GO_VERSION=${{ env.GO_VERSION }}
            DISTRIBUTION_VERSION=${{ env.DISTRIBUTION_VERSION }}
            TRIVY_VERSION=${{ env.TRIVY_VERSION }}
            TRIVY_BASE_IMAGE_VERSION=${{ env.TRIVY_BASE_IMAGE_VERSION }}
            HARBOR_SCANNER_TRIVY_VERSION=${{ env.HARBOR_SCANNER_TRIVY_VERSION }}
          tags: ${{ env.REGISTRY_ADDRESS }}/${{ env.IMAGE_REGISTRY_PROJECT }}/${{ steps.prepare.outputs.image_name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dev-digest-${{ matrix.component }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: "Publish ${{ matrix.component }} tags"
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Prepare
        id: prepare
        run: |
          echo "DEV_TAG=main-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          if [ "${{ matrix.component }}" = "trivy-adapter" ]; then
            echo "IMAGE_NAME=trivy-adapter" >> "$GITHUB_ENV"
            echo "image_name=trivy-adapter" >> "$GITHUB_OUTPUT"
          else
            echo "IMAGE_NAME=harbor-${{ matrix.component }}" >> "$GITHUB_ENV"
            echo "image_name=harbor-${{ matrix.component }}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: dev-digest-${{ matrix.component }}-*
          merge-multiple: true

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY_ADDRESS }}/${{ env.IMAGE_REGISTRY_PROJECT }}/${{ steps.prepare.outputs.image_name }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            -t "${IMAGE}:${DEV_TAG}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

  sign:
    name: Sign dev images
    needs: [merge]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare
        run: |
          echo "DEV_TAG=main-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: src/go.mod
          go-sum-path: src/go.sum

      - name: Install crane
        run: go install github.com/google/go-containerregistry/cmd/crane@v0.20.3

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Sign image manifests
        run: |
          for image in core jobservice registryctl exporter portal registry trivy-adapter; do
            image_name="harbor-${image}"
            if [ "${image}" = "trivy-adapter" ]; then
              image_name="trivy-adapter"
            fi
            ref="${REGISTRY_ADDRESS}/${IMAGE_REGISTRY_PROJECT}/${image_name}:${DEV_TAG}"
            digest="$(crane digest "${ref}")"
            image_ref="${REGISTRY_ADDRESS}/${IMAGE_REGISTRY_PROJECT}/${image_name}@${digest}"

            cosign sign --yes "${image_ref}"
          done
