name: PR Preview Images

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CLAUDE.md"

permissions:
  contents: read

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
  REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
  PREVIEW_TAG: pr-${{ github.event.pull_request.number }}

jobs:
  build:
    name: "${{ matrix.component }} (${{ matrix.platform }})"
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    strategy:
      fail-fast: false
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter]
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          # Surface pod env var for GitHub Actions expressions
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load versions
        run: grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"

      - name: Setup Go
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: src/go.mod
          go-sum-path: src/go.sum

      - name: Install Task
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API code
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:gen-apis

      - name: Compile Go binary
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter","registry","trivy-adapter"]'), matrix.component) }}
        run: task build:binary:${{ matrix.component }}:${{ env.PLATFORM_PAIR }} GIT_COMMIT="${GITHUB_SHA:0:8}"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        if: env.BUILDX_HOST == ''

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: dockerfile/${{ matrix.component }}.dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            LPROBE_VERSION=${{ env.LPROBE_VERSION }}
            NGINX_VERSION=${{ env.NGINX_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            GO_VERSION=${{ env.GO_VERSION }}
            DISTRIBUTION_VERSION=${{ env.DISTRIBUTION_VERSION }}
            TRIVY_VERSION=${{ env.TRIVY_VERSION }}
            TRIVY_BASE_IMAGE_VERSION=${{ env.TRIVY_BASE_IMAGE_VERSION }}
            HARBOR_SCANNER_TRIVY_VERSION=${{ env.HARBOR_SCANNER_TRIVY_VERSION }}
          tags: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/harbor-${{ matrix.component }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-digest-${{ matrix.component }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: "Merge ${{ matrix.component }}"
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Prepare BuildKit
        run: |
          if [ -n "$BUILDX_HOST" ]; then
            echo "BUILDX_HOST=$BUILDX_HOST" >> "$GITHUB_ENV"
          fi

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: preview-digest-${{ matrix.component }}-*
          merge-multiple: true

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: ${{ env.BUILDX_HOST && 'remote' || '' }}
          endpoint: ${{ env.BUILDX_HOST }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/harbor-${{ matrix.component }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            -t "${IMAGE}:${PREVIEW_TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)

  sign:
    name: Sign preview images
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    needs: [merge]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: src/go.mod
          go-sum-path: src/go.sum

      - name: Install crane
        run: go install github.com/google/go-containerregistry/cmd/crane@v0.20.3

      - name: Install envsubst
        run: command -v envsubst || (sudo apt-get update && sudo apt-get install -y gettext-base)

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Sign images, generate SBOMs, and attest
        run: |
          for image in core jobservice registryctl exporter portal registry trivy-adapter; do
            ref="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/harbor-${image}:${PREVIEW_TAG}"
            digest="$(crane digest "${ref}")"
            image_ref="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/harbor-${image}@${digest}"

            cosign sign --yes "${image_ref}"

            syft "${image_ref}" -o spdx-json > "sbom-${image}.spdx.json"

            cosign attest --yes --predicate "sbom-${image}.spdx.json" --type spdxjson "${image_ref}"
          done

  pr-comment:
    name: Comment preview image refs
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    needs: [sign]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Install gh CLI
        run: |
          if ! command -v gh &>/dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi

      - name: Create or update PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MARKER: "<!-- harbor-next-pr-preview -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const registryAddress = process.env.REGISTRY_ADDRESS;
            const registryProject = process.env.REGISTRY_PROJECT;
            const previewTag = process.env.PREVIEW_TAG;
            const repository = process.env.GITHUB_REPOSITORY;
            const issueNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const body = `${marker}
            Preview images for this PR are available in \`${registryAddress}/${registryProject}\` with tag \`${previewTag}\`.

            - \`${registryAddress}/${registryProject}/harbor-core:${previewTag}\`
            - \`${registryAddress}/${registryProject}/harbor-jobservice:${previewTag}\`
            - \`${registryAddress}/${registryProject}/harbor-registryctl:${previewTag}\`
            - \`${registryAddress}/${registryProject}/harbor-exporter:${previewTag}\`
            - \`${registryAddress}/${registryProject}/harbor-portal:${previewTag}\`
            - \`${registryAddress}/${registryProject}/harbor-registry:${previewTag}\`
            - \`${registryAddress}/${registryProject}/harbor-trivy-adapter:${previewTag}\`

            Verify a preview image:

            \`\`\`
            cosign verify \\
              --certificate-identity-regexp="https://github.com/${repository}/.github/workflows/pr-ci.yml@.*" \\
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \\
              ${registryAddress}/${registryProject}/harbor-core:${previewTag}
            \`\`\`

            Verify SBOM attestation:

            \`\`\`
            cosign verify-attestation \\
              --certificate-identity-regexp="https://github.com/${repository}/.github/workflows/pr-ci.yml@.*" \\
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \\
              --type spdxjson \\
              ${registryAddress}/${registryProject}/harbor-core:${previewTag}
            \`\`\``;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existingComment = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.startsWith(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });
