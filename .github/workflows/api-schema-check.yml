name: API Schema Check

on:
  pull_request:
    paths:
      - 'api/v2.0/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: delimit-ai/delimit-action@76ee061569f77e9d391f9b35eb8e88b375ad8bac # v1
        with:
          spec: api/v2.0/swagger.yaml
