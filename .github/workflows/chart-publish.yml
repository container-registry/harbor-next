name: Publish Chart

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/chart/**'
      - 'deploy/flux/**'
      - '.github/workflows/chart-publish.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-dev:
    name: Publish dev (main)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: 8gcr-dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute version
        id: version
        run: |
          BASE_VERSION=$(awk '/^version:/ {print $2}' deploy/chart/Chart.yaml)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="${BASE_VERSION}-main.${SHORT_SHA}"
          # Floating tag MUST be SemVer-parseable: helm-controller v1.3+
          # rejects plain "latest" via "failed parsing artifact revision".
          # "<base>-dev" satisfies SemVer (pre-release identifier "dev").
          FLOATING_TAG="${BASE_VERSION}-dev"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "floating_tag=${FLOATING_TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing dev version: ${VERSION} (also tagged ${FLOATING_TAG})"

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.4

      - name: Setup ORAS
        uses: oras-project/setup-oras@5c0b487ce3fe0ce3ab0d034e63669e426e294e4d # v1.2.3
        with:
          version: 1.2.0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@8d5f40dca5aa5d3c0fc3414457dda15a0ac92fa4 # v2.4.0
        with:
          version: 2.4.0

      - name: Registry login
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "${REGISTRY_PASSWORD}" | helm registry login "${REGISTRY_ADDRESS}" \
            --username "${{ vars.REGISTRY_USERNAME }}" --password-stdin
          echo "${REGISTRY_PASSWORD}" | oras login "${REGISTRY_ADDRESS}" \
            --username "${{ vars.REGISTRY_USERNAME }}" --password-stdin

      - name: Update chart dependencies
        run: helm dependency update deploy/chart

      - name: Package chart at floating version
        # Chart.yaml.version must equal the OCI tag the OCIRepository points at
        # (helm-controller v1.3+ enforces revision == chart.metadata.version).
        # Package with the floating SemVer ("<base>-dev") so the OCI tag and
        # Chart.yaml agree.
        env:
          FLOATING_TAG: ${{ steps.version.outputs.floating_tag }}
        run: |
          mkdir -p dist
          helm package deploy/chart \
            --destination dist \
            --version "${FLOATING_TAG}" \
            --app-version "${FLOATING_TAG}"

      - name: Push chart at floating tag
        env:
          FLOATING_TAG: ${{ steps.version.outputs.floating_tag }}
        run: |
          helm push "dist/harbor-next-${FLOATING_TAG}.tgz" \
            "oci://${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/chart"

      - name: Add immutable per-commit tag on chart
        # The per-push tag (3.0.0-main.<sha7>) is a stable audit-trail
        # reference. The OCIRepository tracks the floating tag; this immutable
        # tag lets us roll back / pin to a specific commit when needed.
        env:
          VERSION: ${{ steps.version.outputs.version }}
          FLOATING_TAG: ${{ steps.version.outputs.floating_tag }}
        run: |
          oras tag \
            "${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/chart/harbor-next:${FLOATING_TAG}" \
            "${VERSION}"

      - name: Push Flux deploy bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          flux push artifact \
            "oci://${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/deploy:${VERSION}" \
            --path=./deploy/flux/8gcr-dev \
            --source="${{ github.server_url }}/${{ github.repository }}" \
            --revision="${GITHUB_REF_NAME}@sha1:${GITHUB_SHA}"

      - name: Move latest tag on deploy bundle
        # Bundle artifacts are consumed by Flux's kustomize-controller, which
        # does NOT impose a SemVer constraint on the revision (unlike
        # helm-controller). Plain "latest" is fine here.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          oras tag \
            "${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/deploy:${VERSION}" \
            latest

  publish-release:
    name: Publish release
    if: github.event_name == 'release'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Compute version
        id: version
        run: |
          # Strip leading 'v' from tag (e.g. v3.0.1 -> 3.0.1)
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing release version: ${VERSION}"

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.4

      - name: Setup ORAS
        uses: oras-project/setup-oras@5c0b487ce3fe0ce3ab0d034e63669e426e294e4d # v1.2.3
        with:
          version: 1.2.0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@8d5f40dca5aa5d3c0fc3414457dda15a0ac92fa4 # v2.4.0
        with:
          version: 2.4.0

      - name: Registry login
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "${REGISTRY_PASSWORD}" | helm registry login "${REGISTRY_ADDRESS}" \
            --username "${{ vars.REGISTRY_USERNAME }}" --password-stdin
          echo "${REGISTRY_PASSWORD}" | oras login "${REGISTRY_ADDRESS}" \
            --username "${{ vars.REGISTRY_USERNAME }}" --password-stdin

      - name: Update chart dependencies
        run: helm dependency update deploy/chart

      - name: Package chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          helm package deploy/chart \
            --destination dist \
            --version "${VERSION}" \
            --app-version "${VERSION}"

      - name: Push chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm push "dist/harbor-next-${VERSION}.tgz" \
            "oci://${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/chart"

      - name: Push Flux deploy bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          flux push artifact \
            "oci://${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/deploy:${VERSION}" \
            --path=./deploy/flux/8gcr-dev \
            --source="${{ github.server_url }}/${{ github.repository }}" \
            --revision="${{ github.event.release.tag_name }}@sha1:${{ github.sha }}"
