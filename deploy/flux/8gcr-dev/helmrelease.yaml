apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: 8gcr-dev-main
spec:
  interval: 10m
  releaseName: harbor
  chartRef:
    kind: OCIRepository
    name: harbor-next-chart
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    externalURL: https://8gcr.container-registry.dev
    logLevel: info
    image:
      pullPolicy: Always
    imagePullSecrets:
      - name: harbor-8gcr-dev-pull

    # Admin password provisioned by secrets.sops.yaml in this bundle.
    existingSecretAdminPassword: harbor-admin
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

    expose:
      clusterIP: { enabled: false }
      nodePort: { enabled: false }
      loadBalancer: { enabled: false }
      route: { enabled: false }

    ingress:
      enabled: true
      className: nginx
      autoGenCert: false
      core: 8gcr.container-registry.dev
      hosts:
        - host: 8gcr.container-registry.dev
      tls:
        - secretName: harbor-tls
          hosts:
            - 8gcr.container-registry.dev
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod

    # ---- Database ----
    # Both CNPG bootstrap (extraManifests below) and Harbor's runtime DB client
    # read the SAME Secret/harbor-db-password. CNPG requires basic-auth type
    # (keys: username, password); Harbor's chart reads .password via
    # existingSecretKey. One secret, one source of truth — no drift between
    # bootstrap and runtime.
    database:
      host: harbor-db-rw.8gcr-dev-main.svc.cluster.local
      port: 5432
      username: harbor
      database: registry
      sslmode: disable
      existingSecret: harbor-db-password
      existingSecretKey: password

    # ---- Valkey (in-chart, default standalone) ----
    valkey:
      enabled: true
      architecture: standalone
      auth:
        enabled: false

    # ---- Component image pins (continuous deploy via 8gcr-dev/:latest) ----
    # The dev image pipeline rewrites __IMAGE_REVISION__ before publishing the
    # Flux bundle. That pod-template annotation forces a rollout after the
    # pipeline moves the component :latest tags, and imagePullPolicy: Always
    # makes the restarted pods pull the new digest.
    core:
      podAnnotations:
        deploy.8gears.io/image-revision: "__IMAGE_REVISION__"
      image:
        repository: 8gears.container-registry.com/8gcr-dev/harbor-core
        tag: latest
      replicas: 1

    jobservice:
      podAnnotations:
        deploy.8gears.io/image-revision: "__IMAGE_REVISION__"
      image:
        repository: 8gears.container-registry.com/8gcr-dev/harbor-jobservice
        tag: latest
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 1Gi

    registry:
      podAnnotations:
        deploy.8gears.io/image-revision: "__IMAGE_REVISION__"
      image:
        repository: 8gears.container-registry.com/8gcr-dev/harbor-registry
        tag: latest
      controller:
        image:
          repository: 8gears.container-registry.com/8gcr-dev/harbor-registryctl
          tag: latest
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 10Gi

    portal:
      podAnnotations:
        deploy.8gears.io/image-revision: "__IMAGE_REVISION__"
      image:
        repository: 8gears.container-registry.com/8gcr-dev/harbor-portal
        tag: latest
      replicas: 1

    exporter:
      enabled: true
      podAnnotations:
        deploy.8gears.io/image-revision: "__IMAGE_REVISION__"
      image:
        repository: 8gears.container-registry.com/8gcr-dev/harbor-exporter
        tag: latest
      replicas: 1

    trivy:
      enabled: true
      podAnnotations:
        deploy.8gears.io/image-revision: "__IMAGE_REVISION__"
      image:
        repository: 8gears.container-registry.com/8gcr-dev/harbor-trivy-adapter
        tag: latest
      replicas: 1

    # ---- CNPG Postgres provisioned via the chart's extraManifests escape hatch ----
    # The harbor-db-password Secret it references is provisioned out-of-band
    # (SOPS-encrypted in k8s/apps); must contain keys: username, password.
    extraManifests:
      - apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: harbor-db
        spec:
          imageName: ghcr.io/cloudnative-pg/postgresql:17
          instances: 1
          storage:
            size: 5Gi
          bootstrap:
            initdb:
              database: registry
              owner: harbor
              secret:
                name: harbor-db-password
