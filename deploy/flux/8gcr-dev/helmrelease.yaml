apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: 8gcr-dev-main
spec:
  interval: 10m
  releaseName: harbor
  chartRef:
    kind: OCIRepository
    name: harbor-next-chart
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    externalURL: https://8gcr.container-registry.dev
    logLevel: info
    image:
      pullPolicy: Always
    imagePullSecrets:
      - name: harbor-system-pull
    # Admin password provisioned by secrets.sops.yaml in this bundle.
    existingSecretAdminPassword: harbor-admin
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
    expose:
      clusterIP: {enabled: false}
      nodePort: {enabled: false}
      loadBalancer: {enabled: false}
      route: {enabled: false}
    ingress:
      enabled: true
      className: nginx
      autoGenCert: false
      core: 8gcr.container-registry.dev
      hosts:
        - host: 8gcr.container-registry.dev
      tls:
        - secretName: harbor-tls
          hosts:
            - 8gcr.container-registry.dev
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
    # ---- Database ----
    # Both CNPG bootstrap (extraManifests below) and Harbor's runtime DB client
    # read the SAME Secret/harbor-db-password. CNPG requires basic-auth type
    # (keys: username, password); Harbor's chart reads .password via
    # existingSecretKey. One secret, one source of truth — no drift between
    # bootstrap and runtime.
    database:
      host: harbor-db-rw.8gcr-dev-main.svc.cluster.local
      port: 5432
      username: harbor
      database: registry
      sslmode: disable
      existingSecret: harbor-db-password
      existingSecretKey: password
    # ---- Valkey (in-chart, default standalone) ----
    valkey:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
    # ---- Component image pins (continuous deploy via 8gcr/:latest) ----
    # Flux image automation follows each mutable latest tag by digest and
    # rewrites these pod-template annotations in this branch. The branch push
    # then publishes the bundle to ops/hz-hopper/8gcr-rolling, Flux applies the
    # changed HelmRelease, and Kubernetes restarts pods with imagePullPolicy:
    # Always so they pull the new digest behind latest.
    core:
      podAnnotations:
        deploy.8gears.io/image-revision: "sha256:74f34a1f318a5ef71f0878318b9110455e63aa52a4f38d038187770f08c08b1d" # {"$imagepolicy": "flux-system:harbor-core:digest"}
      image:
        repository: 8gears.container-registry.com/8gcr/harbor-core
        tag: latest
      replicas: 1
    jobservice:
      podAnnotations:
        deploy.8gears.io/image-revision: "sha256:034cd8d6fb73d8a968148e94e8834ba18620e24a6fa0eb2b4956519f656a6a18" # {"$imagepolicy": "flux-system:harbor-jobservice:digest"}
      image:
        repository: 8gears.container-registry.com/8gcr/harbor-jobservice
        tag: latest
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 1Gi
    registry:
      podAnnotations:
        deploy.8gears.io/image-revision: "sha256:32dfe0ba7a1d2a9ab51093c768d8d0fabeb2cb6d8738fdb25e0822f51ab6e6a7" # {"$imagepolicy": "flux-system:harbor-registry:digest"}
        deploy.8gears.io/registryctl-image-revision: "sha256:0c522a7cf3a8eee61db53cf0593f30da2e4a43b177e9dc4628c9ca1acf5da0a8" # {"$imagepolicy": "flux-system:harbor-registryctl:digest"}
      image:
        repository: 8gears.container-registry.com/8gcr/harbor-registry
        tag: latest
      controller:
        image:
          repository: 8gears.container-registry.com/8gcr/harbor-registryctl
          tag: latest
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 10Gi
    portal:
      podAnnotations:
        deploy.8gears.io/image-revision: "sha256:9c982f8ae12a319223b62737a05924344f14fce2867559a07a2f4c59c702c4e4" # {"$imagepolicy": "flux-system:harbor-portal:digest"}
      image:
        repository: 8gears.container-registry.com/8gcr/harbor-portal
        tag: latest
      replicas: 1
    exporter:
      enabled: true
      podAnnotations:
        deploy.8gears.io/image-revision: "sha256:129356f2ca46d75c873efa7d884887de26fab9893544f0fe141d5be070db9982" # {"$imagepolicy": "flux-system:harbor-exporter:digest"}
      image:
        repository: 8gears.container-registry.com/8gcr/harbor-exporter
        tag: latest
      replicas: 1
    trivy:
      enabled: true
      podAnnotations:
        deploy.8gears.io/image-revision: "sha256:7115b080360119dbaaf234424ef0b043a001629bfa9fe09d3e5fbe827ebf9aa8" # {"$imagepolicy": "flux-system:trivy-adapter:digest"}
      image:
        repository: 8gears.container-registry.com/8gcr/trivy-adapter
        tag: latest
      replicas: 1
    # ---- CNPG Postgres provisioned via the chart's extraManifests escape hatch ----
    # The harbor-db-password Secret it references is provisioned out-of-band
    # (SOPS-encrypted in k8s/apps); must contain keys: username, password.
    extraManifests:
      - apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: harbor-db
        spec:
          imageName: ghcr.io/cloudnative-pg/postgresql:17
          instances: 1
          storage:
            size: 5Gi
          bootstrap:
            initdb:
              database: registry
              owner: harbor
              secret:
                name: harbor-db-password
