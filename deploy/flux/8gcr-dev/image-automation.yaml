  imageRepositoryRef:
    name: harbor-registry
  filterTags:
    pattern: ^latest$
  policy:
    alphabetical: {}
  digestReflectionPolicy: Always
  interval: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: harbor-registryctl
  namespace: flux-system
