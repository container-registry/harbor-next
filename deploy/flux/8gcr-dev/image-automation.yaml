---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: harbor-trivy-adapter
  namespace: flux-system
spec:
  image: 8gears.container-registry.com/8gcr/harbor-trivy-adapter
  interval: 1m
  provider: generic
  secretRef:
