---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: harbor-core
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: harbor-core
  filterTags:
    pattern: ^latest$
  policy:
    alphabetical: {}
  digestReflectionPolicy: Always
  interval: 1m
---
