apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: harbor-next-rolling
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/container-registry/harbor-next.git
  ref:
    branch: 8gcr-rolling
  secretRef:
    name: flux-git-auth
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: harbor-core
  namespace: flux-system
spec:
  image: 8gears.container-registry.com/8gcr/harbor-core
  interval: 1m
  provider: generic
  secretRef:
    name: harbor-system-pull
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: harbor-jobservice
  namespace: flux-system
spec:
