apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: harbor-next-bootc
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/container-registry/harbor-next.git
  ref:
    branch: bootc
  secretRef:
    name: flux-git-auth
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: bootc-harbor-core
  namespace: flux-system
spec:
  image: 8gears.container-registry.com/8gcr-dev/harbor-core-bootc
  interval: 1m
  provider: generic
  secretRef:
    name: harbor-bootc-pull
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: bootc-harbor-jobservice
  namespace: flux-system
spec:
  image: 8gears.container-registry.com/8gcr-dev/harbor-jobservice-bootc
  interval: 1m
  provider: generic
  secretRef:
    name: harbor-bootc-pull
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: bootc-harbor-registry
  namespace: flux-system
spec:
  image: 8gears.container-registry.com/8gcr-dev/harbor-registry-bootc
  interval: 1m
  provider: generic
  secretRef:
    name: harbor-bootc-pull
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: bootc-harbor-registryctl
  namespace: flux-system
spec:
  image: 8gears.container-registry.com/8gcr-dev/harbor-registryctl-bootc
