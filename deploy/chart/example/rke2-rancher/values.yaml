# Harbor Helm Chart - RKE2/Rancher Values
# Usage: helm install harbor . -n harbor -f example/rke2-rancher/values.yaml

# External URL for Harbor
externalURL: "https://harbor.example.com"

# REQUIRED: set a strong password (min 8 chars) or use
# existingSecretAdminPassword for production.
harborAdminPassword: "CHANGE_ME_NOW"

# Ingress configuration for nginx ingress controller
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "5"
  core: harbor.example.com
  hosts:
    - host: harbor.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: harbor-tls
      hosts:
        - harbor.example.com

# TLS configuration - auto-generate certs
tls:
  enabled: true
  certSource: auto

# Database configuration - use existing PostgreSQL in my-db namespace.
# Prefer `database.existingSecret` for production; the inline password
# below is a placeholder for the example only.
database:
  host: postgresql.my-db.svc.cluster.local
  port: 5432
  username: postgres
  password: "CHANGE_ME"  # REQUIRED: set a strong password or use existingSecret
  database: registry
  sslmode: disable

# Use internal Valkey (Redis-compatible)
valkey:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi

# Trivy scanner
trivy:
  enabled: false

# Metrics
metrics:
  enabled: false

# Component configurations
core:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

jobservice:
  replicas: 1
  config:
    worker_pool:
      workers: 4
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

registry:
  replicas: 1
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

portal:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

exporter:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
