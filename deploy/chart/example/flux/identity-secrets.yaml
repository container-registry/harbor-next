# Harbor's identity secrets, owned by you instead of generated by the
# chart. With these pinned (and autoGenSecrets=false in the HelmRelease)
# every render is byte-identical: no perpetual drift, no secret rotation
# on sync, no surprise pod rollouts.
#
# DO NOT commit this file with real values in plaintext. Encrypt it with
# SOPS (https://fluxcd.io/flux/guides/mozilla-sops/) or replace it with
# ExternalSecrets / SealedSecrets pointing at your secret store.
#
# Generate values:
#   secret / REGISTRY_HTTP_SECRET / JOBSERVICE_SECRET (16 chars):
#       openssl rand -hex 8
#   CSRF_KEY (32 chars):
#       openssl rand -hex 16
#   secretKey (encryption key, exactly 16 chars):
#       openssl rand -hex 8
#   REGISTRY_HTPASSWD (must match REGISTRY_CREDENTIAL_PASSWORD):
#       docker run --rm --entrypoint htpasswd httpd:2 -nbB harbor_registry_user '<password>'
#   token certificate (10y, PKCS#1 key for Harbor's token signer):
#       openssl genrsa -traditional -out tls.key 4096
#       openssl req -x509 -new -key tls.key -out tls.crt -days 3650 -subj "/CN=harbor-token-ca"
apiVersion: v1
kind: Secret
metadata:
  name: harbor-admin
  namespace: harbor
stringData:
  HARBOR_ADMIN_PASSWORD: CHANGE_ME_ADMIN_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-encryption
  namespace: harbor
stringData:
  # Exactly 16 characters. Encrypts credentials stored in the database —
  # losing it orphans stored registry/scanner credentials.
  secretKey: CHANGE_ME_16CHARS
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-core-identity
  namespace: harbor
stringData:
  secret: CHANGE_ME_16CHARS
  CSRF_KEY: CHANGE_ME_32_CHARACTERS_EXACTLY_
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-jobservice-identity
  namespace: harbor
stringData:
  JOBSERVICE_SECRET: CHANGE_ME_16CHARS
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-identity
  namespace: harbor
stringData:
  REGISTRY_HTTP_SECRET: CHANGE_ME_16CHARS
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-credentials
  namespace: harbor
stringData:
  # Plaintext password core/jobservice use against the registry, and the
  # MATCHING htpasswd line the registry validates it against.
  REGISTRY_CREDENTIAL_PASSWORD: CHANGE_ME_PASSWORD
  REGISTRY_HTPASSWD: "harbor_registry_user:CHANGE_ME_BCRYPT_HASH"
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-database
  namespace: harbor
stringData:
  POSTGRESQL_PASSWORD: CHANGE_ME_DB_PASSWORD
---
# Token-service signing key/cert. Alternatively let cert-manager manage
# it: create a Certificate with secretName harbor-token-cert and
# commonName harbor-token-ca, and drop this Secret.
apiVersion: v1
kind: Secret
metadata:
  name: harbor-token-cert
  namespace: harbor
stringData:
  tls.key: |
    -----BEGIN RSA PRIVATE KEY-----
    CHANGE_ME
    -----END RSA PRIVATE KEY-----
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    CHANGE_ME
    -----END CERTIFICATE-----
