apiVersion: v2
name: harbor-next
description: A modern, production-ready Helm chart for Harbor Next container registry
type: application
version: 3.0.0
appVersion: "v2.14.1"
kubeVersion: ">=1.28.0-0"

home: https://github.com/container-registry/harbor-next
icon: https://raw.githubusercontent.com/goharbor/website/main/static/img/logos/harbor-icon-color.png
sources:
  - https://github.com/container-registry/harbor

keywords:
  - docker
  - registry
  - harbor
  - harbor-next
  - container
  - oci

maintainers:
  - name: Harbor Next Authors
    url: https://github.com/container-registry

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: integration-delivery

dependencies:
  - name: valkey
    version: "0.9.2"
    repository: "https://valkey.io/valkey-helm/"
    condition: valkey.enabled
