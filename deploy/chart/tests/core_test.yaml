suite: core component tests
templates:
  - templates/core.deployment.yaml
  - templates/core.service.yaml
  - templates/core.configmap.yaml
  - templates/core.secret.yaml
  - templates/serviceaccounts.yaml
tests:
  - it: should create core deployment with default values
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-harbor-next-core
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: core

  - it: should use custom replica count
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set correct image
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.image.repository: goharbor/harbor-core
      core.image.tag: "2.10.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: goharbor/harbor-core:2.10.0

  - it: should create core service
    template: templates/core.service.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[1].port
          value: 8001

  - it: should create core configmap with external URL
    template: templates/core.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data.EXT_ENDPOINT
          value: "https://harbor.example.com"

  - it: should create core secret with admin password
    template: templates/core.secret.yaml
    documentIndex: 0
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: "MySecretPassword"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.HARBOR_ADMIN_PASSWORD
          value: "TXlTZWNyZXRQYXNzd29yZA=="

  - it: should create service account when enabled
    template: templates/serviceaccounts.yaml
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not create core service account when disabled
    template: templates/serviceaccounts.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 4

  - it: should apply pod annotations
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: should apply node selector
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should apply tolerations
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: node-role.kubernetes.io/control-plane

  - it: should apply resource limits
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  # ============================================================================
  # SECRET_KEY env + secret-key volume resolution
  # Regression guards for d631d09aa (Fix #4) and ba7cfeeac (Fix #18).
  # The encryption key has three sourcing paths:
  #   (a) generated `*-core` Secret, key `SECRET_KEY` / `secretKey` (default)
  #   (b) `core.existingSecret` + `core.existingSecretKey` (BYO core secret)
  #   (c) `existingSecretSecretKey` + `existingSecretSecretKeyKey` (BYO key Secret)
  # Path (c) used to strip SECRET_KEY/secretKey from the generated Secret
  # without redirecting the env or volume — pods crash-looped looking
  # for a key that didn't exist. All three must now resolve to a Secret
  # + key that actually contains the value.
  # ============================================================================

  - it: should mount SECRET_KEY from generated Secret by default
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-harbor-next-core
                key: SECRET_KEY
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret-key
            secret:
              secretName: RELEASE-NAME-harbor-next-core
              items:
                - key: secretKey
                  path: key

  - it: should mount SECRET_KEY from core.existingSecret with custom key
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.existingSecret: my-core
      core.existingSecretKey: customCoreKey
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CORE_SECRET
            valueFrom:
              secretKeyRef:
                name: my-core
                key: customCoreKey
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret-key
            secret:
              secretName: my-core
              items:
                - key: customCoreKey
                  path: key

  - it: should mount SECRET_KEY from existingSecretSecretKey with custom key
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      existingSecretSecretKey: my-enc
      existingSecretSecretKeyKey: customEncKey
    asserts:
      # SECRET_KEY env routes to the BYO encryption Secret, not the core Secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: my-enc
                key: customEncKey
      # Volume mount targets the same BYO Secret + key
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret-key
            secret:
              secretName: my-enc
              items:
                - key: customEncKey
                  path: key

  - it: should strip SECRET_KEY/secretKey from generated Secret when existingSecretSecretKey is set
    template: templates/core.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      existingSecretSecretKey: my-enc
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    asserts:
      - notExists:
          path: data.SECRET_KEY
      - notExists:
          path: data.secretKey

  - it: should render matching SECRET_KEY and secretKey in the generated Secret
    # 89e59a324 (Fix #8) pre-computes the key once so both data fields
    # hold the same value. Two `include` calls would otherwise return
    # different randAlphaNum results.
    template: templates/core.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      secretKey: "sixteenkeychars1"  # schema requires exactly 16 chars
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    asserts:
      - equal:
          path: data.SECRET_KEY
          value: "c2l4dGVlbmtleWNoYXJzMQ=="  # base64('sixteenkeychars1')
      - equal:
          path: data.secretKey
          value: "c2l4dGVlbmtleWNoYXJzMQ=="
