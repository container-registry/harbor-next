# All tests assert chart-computed output for known inputs. Pure Helm
# pass-through tests (replicas, podAnnotations, nodeSelector, etc.)
# were removed — they only proved `--set` works, not that the chart
# does anything with the value. Full-render regression coverage for
# the core component lives in snapshots_test.yaml.
suite: core component tests
templates:
  - templates/core.deployment.yaml
  - templates/core.service.yaml
  - templates/core.configmap.yaml
  - templates/core.secret.yaml
  - templates/serviceaccounts.yaml
tests:
  # Pins: image string is composed by chart from image.registry + image.repository + image.tag.
  - it: should compose image from registry + repository + tag
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.image.registry: example.com
      core.image.repository: myproj/harbor-core
      core.image.tag: "2.10.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/myproj/harbor-core:2.10.0

  # Pins: ConfigMap EXT_ENDPOINT is interpolated from .Values.externalURL.
  - it: should render EXT_ENDPOINT from externalURL
    template: templates/core.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - equal:
          path: data.EXT_ENDPOINT
          value: "https://harbor.example.com"

  # Pins: HARBOR_ADMIN_PASSWORD in the Secret is base64-encoded from the raw input.
  - it: should base64-encode harborAdminPassword into the Secret
    template: templates/core.secret.yaml
    documentIndex: 0
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: "MySecretPassword"
    asserts:
      - equal:
          path: data.HARBOR_ADMIN_PASSWORD
          value: "TXlTZWNyZXRQYXNzd29yZA=="

  # ============================================================================
  # SECRET_KEY env + secret-key volume resolution
  # Regression guards for d631d09aa (Fix #4) and ba7cfeeac (Fix #18).
  # The encryption key has three sourcing paths:
  #   (a) generated `*-core` Secret, key `SECRET_KEY` / `secretKey` (default)
  #   (b) `core.existingSecret` + `core.existingSecretKey` (BYO core secret)
  #   (c) `existingSecretSecretKey` + `existingSecretSecretKeyKey` (BYO key Secret)
  # Path (c) used to strip SECRET_KEY/secretKey from the generated Secret
  # without redirecting the env or volume — pods crash-looped looking
  # for a key that didn't exist. All three must now resolve to a Secret
  # + key that actually contains the value.
  # ============================================================================

  - it: should mount SECRET_KEY from generated Secret by default
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-harbor-next-core
                key: SECRET_KEY
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret-key
            secret:
              secretName: RELEASE-NAME-harbor-next-core
              items:
                - key: secretKey
                  path: key

  - it: should mount SECRET_KEY from core.existingSecret with custom key
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.existingSecret: my-core
      core.existingSecretKey: customCoreKey
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CORE_SECRET
            valueFrom:
              secretKeyRef:
                name: my-core
                key: customCoreKey
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret-key
            secret:
              secretName: my-core
              items:
                - key: customCoreKey
                  path: key

  - it: should mount SECRET_KEY from existingSecretSecretKey with custom key
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      existingSecretSecretKey: my-enc
      existingSecretSecretKeyKey: customEncKey
    asserts:
      # SECRET_KEY env routes to the BYO encryption Secret, not the core Secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: my-enc
                key: customEncKey
      # Volume mount targets the same BYO Secret + key
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret-key
            secret:
              secretName: my-enc
              items:
                - key: customEncKey
                  path: key

  - it: should strip SECRET_KEY/secretKey from generated Secret when existingSecretSecretKey is set
    template: templates/core.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      existingSecretSecretKey: my-enc
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    asserts:
      - notExists:
          path: data.SECRET_KEY
      - notExists:
          path: data.secretKey

  - it: should render matching SECRET_KEY and secretKey in the generated Secret
    # 89e59a324 (Fix #8) pre-computes the key once so both data fields
    # hold the same value. Two `include` calls would otherwise return
    # different randAlphaNum results.
    template: templates/core.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      secretKey: "sixteenkeychars1"  # schema requires exactly 16 chars
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    asserts:
      - equal:
          path: data.SECRET_KEY
          value: "c2l4dGVlbmtleWNoYXJzMQ=="  # base64('sixteenkeychars1')
      - equal:
          path: data.secretKey
          value: "c2l4dGVlbmtleWNoYXJzMQ=="

  # ============================================================================
  # Pinned-secret env wiring (GitOps existingSecret paths)
  # ============================================================================
  # Pins: envFrom must stay on the generated Secret even when
  # core.existingSecret is set — it carries CSRF_KEY,
  # REGISTRY_CREDENTIAL_PASSWORD, trace password and free-form
  # `core.secret` keys. Pinned keys override per-key via explicit env.
  - it: should keep envFrom on the generated Secret when core.existingSecret is set
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.existingSecret: core-id
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: RELEASE-NAME-harbor-next-core
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CORE_SECRET
            valueFrom:
              secretKeyRef:
                name: core-id
                key: secret

  # Pins: existingXsrfSecret must reach the pod as explicit CSRF_KEY env
  # (it suppresses CSRF_KEY in the generated Secret).
  - it: should wire CSRF_KEY env from existingXsrfSecret
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.existingXsrfSecret: xsrf-secret
      core.existingXsrfSecretKey: MY_CSRF
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CSRF_KEY
            valueFrom:
              secretKeyRef:
                name: xsrf-secret
                key: MY_CSRF

  # Pins: registry.credentials.existingSecret must reach core as explicit
  # REGISTRY_CREDENTIAL_PASSWORD env (suppressed in the generated Secret).
  - it: should wire REGISTRY_CREDENTIAL_PASSWORD env from credentials.existingSecret
    template: templates/core.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      registry.credentials.existingSecret: reg-creds
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REGISTRY_CREDENTIAL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: reg-creds
                key: REGISTRY_CREDENTIAL_PASSWORD
