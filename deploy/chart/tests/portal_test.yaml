suite: portal component tests
# All tests assert chart-computed output for known inputs (image
# composition, container port naming, volumeMount order, configmap key
# presence). Pure Helm pass-through tests (replicas, podAnnotations,
# nodeSelector, tolerations, affinity, securityContext, deploymentStrategy,
# priorityClassName, revisionHistoryLimit, initContainers, extraEnv) were
# removed — they only proved `--set` works, not that the chart does
# anything with the value. Full-render regression coverage for portal
# lives in snapshots_test.yaml.
templates:
  - templates/portal.deployment.yaml
  - templates/portal.service.yaml
  - templates/portal.configmap.yaml
  - templates/core.configmap.yaml
tests:
  - it: should compose image from registry + repository + tag
    template: templates/portal.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      portal.image.registry: example.com
      portal.image.repository: myproj/harbor-portal
      portal.image.tag: "2.10.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/myproj/harbor-portal:2.10.0

  - it: should expose containerPort 8080 named portal-http
    # Port name is load-bearing: portal.service.yaml references it by
    # name for the targetPort. A rename in deployment without service
    # update silently breaks traffic.
    template: templates/portal.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: portal-http

  - it: should mount portal-config and tmp volumes in deterministic order
    # Order matters: nginx.conf subPath mount targets volumeMounts[0].
    # Reordering would break the container at startup.
    template: templates/portal.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: portal-config
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: tmp

  - it: should render nginx.conf in the configmap
    template: templates/portal.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - exists:
          path: data["nginx.conf"]

  # Config-reload: nginx.conf is mounted from the portal ConfigMap, so an
  # nginx.conf-only change (e.g. an ipFamily toggle) must roll the pod. The
  # checksum annotation is the only thing that would. Asserts it is wired.
  - it: should annotate the pod template with the portal configmap checksum
    template: templates/portal.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap"]

  # Portal is optional (API-only installs). When disabled, none of its
  # workload templates render.
  - it: should not render the portal Deployment when disabled
    template: templates/portal.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      portal.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render the portal Service when disabled
    template: templates/portal.service.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      portal.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render the portal ConfigMap when disabled
    template: templates/portal.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      portal.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # core's PORTAL_URL uses portal.url when set (so core can reach an
  # externally-hosted portal when portal.enabled=false), else the in-cluster
  # service.
  - it: should set core PORTAL_URL from portal.url when set
    template: templates/core.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      portal.enabled: false
      portal.url: https://ui.external.example
    asserts:
      - equal:
          path: data.PORTAL_URL
          value: https://ui.external.example
