# All tests assert chart-computed output for known inputs or fail-fast
# guards. Pure Helm pass-through tests were removed — they only proved
# `--set` works, not that the chart does anything with the value.
# Full-render regression coverage lives in snapshots_test.yaml.
suite: TLS certificate tests
templates:
  - templates/tls-certificates.yaml
tests:
  # Pins the top-level conditional: tls-certificates.yaml renders 0
  # documents when tls.certManager.enabled=false. Acts as a guard
  # against accidentally flipping the default to true (would create
  # Certificate resources in clusters without cert-manager installed).
  - it: should not create certificates when cert-manager disabled
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # Pins the chart-computed Certificate name: `<truncated-fullname>-
  # <slug-of-host>-<8-hex-of-sha256>`. The chart slugs the host (dots
  # to dashes) and appends a hash to keep multi-host / multi-release
  # names unique.
  - it: should set certificate name from host
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: harbor.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^RELEASE-NAME-harbor-ne-harbor-example-com-[0-9a-f]{8}$"

  # Pins the chart-computed secretName: same shape as metadata.name
  # plus a `-tls` suffix, so the Ingress/HTTPRoute can reference the
  # Secret cert-manager will populate.
  - it: should set secretName
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: harbor.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - matchRegex:
          path: spec.secretName
          pattern: "^RELEASE-NAME-harbor-ne-harbor-example-com-[0-9a-f]{8}-tls$"

  # Pins the conditional emission of spec.duration and spec.renewBefore
  # — these keys are only rendered when set in values, and cert-manager
  # rejects empty strings here.
  - it: should set duration and renewBefore
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.duration: 4320h
      tls.certManager.renewBefore: 720h
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: harbor.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.duration
          value: 4320h
      - equal:
          path: spec.renewBefore
          value: 720h

  # Pins the issuerRef structure (name + kind) — cert-manager treats
  # missing kind as Issuer (namespaced), so dropping kind here would
  # silently break ClusterIssuer references.
  - it: should set issuerRef
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: harbor.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.issuerRef.name
          value: letsencrypt-prod
      - equal:
          path: spec.issuerRef.kind
          value: ClusterIssuer

  # Pins that dnsNames carries the original ingress host verbatim (no
  # slug, no truncation) — cert-manager needs the real DNS name to
  # request the cert.
  - it: should set dnsNames
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: harbor.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.dnsNames[0]
          value: "harbor.example.com"

  # Pins the per-host range loop: N ingress.hosts entries must render
  # N Certificate documents (one per host, each with its own name +
  # secretName).
  - it: should create multiple certificates for multiple hosts
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: harbor.example.com
          paths:
            - path: /
              pathType: Prefix
        - host: notary.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - hasDocuments:
          count: 2

  # Regression guard for 212a44486 / 9a59ac102 (Fix #3). Wildcard hosts
  # like *.example.com used to become *-example-com — an invalid DNS-1123
  # label that cert-manager rejected. The chart now slugs `*.` to
  # `wildcard-` and appends a sha256(fullname+host) suffix so multiple
  # releases or wildcard variants stay distinct.
  - it: should sanitize wildcard hosts in Certificate name
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: "*.example.com"
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^RELEASE-NAME-harbor-ne-wildcard-example-com-[0-9a-f]{8}$"
      - matchRegex:
          path: spec.secretName
          pattern: "^RELEASE-NAME-harbor-ne-wildcard-example-com-[0-9a-f]{8}-tls$"
      # dnsNames keeps the original wildcard — the cert covers *.example.com
      - equal:
          path: spec.dnsNames[0]
          value: "*.example.com"

  - it: should keep Certificate name under 63 chars for long FQDNs
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: "harbor.really-long-subdomain-for-overflow-testing.example.com"
          paths:
            - path: /
              pathType: Prefix
    asserts:
      # metadata.name max 63 chars per DNS-1123 label
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,63}$"
      - matchRegex:
          path: spec.secretName
          pattern: "^.{1,63}$"

  - it: should produce distinct Certificate names for releases sharing a 22-char prefix
    # Same chart, same host, two different releases that share the same
    # truncated 22-char fullname prefix. 9a59ac102 added $fullname to the
    # hash input so each release gets a unique cert/secret name.
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      tls.certManager.enabled: true
      tls.certManager.issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      ingress.hosts:
        - host: harbor.example.com
          paths:
            - path: /
              pathType: Prefix
    release:
      name: harbor-prod-team-alpha-cluster-east
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^harbor-prod-team-alpha-harbor-example-com-[0-9a-f]{8}$"
