suite: image pull secrets tests
templates:
  - templates/image-pull-secrets.yaml
tests:
  - it: should not create secret when imageCredentials empty
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      imageCredentials: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should create secret when imageCredentials.registry set
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      imageCredentials:
        registry: registry.example.com
        username: user
        password: pass
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson

  - it: should set correct secret name
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      imageCredentials:
        registry: registry.example.com
        username: user
        password: pass
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-registry-creds
