# All tests assert chart-computed output for known inputs. The trivial
# empty-credentials (count: 0) guard was removed — it duplicated the
# template's single `if` flag. Full-render regression coverage for the
# image pull secret lives in snapshots_test.yaml.
suite: image pull secrets tests
templates:
  - templates/image-pull-secrets.yaml
tests:
  # Pins: chart emits a kubernetes.io/dockerconfigjson Secret whose name is
  # composed from the fullname helper as `<fullname>-registry-creds`
  # (input registry/username/password do not appear in the name — proves
  # the chart computes the name rather than echoing input).
  - it: should compose dockerconfigjson Secret with fullname-based name
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      imageCredentials:
        registry: registry.example.com
        username: user
        password: pass
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
      - equal:
          path: metadata.name
          value: RELEASE-NAME-registry-creds
