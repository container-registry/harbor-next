# Values for the Harbor Next chart, generated by harbor-migrate.ys
# from: tests/migrate/values-2x.yaml
# Review the migration report (stderr of the generator) and
# docs/MIGRATION.md before installing. This chart is not a
# drop-in upgrade of goharbor/harbor-helm.
externalURL: https://harbor.example.com
harborAdminPassword: changeme
secretKey: 0123456789abcdef
ingress:
  enabled: true
  className: nginx
  autoGenCert: false
  tls:
  - secretName: harbor-tls
    hosts:
    - harbor.example.com
core:
  deploymentStrategy:
    type: Recreate
portal:
  deploymentStrategy:
    type: Recreate
registry:
  extraEnv:
  - name: OTEL_TRACES_EXPORTER
    value: none
  credentials:
    password: harbor_registry_password
  config:
    http:
      relativeurls: true
    storage:
      s3:
        region: eu-central-1
        bucket: my-harbor
      redirect:
        disable: true
  deploymentStrategy:
    type: Recreate
  storageCredentials:
    s3:
      existingSecret: harbor-s3-creds
jobservice:
  config:
    worker_pool:
      workers: 10
    job_loggers:
    - name: FILE
      level: INFO
      settings:
        base_dir: /var/log/jobs
      sweeper:
        duration: 30
        settings:
          work_dir: /var/log/jobs
    metric:
      enabled: true
      path: /metrics
      port: 8001
  deploymentStrategy:
    type: Recreate
  persistence:
    enabled: true
exporter:
  deploymentStrategy:
    type: Recreate
  enabled: true
trivy:
  enabled: true
  persistence:
    enabled: true
database:
  host: pg.example.com
  port: 5432
  username: harbor
  existingSecret: harbor-db
  existingSecretKey: password
valkey:
  enabled: false
externalRedis:
  host: redis.example.com
  port: 6379
  existingSecret: harbor-redis
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

