# All tests assert chart-computed output for known inputs. Pure Helm
# pass-through tests (custom SA name, automountServiceAccountToken
# round-trip, per-component isKind) were removed — they only proved
# `--set` works, not that the chart does anything with the value.
# What remains: document-count combinatorics across the exporter/trivy
# toggles (the chart fans the SA list across multiple optional
# components in one template), and the IRSA annotation wiring path.
# Full-render regression coverage lives in snapshots_test.yaml.
suite: ServiceAccount tests
templates:
  - templates/serviceaccounts.yaml
tests:
  # Pins: with defaults (exporter off, trivy off) the chart emits exactly
  # 5 SAs — core, jobservice, portal, registry, and one more from the
  # component fan-out. Guards against silent extra/missing SAs.
  - it: should render 5 SAs by default
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - hasDocuments:
          count: 5

  # Pins: enabling exporter does NOT change the default count (exporter SA
  # already counted) — the combinatorics aren't a simple per-toggle +1.
  - it: should keep count at 5 when exporter explicitly enabled
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      exporter.enabled: true
    asserts:
      - hasDocuments:
          count: 5

  # Pins: disabling exporter drops one SA (proves the exporter SA is gated
  # by .Values.exporter.enabled, not always rendered).
  - it: should drop to 4 SAs when exporter disabled
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      exporter.enabled: false
    asserts:
      - hasDocuments:
          count: 4

  # Pins: trivy SA requires BOTH trivy.enabled AND trivy.serviceAccount.create —
  # either toggle alone keeps the count at 5.
  - it: should keep count at 5 when trivy enabled but SA create false
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 5

  # Pins: trivy SA requires BOTH toggles — SA create true alone keeps count at 5.
  - it: should keep count at 5 when trivy SA create true but trivy disabled
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: false
      trivy.serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 5

  # Pins: only when BOTH trivy toggles are on does the count reach 6.
  - it: should render 6 SAs when trivy enabled and SA create true
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 6

  # Pins: serviceAccount.annotations are written onto the matching SA
  # by metadata.name. This is the IRSA wiring path (eks.amazonaws.com/role-arn)
  # — must land on the core SA specifically, not somewhere else in the doc stream.
  - it: should wire IRSA annotation onto the core ServiceAccount
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/my-role"
