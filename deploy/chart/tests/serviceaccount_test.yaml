suite: ServiceAccount tests
templates:
  - templates/serviceaccounts.yaml
tests:
  - it: should create SAs for core, exporter, jobservice, portal, registry by default
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - hasDocuments:
          count: 5

  - it: should create exporter SA when exporter enabled
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-exporter
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      exporter.enabled: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not create exporter SA when exporter disabled
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      exporter.enabled: false
    asserts:
      - hasDocuments:
          count: 4


  - it: should create trivy SA when trivy enabled and SA create true
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-trivy
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not create trivy SA when trivy disabled
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: false
      trivy.serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 5

  - it: should not create trivy SA when SA create false
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 5

  - it: should create 6 SAs when trivy SA enabled
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 6

  - it: should use custom SA name
    documentSelector:
      path: metadata.name
      value: my-custom-sa
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.serviceAccount.name: my-custom-sa
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should set SA annotations
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/my-role"

  - it: should default automountServiceAccountToken to false
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should set automountServiceAccountToken to true
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-harbor-next-core
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: should reduce count when disabling core SA
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      core.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 4
