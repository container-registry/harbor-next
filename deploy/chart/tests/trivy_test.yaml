suite: trivy component tests
templates:
  - templates/trivy.statefulset.yaml
  - templates/trivy.service.yaml
  - templates/trivy.secret.yaml
tests:
  - it: should create trivy statefulset when enabled
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-harbor-next-trivy
      - equal:
          path: spec.replicas
          value: 1

  - it: should not create trivy statefulset when disabled
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set correct image
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.image.repository: goharbor/trivy-adapter
      trivy.image.tag: "2.10.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: goharbor/trivy-adapter:2.10.0

  - it: should set debugMode env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.debugMode: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_DEBUG_MODE
            value: "true"

  - it: should set vulnType env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.vulnType: "os,library"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_VULN_TYPE
            value: "os,library"

  - it: should set timeout env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.timeout: "10m0s"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_TIMEOUT
            value: "10m0s"

  - it: should set severity env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.severity: "HIGH,CRITICAL"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_SEVERITY
            value: "HIGH,CRITICAL"

  - it: should set ignoreUnfixed env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.ignoreUnfixed: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_IGNORE_UNFIXED
            value: "true"

  - it: should set insecure env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.insecure: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_INSECURE
            value: "true"

  - it: should set offlineScan env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.offlineScan: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_OFFLINE_SCAN
            value: "true"

  - it: should set skipUpdate env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.skipUpdate: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_SKIP_UPDATE
            value: "true"

  - it: should set securityCheck env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.securityCheck: "vuln,config"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_SECURITY_CHECKS
            value: "vuln,config"

  - it: should set proxy env vars when trivy in proxy.components
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      proxy.httpProxy: http://proxy.example.com:8080
      proxy.httpsProxy: https://proxy.example.com:8443
      proxy.components:
        - trivy
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: "http://proxy.example.com:8080"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTPS_PROXY
            value: "https://proxy.example.com:8443"

  - it: should create VolumeClaimTemplate when persistence enabled
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.persistence.enabled: true
      trivy.persistence.size: 10Gi
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 10Gi

  - it: should use emptyDir when persistence disabled
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.persistence.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: data
      - isNotNull:
          path: spec.template.spec.volumes[0].emptyDir

  - it: should use existingClaim when set
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.persistence.enabled: true
      trivy.persistence.existingClaim: my-existing-pvc
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: my-existing-pvc

  - it: should create trivy service when enabled
    template: templates/trivy.service.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should not create trivy service when disabled
    template: templates/trivy.service.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create trivy secret when enabled
    template: templates/trivy.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
    asserts:
      - isKind:
          of: Secret
      - exists:
          path: data.redisURL
      - exists:
          path: data.gitHubToken

  - it: should not create trivy secret when disabled
    template: templates/trivy.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should apply pod annotations
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: should apply pod labels
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.podLabels:
        custom-label: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.labels["custom-label"]
          value: custom-value

  - it: should apply node selector
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should apply tolerations
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: node-role.kubernetes.io/control-plane

  - it: should apply container securityContext
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.securityContext:
        runAsNonRoot: true
        runAsUser: 10000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should apply podSecurityContext
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.podSecurityContext:
        fsGroup: 10000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 10000

  - it: should apply priorityClassName
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.priorityClassName: high-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: "high-priority"

  - it: should add initContainers
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.initContainers:
        - name: init
          image: busybox
          command: ["sh", "-c", "echo init"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init

  - it: should add extraEnv
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.extraEnv:
        - name: CUSTOM_VAR
          value: custom-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_VAR
            value: custom-value
