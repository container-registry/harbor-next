# Pruned from 29 -> 16 tests.
#
# Removed tautological assertions: isKind against the matching template,
# equal round-trip of user-supplied input (replicas, podAnnotations,
# podLabels, nodeSelector, tolerations, securityContext, podSecurityContext,
# priorityClassName, initContainers, extraEnv), exists on always-present
# paths, and hasDocuments: count assertions on the enable/disable gates.
#
# Kept tests assert chart logic that can actually regress:
#   - image repository+tag concatenation
#   - the 9 SCANNER_TRIVY_* env vars (int/bool -> string coercion)
#   - proxy.components membership gating HTTP_PROXY / HTTPS_PROXY injection
#   - persistence variants (volumeClaimTemplates / emptyDir / existingClaim)
#   - trivy.secret.yaml redisURL composition via harbor.redis.url.trivy
#   - service port name (load-bearing for selector / ingress port matching)
suite: trivy component tests
templates:
  - templates/trivy.statefulset.yaml
  - templates/trivy.service.yaml
  - templates/trivy.secret.yaml
tests:
  - it: should set correct image
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.image.repository: goharbor/trivy-adapter
      trivy.image.tag: "2.10.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: goharbor/trivy-adapter:2.10.0

  - it: should set debugMode env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.debugMode: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_DEBUG_MODE
            value: "true"

  - it: should set vulnType env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.vulnType: "os,library"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_VULN_TYPE
            value: "os,library"

  - it: should set timeout env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.timeout: "10m0s"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_TIMEOUT
            value: "10m0s"

  - it: should set severity env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.severity: "HIGH,CRITICAL"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_SEVERITY
            value: "HIGH,CRITICAL"

  - it: should set ignoreUnfixed env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.ignoreUnfixed: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_IGNORE_UNFIXED
            value: "true"

  - it: should set insecure env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.insecure: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_INSECURE
            value: "true"

  - it: should set offlineScan env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.offlineScan: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_OFFLINE_SCAN
            value: "true"

  - it: should set skipUpdate env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.skipUpdate: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_SKIP_UPDATE
            value: "true"

  - it: should set securityCheck env
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.securityCheck: "vuln,config"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCANNER_TRIVY_SECURITY_CHECKS
            value: "vuln,config"

  - it: should set proxy env vars when trivy in proxy.components
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      proxy.httpProxy: http://proxy.example.com:8080
      proxy.httpsProxy: https://proxy.example.com:8443
      proxy.components:
        - trivy
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: "http://proxy.example.com:8080"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTPS_PROXY
            value: "https://proxy.example.com:8443"

  - it: should create VolumeClaimTemplate when persistence enabled
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.persistence.enabled: true
      trivy.persistence.size: 10Gi
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 10Gi

  - it: should use emptyDir when persistence disabled
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.persistence.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: data
      - isNotNull:
          path: spec.template.spec.volumes[0].emptyDir

  - it: should use existingClaim when set
    template: templates/trivy.statefulset.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
      trivy.persistence.enabled: true
      trivy.persistence.existingClaim: my-existing-pvc
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: my-existing-pvc

  - it: should compose redisURL using harbor.redis.url.trivy helper
    template: templates/trivy.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
    asserts:
      # base64("redis://valkey:6379/5") -- proves helper composes scheme,
      # host, port, and the /5 trivy db index.
      - equal:
          path: data.redisURL
          value: cmVkaXM6Ly92YWxrZXk6NjM3OS81

  - it: should expose service port named http-trivy
    template: templates/trivy.service.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      trivy.enabled: true
    asserts:
      - equal:
          path: spec.ports[0].name
          value: http-trivy
