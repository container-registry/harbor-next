suite: ServiceMonitor tests
templates:
  - templates/servicemonitor.yaml
  - templates/validate-values.yaml
tests:
  - it: should not create ServiceMonitor when disabled
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.serviceMonitor.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ServiceMonitor when enabled
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: RELEASE-NAME-harbor-next

  - it: should set custom namespace
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.namespace: monitoring
    asserts:
      - equal:
          path: metadata.namespace
          value: monitoring

  - it: should set custom labels
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.labels:
        release: prometheus
    asserts:
      - equal:
          path: metadata.labels.release
          value: prometheus

  - it: should set custom interval
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.interval: 60s
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: 60s

  - it: should set custom scrapeTimeout
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.scrapeTimeout: 30s
    asserts:
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 30s

  - it: should default honorLabels to true
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].honorLabels
          value: true

  - it: should set metrics path
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].path
          value: /metrics

  - it: should match release namespace in namespaceSelector
    template: templates/servicemonitor.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: NAMESPACE

  # Regression guard for 9160ed527 (Fix #21). Enabling the ServiceMonitor
  # without enabling /metrics scraping creates an orphan ServiceMonitor
  # that scrapes nothing — Prometheus silently gets no Harbor metrics.
  - it: should fail when serviceMonitor enabled without metrics.enabled
    template: templates/validate-values.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      metrics.enabled: false
      metrics.serviceMonitor.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "metrics.serviceMonitor.enabled requires metrics.enabled=true. Without metrics enabled, Harbor pods do not expose the /metrics endpoint the ServiceMonitor would scrape."
