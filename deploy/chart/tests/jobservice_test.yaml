suite: jobservice component tests
templates:
  - templates/jobservice.deployment.yaml
  - templates/jobservice.service.yaml
  - templates/jobservice.configmap.yaml
  - templates/jobservice.configmap-env.yaml
  - templates/jobservice.secret.yaml
  - templates/jobservice.pvc.yaml
tests:
  - it: should create jobservice deployment
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-harbor-next-jobservice
      - equal:
          path: spec.replicas
          value: 1

  - it: should use custom replica count
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set correct image
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.image.repository: goharbor/harbor-jobservice
      jobservice.image.tag: "2.10.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: goharbor/harbor-jobservice:2.10.0

  - it: should expose container port 8080
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should reference CORE_SECRET from secret
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CORE_SECRET
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-harbor-next-core
                key: secret

  - it: should create jobservice service
    template: templates/jobservice.service.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-harbor-next-jobservice
      - equal:
          path: spec.ports[0].port
          value: 80

  - it: should configure default workers count in configmap
    template: templates/jobservice.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["config.yml"]
          pattern: "workers: 4"

  - it: should configure custom workers count
    template: templates/jobservice.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.max_job_workers: 10
    asserts:
      - matchRegex:
          path: data["config.yml"]
          pattern: "workers: 10"

  - it: should configure file job logger
    template: templates/jobservice.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.jobLoggers:
        - file
    asserts:
      - matchRegex:
          path: data["config.yml"]
          pattern: 'name: "FILE"'

  - it: should configure database job logger
    template: templates/jobservice.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.jobLoggers:
        - database
    asserts:
      - matchRegex:
          path: data["config.yml"]
          pattern: 'name: "DB"'

  - it: should configure stdout job logger
    template: templates/jobservice.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.jobLoggers:
        - stdout
    asserts:
      - matchRegex:
          path: data["config.yml"]
          pattern: 'name: "STD_OUTPUT"'

  - it: should configure reaper settings
    template: templates/jobservice.configmap.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.reaper.max_update_hours: 48
      jobservice.reaper.max_dangling_hours: 336
    asserts:
      - matchRegex:
          path: data["config.yml"]
          pattern: "max_update_hours: 48"
      - matchRegex:
          path: data["config.yml"]
          pattern: "max_dangling_hours: 336"

  - it: should set webhook notification settings in configmap-env
    template: templates/jobservice.configmap-env.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.notification.webhook_job_max_retry: 5
      jobservice.notification.webhook_job_http_client_timeout: 10
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data.JOBSERVICE_WEBHOOK_JOB_MAX_RETRY
          value: "5"
      - equal:
          path: data.JOBSERVICE_WEBHOOK_JOB_HTTP_CLIENT_TIMEOUT
          value: "10"

  - it: should create jobservice secret
    template: templates/jobservice.secret.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-harbor-next-jobservice

  - it: should create PVC when persistence enabled
    template: templates/jobservice.pvc.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.persistence.enabled: true
      jobservice.persistence.size: 10Gi
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: should not create PVC when persistence disabled
    template: templates/jobservice.pvc.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create PVC when existingClaim set
    template: templates/jobservice.pvc.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.persistence.enabled: true
      jobservice.persistence.existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should use emptyDir when persistence disabled
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.persistence.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.volumes[1].name
          value: job-logs
      - isNotNull:
          path: spec.template.spec.volumes[1].emptyDir

  - it: should use PVC when persistence enabled
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.persistence.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.volumes[1].name
          value: job-logs
      - equal:
          path: spec.template.spec.volumes[1].persistentVolumeClaim.claimName
          value: RELEASE-NAME-harbor-next-jobservice

  - it: should use existingClaim in deployment
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.persistence.enabled: true
      jobservice.persistence.existingClaim: my-existing-pvc
    asserts:
      - equal:
          path: spec.template.spec.volumes[1].persistentVolumeClaim.claimName
          value: my-existing-pvc

  - it: should include checksum annotations
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap"]
      - exists:
          path: spec.template.metadata.annotations["checksum/secret"]

  - it: should apply pod annotations
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: should apply pod labels
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.podLabels:
        custom-label: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.labels["custom-label"]
          value: custom-value

  - it: should apply node selector
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should apply tolerations
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: node-role.kubernetes.io/control-plane

  - it: should apply container securityContext
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.securityContext:
        runAsNonRoot: true
        runAsUser: 10000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should apply podSecurityContext
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.podSecurityContext:
        fsGroup: 10000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 10000

  - it: should apply deploymentStrategy
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.deploymentStrategy:
        type: Recreate
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should add initContainers
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.initContainers:
        - name: init
          image: busybox
          command: ["sh", "-c", "echo init"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init

  - it: should add extraEnv
    template: templates/jobservice.deployment.yaml
    set:
      externalURL: https://harbor.example.com
      database.host: postgres.example.com
      harborAdminPassword: Harbor12345
      jobservice.extraEnv:
        - name: CUSTOM_VAR
          value: custom-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_VAR
            value: custom-value
