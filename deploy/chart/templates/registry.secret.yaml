{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "harbor.registry" .)) | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-registry
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "registry") | nindent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" nil)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if not .Values.registry.existingSecret }}
  {{- $httpSecret := include "harbor.secretKeyHelper" (dict "key" "REGISTRY_HTTP_SECRET" "data" ($existingSecret.data | default dict)) }}
  {{- if not $httpSecret }}
  {{- $httpSecret = include "harbor.autoGenValue" (dict "root" $ "len" 16 "hint" "registry.existingSecret") }}
  {{- end }}
  REGISTRY_HTTP_SECRET: {{ $httpSecret | b64enc | quote }}
  {{- end }}
  # Free-form sensitive env via toEnvVars (e.g. inline REGISTRY_STORAGE_S3_ACCESSKEY/SECRETKEY).
  # For production prefer registry.storageCredentials.<backend>.existingSecret instead.
  {{- if .Values.registry.secret }}
  {{- include "harbor.toEnvVars" (dict "values" .Values.registry.secret "prefix" "" "isSecret" true) | nindent 2 }}
  {{- end }}
{{- if not .Values.registry.credentials.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "harbor.registry.name" . }}-htpasswd"
  labels:
{{ include "harbor.labels" . | indent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" nil)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if .Values.registry.credentials.htpasswdString }}
  REGISTRY_HTPASSWD: {{ .Values.registry.credentials.htpasswdString | b64enc | quote }}
  {{- else }}
  {{- /* bcrypt salts are random: this hash differs on every render even
         with a fixed password. Pin via htpasswdString or
         credentials.existingSecret for GitOps. */}}
  {{- if not .Values.autoGenSecrets }}
  {{- fail "autoGenSecrets is false: set registry.credentials.htpasswdString or registry.credentials.existingSecret (the htpasswd function re-salts on every render)" }}
  {{- end }}
  REGISTRY_HTPASSWD: {{ htpasswd .Values.registry.credentials.username .Values.registry.credentials.password | b64enc | quote }}
  {{- end }}
{{- end }}
