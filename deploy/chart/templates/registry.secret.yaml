{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "harbor.registry" .)) | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-registry
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "registry") | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.registry.existingSecret }}
  REGISTRY_HTTP_SECRET: {{ .Values.registry.secret | default (include "harbor.secretKeyHelper" (dict "key" "REGISTRY_HTTP_SECRET" "data" ($existingSecret.data | default dict))) | default (randAlphaNum 16) | b64enc | quote }}
  {{- end }}
  # S3 credentials
  {{- if eq .Values.registry.storage.type "s3" }}
  {{- with .Values.registry.storage.s3 }}
  {{- if .accesskey }}
  REGISTRY_STORAGE_S3_ACCESSKEY: {{ .accesskey | b64enc | quote }}
  {{- end }}
  {{- if .secretkey }}
  REGISTRY_STORAGE_S3_SECRETKEY: {{ .secretkey | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- end }}

  # Azure credentials
  {{- if eq .Values.registry.storage.type "azure" }}
  {{- with .Values.registry.storage.azure }}
  {{- if .accountkey }}
  REGISTRY_STORAGE_AZURE_ACCOUNTKEY: {{ .accountkey | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- end }}

  # OSS credentials
  {{- if eq .Values.registry.storage.type "oss" }}
  {{- with .Values.registry.storage.oss }}
  {{- if .accesskeysecret }}
  REGISTRY_STORAGE_OSS_ACCESSKEYSECRET: {{ .accesskeysecret | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- end }}

  # Additional secrets via toEnvVars
  {{- if .Values.registry.secret }}
  {{- include "harbor.toEnvVars" (dict "values" .Values.registry.secret "prefix" "" "isSecret" true) | nindent 2 }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "harbor.registry.name" . }}-htpasswd"
  labels:
{{ include "harbor.labels" . | indent 4 }}
type: Opaque
data:
  {{- if .Values.registry.credentials.htpasswdString }}
  REGISTRY_HTPASSWD: {{ .Values.registry.credentials.htpasswdString | b64enc | quote }}
  {{- else }}
  REGISTRY_HTPASSWD: {{ htpasswd .Values.registry.credentials.username .Values.registry.credentials.password | b64enc | quote }}
  {{- end }}
