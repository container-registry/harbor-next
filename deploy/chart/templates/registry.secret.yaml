{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "harbor.registry" .)) | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-registry
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "registry") | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.registry.existingSecret }}
  REGISTRY_HTTP_SECRET: {{ include "harbor.secretKeyHelper" (dict "key" "REGISTRY_HTTP_SECRET" "data" ($existingSecret.data | default dict)) | default (randAlphaNum 16) | b64enc | quote }}
  {{- end }}
  # Free-form sensitive env via toEnvVars (e.g. inline REGISTRY_STORAGE_S3_ACCESSKEY/SECRETKEY).
  # For production prefer registry.storageCredentials.<backend>.existingSecret instead.
  {{- if .Values.registry.secret }}
  {{- include "harbor.toEnvVars" (dict "values" .Values.registry.secret "prefix" "" "isSecret" true) | nindent 2 }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "harbor.registry.name" . }}-htpasswd"
  labels:
{{ include "harbor.labels" . | indent 4 }}
type: Opaque
data:
  {{- if .Values.registry.credentials.htpasswdString }}
  REGISTRY_HTPASSWD: {{ .Values.registry.credentials.htpasswdString | b64enc | quote }}
  {{- else }}
  REGISTRY_HTPASSWD: {{ htpasswd .Values.registry.credentials.username .Values.registry.credentials.password | b64enc | quote }}
  {{- end }}
