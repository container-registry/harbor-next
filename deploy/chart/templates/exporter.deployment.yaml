{{- if .Values.exporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor.fullname" . }}-exporter
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "exporter") | nindent 4 }}
spec:
  replicas: {{ .Values.exporter.replicas }}
  revisionHistoryLimit: {{ .Values.exporter.revisionHistoryLimit | default .Values.global.revisionHistoryLimit }}
  {{- with .Values.exporter.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "exporter") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap-env: {{ include (print $.Template.BasePath "/exporter.configmap-env.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/exporter.secret.yaml") . | sha256sum }}
        {{- with .Values.exporter.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "exporter") | nindent 8 }}
        {{- with .Values.exporter.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "harbor.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "harbor.serviceAccountName" (dict "root" . "component" "exporter" "serviceAccount" .Values.exporter.serviceAccount) }}
      automountServiceAccountToken: {{ .Values.exporter.serviceAccount.automountServiceAccountToken | default false }}
      {{- with (.Values.exporter.priorityClassName | default .Values.global.priorityClassName) }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.exporter.podSecurityContext | nindent 8 }}
      {{- with .Values.exporter.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: exporter
          securityContext:
            {{- toYaml .Values.exporter.securityContext | nindent 12 }}
          image: {{ include "harbor.image" (dict "imageRoot" .Values.exporter.image "component" "exporter" "root" .) }}
          imagePullPolicy: {{ include "harbor.imagePullPolicy" . }}
          ports:
            - name: {{ include "harbor.metrics.portName" . | quote }}
              containerPort: 8001
              protocol: TCP
          {{- if or .Values.exporter.config .Values.exporter.secret }}
          envFrom:
            {{- if .Values.exporter.config }}
            - configMapRef:
                name: "{{ include "harbor.fullname" . }}-exporter-env"
            {{- end }}
            {{- if .Values.exporter.secret }}
            - secretRef:
                name: "{{ include "harbor.fullname" . }}-exporter"
            {{- end }}
          {{- end }}
          env:
            - name: HARBOR_EXPORTER_PORT
              value: "8001"
            - name: HARBOR_EXPORTER_METRICS_PATH
              value: "/metrics"
            - name: HARBOR_EXPORTER_METRICS_ENABLED
              value: "true"
            - name: HARBOR_EXPORTER_MAX_REQUESTS
              value: "30"
            - name: HARBOR_EXPORTER_TLS_CERT
              value: ""
            - name: HARBOR_EXPORTER_TLS_KEY
              value: ""
            - name: HARBOR_SERVICE_SCHEME
              value: "http"
            - name: HARBOR_SERVICE_HOST
              value: {{ include "harbor.fullname" . }}-core
            - name: HARBOR_SERVICE_PORT
              value: "80"
            - name: HARBOR_DATABASE_HOST
              value: {{ include "harbor.database.host" . | quote }}
            - name: HARBOR_DATABASE_PORT
              value: {{ include "harbor.database.port" . | quote }}
            - name: HARBOR_DATABASE_USERNAME
              value: {{ include "harbor.database.username" . | quote }}
            - name: HARBOR_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.database.secretName" . }}
                  key: {{ .Values.database.existingSecretKey | default "POSTGRESQL_PASSWORD" }}
            - name: HARBOR_DATABASE_DBNAME
              value: {{ include "harbor.database.database" . | quote }}
            - name: HARBOR_DATABASE_SSLMODE
              value: {{ include "harbor.database.sslmode" . | quote }}
            - name: HARBOR_DATABASE_MAX_OPEN_CONNS
              value: {{ .Values.database.maxOpenConns | default 100 | quote }}
            - name: HARBOR_DATABASE_MIN_CONNS
              value: {{ .Values.database.minConns | default 2 | quote }}
            - name: HARBOR_DATABASE_CONN_MAX_IDLE_TIME
              value: {{ .Values.database.connMaxIdleTime | quote }}
            - name: HARBOR_DATABASE_CONN_MAX_LIFETIME
              value: {{ .Values.database.connMaxLifetime | quote }}
            {{- /* Must be defined BEFORE HARBOR_REDIS_URL: Kubernetes only
                  expands $(REDIS_PASSWORD) from variables earlier in the
                  env list. Same auth conditions as core/jobservice and the
                  harbor.redis.url helper. */}}
            {{- $extAuth := and (not .Values.valkey.enabled) (or .Values.externalRedis.existingSecret .Values.externalRedis.password) -}}
            {{- if or .Values.valkey.auth.enabled $extAuth }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.redis.secretName" . }}
                  key: {{ include "harbor.redis.secretKey" . }}
            {{- end }}
            - name: HARBOR_REDIS_URL
              value: {{ include "harbor.redis.url.jobservice" . | quote }}
            - name: HARBOR_REDIS_NAMESPACE
              value: "harbor_job_service_namespace"
            - name: HARBOR_REDIS_TIMEOUT
              value: "3600"
            {{- include "harbor.extraCA.env" . | nindent 12 }}
            {{- with .Values.exporter.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "harbor.probes" .Values.exporter.probes | nindent 10 }}
          resources:
            {{- toYaml .Values.exporter.resources | nindent 12 }}
          {{- with .Values.exporter.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "harbor.extraCA.volumeMount" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "harbor.extraCA.volume" . | nindent 8 }}
      {{- include "harbor.podScheduling" (dict "component" .Values.exporter "root" $) | nindent 6 }}
{{- end }}
