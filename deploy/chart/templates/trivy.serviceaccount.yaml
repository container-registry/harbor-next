{{- if and .Values.trivy.enabled .Values.trivy.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "harbor.serviceAccountName" (dict "root" . "component" "trivy" "serviceAccount" .Values.trivy.serviceAccount) }}
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "trivy") | nindent 4 }}
  {{- with .Values.trivy.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
