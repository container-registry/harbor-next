{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "harbor.core" .)) | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-core
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "core") | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.existingSecretAdminPassword }}
  HARBOR_ADMIN_PASSWORD: {{ .Values.harborAdminPassword | b64enc | quote }}
  {{- end }}
  {{- if not .Values.existingSecretSecretKey }}
  {{- $secretKey := include "harbor.secretKey" . | b64enc }}
  SECRET_KEY: {{ $secretKey | quote }}
  secretKey: {{ $secretKey | quote }}
  {{- end }}
  {{- if .Values.core.secret }}
  {{- include "harbor.toEnvVars" (dict "values" .Values.core.secret "prefix" "" "isSecret" true) | nindent 2 }}
  {{- end }}
  {{- if not .Values.core.existingSecret }}
  {{- $coreSecret := include "harbor.secretKeyHelper" (dict "key" "secret" "data" ($existingSecret.data | default dict)) }}
  {{- if not $coreSecret }}
  {{- $coreSecret = include "harbor.autoGenValue" (dict "root" $ "len" 16 "hint" "core.existingSecret") }}
  {{- end }}
  secret: {{ $coreSecret | b64enc | quote }}
  {{- end }}
  {{- if not .Values.core.tokenSecretName }}
  {{- /* Reuse the persisted pair so upgrades don't rotate the token CA;
         only regenerate when key or cert is missing. Argo CD renders
         without lookup — pin via core.tokenSecretName there. */}}
  {{- $tokenKey := include "harbor.secretKeyHelper" (dict "key" "tls.key" "data" ($existingSecret.data | default dict)) }}
  {{- $tokenCert := include "harbor.secretKeyHelper" (dict "key" "tls.crt" "data" ($existingSecret.data | default dict)) }}
  {{- if and .Values.core.tokenKey .Values.core.tokenCert }}
  {{- $tokenKey = .Values.core.tokenKey }}
  {{- $tokenCert = .Values.core.tokenCert }}
  {{- else if not (and $tokenKey $tokenCert) }}
  {{- if not .Values.autoGenSecrets }}
  {{- fail "autoGenSecrets is false: set core.tokenSecretName (or core.tokenKey + core.tokenCert) to pin the token-service certificate" }}
  {{- end }}
  {{- $ca := genCA "harbor-token-ca" 3650 }}
  {{- $tokenKey = $ca.Key }}
  {{- $tokenCert = $ca.Cert }}
  {{- end }}
  tls.key: {{ $tokenKey | b64enc | quote }}
  tls.crt: {{ $tokenCert | b64enc | quote }}
  {{- end }}
  {{- if not .Values.registry.credentials.existingSecret }}
  REGISTRY_CREDENTIAL_PASSWORD: {{ .Values.registry.credentials.password | b64enc | quote }}
  {{- end }}
  {{- if not .Values.core.existingXsrfSecret }}
  {{- $csrfKey := .Values.core.xsrfKey | default (include "harbor.secretKeyHelper" (dict "key" "CSRF_KEY" "data" ($existingSecret.data | default dict))) }}
  {{- if not $csrfKey }}
  {{- $csrfKey = include "harbor.autoGenValue" (dict "root" $ "len" 32 "hint" "core.xsrfKey or core.existingXsrfSecret") }}
  {{- end }}
  CSRF_KEY: {{ $csrfKey | b64enc | quote }}
  {{- end }}
  {{- template "harbor.trace.jaeger.password" . }}

---
{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-database
  labels:
    {{- include "harbor.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRESQL_PASSWORD: {{ .Values.database.password | b64enc | quote }}
{{- end }}
---
{{- if and (not .Values.valkey.enabled) (not .Values.externalRedis.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-redis
  labels:
    {{- include "harbor.labels" . | nindent 4 }}
type: Opaque
data:
  REDIS_PASSWORD: {{ .Values.externalRedis.password | default "" | b64enc | quote }}
{{- end }}
