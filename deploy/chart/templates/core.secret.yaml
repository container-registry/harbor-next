{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "harbor.core" .)) | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-core
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "core") | nindent 4 }}
type: Opaque
data:
  # Secret key for encryption
  HARBOR_ADMIN_PASSWORD: {{ .Values.harborAdminPassword | default "Harbor12345" | b64enc | quote }}
  SECRET_KEY: {{ include "harbor.secretKey" . | b64enc | quote }}
  {{- if .Values.core.secret }}
  {{- include "harbor.toEnvVars" (dict "values" .Values.core.secret "prefix" "" "isSecret" true) | nindent 2 }}
  {{- end }}
  {{- if not .Values.existingSecretSecretKey }}
  secretKey: {{ .Values.secretKey | b64enc | quote }}
  {{- end }}
  {{- if not .Values.core.existingSecret }}
  secret: {{ .Values.core.secret | default (include "harbor.secretKeyHelper" (dict "key" "secret" "data" ($existingSecret.data | default dict))) | default (randAlphaNum 16) | b64enc | quote }}
  {{- end }}
  {{- if not .Values.core.secretName }}
  {{- $ca := genCA "harbor-token-ca" 365 }}
  tls.key: {{ .Values.core.tokenKey | default $ca.Key | b64enc | quote }}
  tls.crt: {{ .Values.core.tokenCert | default $ca.Cert | b64enc | quote }}
  {{- end }}
  {{- if not .Values.registry.credentials.existingSecret }}
  REGISTRY_CREDENTIAL_PASSWORD: {{ .Values.registry.credentials.password | b64enc | quote }}
  {{- end }}
  {{- if not .Values.core.existingXsrfSecret }}
  CSRF_KEY: {{ .Values.core.xsrfKey | default (include "harbor.secretKeyHelper" (dict "key" "CSRF_KEY" "data" ($existingSecret.data | default dict))) | default (randAlphaNum 32) | b64enc | quote }}
  {{- end }}
  {{- template "harbor.trace.jaeger.password" . }}

---
{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-database
  labels:
    {{- include "harbor.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRESQL_PASSWORD: {{ .Values.database.password | b64enc | quote }}
{{- end }}
---
{{- if and (not .Values.valkey.enabled) (not .Values.externalRedis.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.fullname" . }}-redis
  labels:
    {{- include "harbor.labels" . | nindent 4 }}
type: Opaque
data:
  REDIS_PASSWORD: {{ .Values.externalRedis.password | default "" | b64enc | quote }}
{{- end }}
