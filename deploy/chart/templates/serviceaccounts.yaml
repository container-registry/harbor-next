{{- /*
Consolidated ServiceAccounts for all Harbor components.
Components are listed in alphabetical order.
*/ -}}
{{- $root := . -}}
{{- $components := list
  (dict "name" "core"       "values" .Values.core       "needsEnabled" false)
  (dict "name" "exporter"   "values" .Values.exporter   "needsEnabled" true)
  (dict "name" "jobservice" "values" .Values.jobservice "needsEnabled" false)
  (dict "name" "portal"     "values" .Values.portal     "needsEnabled" false)
  (dict "name" "registry"   "values" .Values.registry   "needsEnabled" false)
  (dict "name" "trivy"      "values" .Values.trivy      "needsEnabled" true)
-}}
{{- range $components }}
{{- $enabled := ternary (and (index .values "enabled") .values.serviceAccount.create) .values.serviceAccount.create .needsEnabled }}
{{- if $enabled }}
---
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: {{ .values.serviceAccount.automountServiceAccountToken | default false }}
metadata:
  name: {{ include "harbor.serviceAccountName" (dict "root" $root "component" .name "serviceAccount" .values.serviceAccount) }}
  labels:
    {{- include "harbor.componentLabels" (dict "root" $root "component" .name) | nindent 4 }}
  {{- with .values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
