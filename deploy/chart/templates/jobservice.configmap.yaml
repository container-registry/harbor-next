{{- if not .Values.jobservice.existingConfigMap }}
{{- $chartConfig := include "harbor.jobservice.chartManagedConfig" . | fromYaml }}
{{- $userConfig := deepCopy (.Values.jobservice.config | default dict) }}
{{- $merged := mustMergeOverwrite $chartConfig $userConfig }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ template "harbor.jobservice" . }}"
  labels:
    {{- include "harbor.labels" . | nindent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" nil)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  config.yml: |+
{{ toYaml $merged | indent 4 }}
{{- end }}
