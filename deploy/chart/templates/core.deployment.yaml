apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor.fullname" . }}-core
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "core") | nindent 4 }}
spec:
  {{- if not (and .Values.core.autoscaling .Values.core.autoscaling.enabled) }}
  replicas: {{ .Values.core.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.core.revisionHistoryLimit | default .Values.global.revisionHistoryLimit }}
  {{- with .Values.core.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "core") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/core.configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/core.secret.yaml") . | sha256sum }}
        {{- with .Values.core.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "core") | nindent 8 }}
        {{- with .Values.core.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "harbor.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "harbor.serviceAccountName" (dict "root" . "component" "core" "serviceAccount" .Values.core.serviceAccount) }}
      automountServiceAccountToken: {{ .Values.core.serviceAccount.automountServiceAccountToken | default false }}
      {{- with (.Values.core.priorityClassName | default .Values.global.priorityClassName) }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.core.podSecurityContext | nindent 8 }}
      {{- with .Values.core.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: core
          securityContext:
            {{- toYaml .Values.core.securityContext | nindent 12 }}
          image: {{ include "harbor.image" (dict "imageRoot" .Values.core.image "global" .Values.image "chart" .Chart) }}
          imagePullPolicy: {{ include "harbor.imagePullPolicy" . }}
          ports:
            - name: core-http
              containerPort: 8080
              protocol: TCP
            - name: {{ include "harbor.metrics.portName" . | quote }}
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "harbor.fullname" . }}-core
            {{- /* Always the generated Secret: it carries the chart-managed
                  keys (CSRF_KEY, REGISTRY_CREDENTIAL_PASSWORD, trace
                  password) plus free-form `core.secret` entries. Pinned
                  keys are overridden per-key via explicit env below —
                  explicit env always beats envFrom. */}}
            - secretRef:
                name: {{ include "harbor.core" . }}
          env:
            {{- if .Values.existingSecretAdminPassword }}
            - name: HARBOR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecretAdminPassword }}
                  key: {{ .Values.existingSecretAdminPasswordKey | default "HARBOR_ADMIN_PASSWORD" }}
            {{- end }}
            {{- if .Values.core.existingXsrfSecret }}
            - name: CSRF_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.core.existingXsrfSecret }}
                  key: {{ .Values.core.existingXsrfSecretKey | default "CSRF_KEY" }}
            {{- end }}
            {{- if .Values.registry.credentials.existingSecret }}
            - name: REGISTRY_CREDENTIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.registry.credentials.existingSecret }}
                  key: REGISTRY_CREDENTIAL_PASSWORD
            {{- end }}
            - name: CORE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.core.existingSecret | default (include "harbor.core" .) }}
                  key: {{ .Values.core.existingSecretKey | default "secret" }}
            {{- /* SECRET_KEY: if existingSecretSecretKey is set, pull from there;
                  else it lives in the generated core Secret under `SECRET_KEY`. */}}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.existingSecretSecretKey }}
                  name: {{ .Values.existingSecretSecretKey }}
                  key: {{ .Values.existingSecretSecretKeyKey | default "secretKey" }}
                  {{- else }}
                  name: {{ include "harbor.core" . }}
                  key: SECRET_KEY
                  {{- end }}
            - name: JOBSERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jobservice.existingSecret | default (include "harbor.jobservice" .) }}
                  key: {{ .Values.jobservice.existingSecretKey | default "JOBSERVICE_SECRET" }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.database.secretName" . }}
                  key: {{ .Values.database.existingSecretKey | default "POSTGRESQL_PASSWORD" }}
            {{- include "harbor.database.tlsEnv" . | nindent 12 }}
            {{- $extAuth := and (not .Values.valkey.enabled) (or .Values.externalRedis.existingSecret .Values.externalRedis.password) -}}
            {{- if or .Values.valkey.auth.enabled $extAuth }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.redis.secretName" . }}
                  key: {{ include "harbor.redis.secretKey" . }}
            {{- end }}
            {{- /* Explicit env, AFTER REDIS_PASSWORD: Kubernetes expands
                  $(REDIS_PASSWORD) only in env values defined later in
                  the list — and never in envFrom (ConfigMap) values. */}}
            - name: _REDIS_URL_CORE
              value: {{ include "harbor.redis.url.core" . | quote }}
            - name: _REDIS_URL_REG
              value: {{ include "harbor.redis.url.registry" . | quote }}
            - name: _REDIS_URL_HARBOR
              value: {{ include "harbor.redis.url.harbor" . | quote }}
            - name: _REDIS_URL_CACHE_LAYER
              value: {{ include "harbor.redis.url.cache" . | quote }}
            {{- include "harbor.extraCA.env" . | nindent 12 }}
            {{- with .Values.core.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "harbor.probes" .Values.core.probes | nindent 10 }}
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
          {{- with .Values.core.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/core/app.conf
              subPath: app.conf
            - name: secret-key
              mountPath: /etc/core/key
              subPath: key
            - name: token-service-private-key
              mountPath: /etc/core/private_key.pem
              subPath: tls.key
            - name: psc
              mountPath: /etc/core/token
            - name: tmp
              mountPath: /tmp
            {{- include "harbor.database.tlsVolumeMount" . | nindent 12 }}
            {{- include "harbor.extraCA.volumeMount" . | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "harbor.fullname" . }}-core
            items:
              - key: app.conf
                path: app.conf
            optional: true
        - name: secret-key
          secret:
            {{- if .Values.existingSecretSecretKey }}
            secretName: {{ .Values.existingSecretSecretKey }}
            items:
              - key: {{ .Values.existingSecretSecretKeyKey | default "secretKey" }}
                path: key
            {{- else if .Values.core.existingSecret }}
            secretName: {{ .Values.core.existingSecret }}
            items:
              - key: {{ .Values.core.existingSecretKey | default "secret" }}
                path: key
            {{- else }}
            secretName: {{ include "harbor.core" . }}
            items:
              - key: secretKey
                path: key
            {{- end }}
        - name: token-service-private-key
          secret:
            {{- if .Values.core.tokenSecretName }}
            secretName: {{ .Values.core.tokenSecretName }}
            {{- else }}
            secretName: {{ template "harbor.core" . }}
            {{- end }}
        - name: psc
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- include "harbor.database.tlsVolume" . | nindent 8 }}
        {{- include "harbor.extraCA.volume" . | nindent 8 }}
      {{- include "harbor.podScheduling" (dict "component" .Values.core "root" $) | nindent 6 }}
