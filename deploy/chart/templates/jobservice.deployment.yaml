apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor.fullname" . }}-jobservice
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "jobservice") | nindent 4 }}
spec:
  {{- if not (and .Values.jobservice.autoscaling .Values.jobservice.autoscaling.enabled) }}
  replicas: {{ .Values.jobservice.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.jobservice.revisionHistoryLimit | default .Values.global.revisionHistoryLimit }}
  {{- with .Values.jobservice.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "jobservice") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/jobservice.configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/jobservice.secret.yaml") . | sha256sum }}
        {{- with .Values.jobservice.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "jobservice") | nindent 8 }}
        {{- with .Values.jobservice.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "harbor.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "harbor.serviceAccountName" (dict "root" . "component" "jobservice" "serviceAccount" .Values.jobservice.serviceAccount) }}
      automountServiceAccountToken: {{ .Values.jobservice.serviceAccount.automountServiceAccountToken | default false }}
      {{- with (.Values.jobservice.priorityClassName | default .Values.global.priorityClassName) }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.jobservice.podSecurityContext | nindent 8 }}
      {{- with .Values.jobservice.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: jobservice
          securityContext:
            {{- toYaml .Values.jobservice.securityContext | nindent 12 }}
          image: {{ include "harbor.image" (dict "imageRoot" .Values.jobservice.image "global" .Values.image "chart" .Chart) }}
          imagePullPolicy: {{ include "harbor.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ template "harbor.jobservice" . }}-env
            - secretRef:
                name: {{ include "harbor.fullname" . }}-jobservice
          env:
            - name: CORE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.core.existingSecret | default (include "harbor.core" .) }}
                  key: {{ .Values.core.existingSecretKey | default "secret" }}
            {{- $extAuth := and (not .Values.valkey.enabled) (or .Values.externalRedis.existingSecret .Values.externalRedis.password) -}}
            {{- if or .Values.valkey.auth.enabled $extAuth }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.redis.secretName" . }}
                  key: {{ include "harbor.redis.secretKey" . }}
            {{- end }}
            {{- /* Jobservice config loader honors JOB_SERVICE_POOL_REDIS_URL env override
                   (see src/jobservice/config/config.go loadEnvs). Inject the full URL with
                   auth here so the user's `jobservice.config.worker_pool.redis_pool.redis_url`
                   is overridden at runtime with chart-computed credentials. */}}
            - name: JOB_SERVICE_POOL_REDIS_URL
              value: {{ include "harbor.redis.url.jobservice" . | quote }}
            {{- if eq (include "harbor.database.tlsEnabled" .) "true" }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.database.secretName" . }}
                  key: {{ .Values.database.existingSecretKey | default "POSTGRESQL_PASSWORD" }}
            {{- include "harbor.database.tlsEnv" . | nindent 12 }}
            {{- end }}
            {{- include "harbor.extraCA.env" . | nindent 12 }}
            {{- with .Values.jobservice.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "harbor.probes" .Values.jobservice.probes | nindent 10 }}
          resources:
            {{- toYaml .Values.jobservice.resources | nindent 12 }}
          {{- with .Values.jobservice.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: jobservice-config
              mountPath: /etc/jobservice/config.yml
              subPath: config.yml
            - name: job-logs
              mountPath: /var/log/jobs
            - name: tmp
              mountPath: /tmp
            {{- include "harbor.database.tlsVolumeMount" . | nindent 12 }}
            {{- include "harbor.extraCA.volumeMount" . | nindent 12 }}
      volumes:
        - name: jobservice-config
          configMap:
            name: {{ .Values.jobservice.existingConfigMap | default (include "harbor.jobservice" .) }}
        - name: job-logs
          {{- if and .Values.jobservice.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.jobservice.persistence.existingClaim | default (include "harbor.jobservice" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- include "harbor.database.tlsVolume" . | nindent 8 }}
        {{- include "harbor.extraCA.volume" . | nindent 8 }}
      {{- include "harbor.podScheduling" (dict "component" .Values.jobservice "root" $) | nindent 6 }}
