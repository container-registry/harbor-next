{{- if .Values.trivy.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "harbor.fullname" . }}-trivy
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "trivy") | nindent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" .Values.trivy.annotations)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not (and .Values.trivy.autoscaling .Values.trivy.autoscaling.enabled) }}
  replicas: {{ .Values.trivy.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.trivy.revisionHistoryLimit | default .Values.global.revisionHistoryLimit }}
  serviceName: {{ include "harbor.fullname" . }}-trivy
  selector:
    matchLabels:
      {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "trivy") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/trivy.secret.yaml") . | sha256sum }}
        checksum/configmap-env: {{ include (print $.Template.BasePath "/trivy.configmap-env.yaml") . | sha256sum }}
        checksum/secret-env: {{ include (print $.Template.BasePath "/trivy.secret-env.yaml") . | sha256sum }}
        {{- with (include "harbor.annotations" (dict "root" . "local" .Values.trivy.podAnnotations)) }}
        {{- . | nindent 8 }}
        {{- end }}
      labels:
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.trivy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "trivy") | nindent 8 }}
    spec:
      {{- include "harbor.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "harbor.serviceAccountName" (dict "root" . "component" "trivy" "serviceAccount" .Values.trivy.serviceAccount) }}
      automountServiceAccountToken: {{ .Values.trivy.serviceAccount.automountServiceAccountToken | default false }}
      {{- with (.Values.trivy.priorityClassName | default .Values.global.priorityClassName) }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.trivy.podSecurityContext | nindent 8 }}
      {{- with .Values.trivy.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: trivy
          securityContext:
            {{- toYaml .Values.trivy.securityContext | nindent 12 }}
          image: {{ include "harbor.image" (dict "imageRoot" .Values.trivy.image "component" "trivy" "root" .) }}
          imagePullPolicy: {{ include "harbor.imagePullPolicy" . }}
          {{- if or .Values.trivy.config .Values.trivy.secret }}
          envFrom:
            {{- if .Values.trivy.config }}
            - configMapRef:
                name: "{{ include "harbor.trivy" . }}-env"
            {{- end }}
            {{- if .Values.trivy.secret }}
            - secretRef:
                name: "{{ include "harbor.trivy" . }}-env"
            {{- end }}
          {{- end }}
          env:
          {{- if has "trivy" .Values.proxy.components }}
            - name: HTTP_PROXY
              value: "{{ .Values.proxy.httpProxy }}"
            - name: HTTPS_PROXY
              value: "{{ .Values.proxy.httpsProxy }}"
            - name: NO_PROXY
              value: "{{ include "harbor.noProxy" . }}"
          {{- end }}
            - name: "SCANNER_LOG_LEVEL"
              value: {{ .Values.logLevel | quote }}
            - name: "SCANNER_TRIVY_CACHE_DIR"
              value: "/home/scanner/.cache/trivy"
            - name: "SCANNER_TRIVY_REPORTS_DIR"
              value: "/home/scanner/.cache/reports"
            - name: "SCANNER_TRIVY_DEBUG_MODE"
              value: {{ .Values.trivy.debugMode | quote }}
            - name: "SCANNER_TRIVY_VULN_TYPE"
              value: {{ .Values.trivy.vulnType | quote }}
            - name: "SCANNER_TRIVY_TIMEOUT"
              value: {{ .Values.trivy.timeout | quote }}
            - name: "SCANNER_TRIVY_GITHUB_TOKEN"
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.fullname" . }}-trivy
                  key: gitHubToken
            - name: "SCANNER_TRIVY_SEVERITY"
              value: {{ .Values.trivy.severity | quote }}
            - name: "SCANNER_TRIVY_IGNORE_UNFIXED"
              value: {{ .Values.trivy.ignoreUnfixed | default false | quote }}
            - name: "SCANNER_TRIVY_SKIP_UPDATE"
              value: {{ .Values.trivy.skipUpdate | default false | quote }}
            - name: "SCANNER_TRIVY_SKIP_JAVA_DB_UPDATE"
              value: {{ .Values.trivy.skipJavaDBUpdate | default false | quote }}
            - name: "SCANNER_TRIVY_DB_REPOSITORY"
              value: {{ .Values.trivy.dbRepository | join "," | quote }}
            - name: "SCANNER_TRIVY_JAVA_DB_REPOSITORY"
              value: {{ .Values.trivy.javaDBRepository | join "," | quote }}
            - name: "SCANNER_TRIVY_OFFLINE_SCAN"
              value: {{ .Values.trivy.offlineScan | default false | quote }}
            - name: "SCANNER_TRIVY_SECURITY_CHECKS"
              value: {{ .Values.trivy.securityCheck | quote }}
            - name: "SCANNER_TRIVY_INSECURE"
              value: {{ .Values.trivy.insecure | default false | quote }}
            - name: SCANNER_API_SERVER_ADDR
              value: ":8080"
            {{- /* REDIS_PASSWORD must precede the URL envs: Kubernetes
                  expands $(REDIS_PASSWORD) only in env values defined
                  later in the list — and never inside Secret values,
                  which is why these are NOT secretKeyRefs. The URL
                  itself is not sensitive; the password stays in a
                  Secret. */}}
            {{- $extAuth := and (not .Values.valkey.enabled) (or .Values.externalRedis.existingSecret .Values.externalRedis.password) -}}
            {{- if or .Values.valkey.auth.enabled $extAuth }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.redis.secretName" . }}
                  key: {{ include "harbor.redis.secretKey" . }}
            {{- end }}
            - name: "SCANNER_REDIS_URL"
              value: {{ include "harbor.redis.url.trivy" . | quote }}
            - name: "SCANNER_STORE_REDIS_URL"
              value: {{ include "harbor.redis.url.trivy" . | quote }}
            - name: "SCANNER_JOB_QUEUE_REDIS_URL"
              value: {{ include "harbor.redis.url.trivy" . | quote }}
            {{- include "harbor.extraCA.env" . | nindent 12 }}
            {{- with .Values.trivy.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: api-server
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /home/scanner/.cache
              readOnly: false
            {{- include "harbor.extraCA.volumeMount" . | nindent 12 }}
          {{- include "harbor.probes" .Values.trivy.probes | nindent 10 }}
          resources:
            {{- toYaml .Values.trivy.resources | nindent 12 }}
          {{- with .Values.trivy.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
      {{- if and .Values.trivy.persistence.enabled .Values.trivy.persistence.existingClaim }}
      - name: "data"
        persistentVolumeClaim:
          claimName: {{ .Values.trivy.persistence.existingClaim }}
      {{- else if not .Values.trivy.persistence.enabled }}
      - name: "data"
        emptyDir: {}
      {{- end }}
      {{- include "harbor.extraCA.volume" . | nindent 6 }}
      {{- include "harbor.podScheduling" (dict "component" .Values.trivy "root" $) | nindent 6 }}
{{- if and .Values.trivy.persistence.enabled (not .Values.trivy.persistence.existingClaim) }}
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: data
      labels:
        {{- include "harbor.componentLabels" (dict "root" . "component" "trivy") | nindent 8 }}
      {{- with .Values.trivy.persistence.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
        {{- toYaml .Values.trivy.persistence.accessModes | nindent 8 }}
      {{- if hasKey .Values.trivy.persistence "storageClass" }}
      storageClassName: {{ .Values.trivy.persistence.storageClass | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.trivy.persistence.size | quote }}
{{- end }}
{{- end }}
