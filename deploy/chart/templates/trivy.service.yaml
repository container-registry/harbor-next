{{ if .Values.trivy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ template "harbor.trivy" . }}"
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "trivy") | nindent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" nil)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - name: http-trivy
      protocol: TCP
      port: 8080
  selector:
    {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "trivy") | nindent 4 }}
{{ end }}
