{{- if .Values.trivy.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "harbor.trivy" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "trivy") | nindent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" nil)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  gitHubToken: {{  .Values.trivy.gitHubToken | default "" | b64enc | quote }}
{{- end }}
