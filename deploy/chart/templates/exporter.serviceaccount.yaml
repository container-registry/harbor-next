{{- if and .Values.exporter.enabled .Values.exporter.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "harbor.serviceAccountName" (dict "root" . "component" "exporter" "serviceAccount" .Values.exporter.serviceAccount) }}
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "exporter") | nindent 4 }}
  {{- with .Values.exporter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
