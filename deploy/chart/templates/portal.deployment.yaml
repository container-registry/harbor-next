{{- if .Values.portal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor.fullname" . }}-portal
  labels:
    {{- include "harbor.componentLabels" (dict "root" . "component" "portal") | nindent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" .Values.portal.annotations)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not (and .Values.portal.autoscaling .Values.portal.autoscaling.enabled) }}
  replicas: {{ .Values.portal.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.portal.revisionHistoryLimit | default .Values.global.revisionHistoryLimit }}
  {{- with .Values.portal.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "portal") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/portal.configmap.yaml") . | sha256sum }}
        {{- with (include "harbor.annotations" (dict "root" . "local" .Values.portal.podAnnotations)) }}
        {{- . | nindent 8 }}
        {{- end }}
      labels:
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.portal.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "harbor.componentSelectorLabels" (dict "root" . "component" "portal") | nindent 8 }}
    spec:
      {{- include "harbor.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "harbor.serviceAccountName" (dict "root" . "component" "portal" "serviceAccount" .Values.portal.serviceAccount) }}
      automountServiceAccountToken: {{ .Values.portal.serviceAccount.automountServiceAccountToken | default false }}
      {{- with (.Values.portal.priorityClassName | default .Values.global.priorityClassName) }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.portal.podSecurityContext | nindent 8 }}
      {{- with .Values.portal.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: portal
          securityContext:
            {{- toYaml .Values.portal.securityContext | nindent 12 }}
          image: {{ include "harbor.image" (dict "imageRoot" .Values.portal.image "component" "portal" "root" .) }}
          imagePullPolicy: {{ include "harbor.imagePullPolicy" . }}
          ports:
            - name: portal-http
              containerPort: 8080
              protocol: TCP
          env:
            {{- with .Values.portal.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "harbor.probes" .Values.portal.probes | nindent 10 }}
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
          {{- with .Values.portal.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: portal-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - mountPath: /tmp
              name: tmp
      volumes:
        - name: portal-config
          configMap:
            name: {{ .Values.portal.existingConfigMap | default (include "harbor.portal" .) }}
        - name: tmp
          emptyDir: {}
      {{- include "harbor.podScheduling" (dict "component" .Values.portal "root" $) | nindent 6 }}
{{- end }}
