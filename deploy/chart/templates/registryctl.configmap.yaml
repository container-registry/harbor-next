apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "harbor.fullname" . }}-registryctl
  labels:
{{ include "harbor.labels" . | indent 4 }}
  {{- with (include "harbor.annotations" (dict "root" . "local" nil)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  _PLACEHOLDER: "true"
  {{- template "harbor.trace.envs.registryctl" . }}
