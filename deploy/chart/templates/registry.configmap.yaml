{{- if not .Values.registry.existingConfigMap }}
{{- $chartConfig := include "harbor.registry.chartManagedConfig" . | fromYaml }}
{{- $userConfig := deepCopy (.Values.registry.config | default dict) }}
{{- $merged := mustMergeOverwrite $chartConfig $userConfig }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "harbor.fullname" . }}-registry
  labels:
{{ include "harbor.labels" . | indent 4 }}
data:
  config.yml: |+
{{ toYaml $merged | indent 4 }}
  ctl-config.yml: |+
    ---
    protocol: "http"
    port: 8080
    log_level: {{ .Values.logLevel }}
    registry_config: "/etc/registry/config.yml"
{{- end }}
