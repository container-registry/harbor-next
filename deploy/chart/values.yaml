# ============================================================================
# HARBOR NEXT HELM CHART - VALUES
# ============================================================================
# This chart uses the `toEnvVars` pattern for configuration.
# Any Harbor config option can be set via component config/secret sections
# without requiring chart updates.
# ============================================================================

# ============================================================================
# 1. GLOBAL SETTINGS
# ============================================================================
# -- Credentials to pull images
# imageCredentials:
#   registry: xyz.com
#   username: xxx
#   password: yyy
#   email: zzz@xyz.com
imageCredentials: {}

# -- Global image settings
image:
  # -- Image pull policy for all Harbor components
  pullPolicy: IfNotPresent

# -- List of image pull secrets
# @default -- []
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""

# -- Override the full name
fullnameOverride: ""

# -- External URL for Harbor (REQUIRED)
# This is the URL users will use to access Harbor (e.g., https://harbor.example.com)
# @default -- ""
externalURL: ""

# -- Log level for all components (debug, info, warning, error, fatal)
logLevel: info

# -- Harbor admin password (initial setup)
# @default -- "Harbor12345"
harborAdminPassword: "Harbor12345"

# -- Secret key for encryption (16 characters)
# Used for encrypting credentials stored in the database
# @default -- auto-generated
secretKey: ""

# The proxy settings for updating trivy vulnerabilities from the Internet and replicating
# artifacts from/to the registries that cannot be reached directly
proxy:
  httpProxy:
  httpsProxy:
  noProxy: 127.0.0.1,localhost,.local,.internal
  components:
    - core
    - jobservice
    - trivy

# ============================================================================
# 2. INGRESS / GATEWAY
# ============================================================================

# -- Ingress configuration
ingress:
  # tls certificate auto-generated
  autoGenCert: true
  # -- Enable ingress
  enabled: true
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # -- Harbor core hostname (REQUIRED when ingress enabled)
  core: ""
  # -- Additional ingress hosts
  hosts: []
    # - host: harbor.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - secretName: harbor-tls
    #   hosts:
    #     - harbor.example.com

# -- Gateway API configuration (alternative to ingress)
gateway:
  # -- Enable Gateway API HTTPRoute
  enabled: false
  # -- Gateway parent references
  parentRefs: []
    # - name: my-gateway
    #   namespace: default
  # -- Hostnames for the HTTPRoute
  hostnames: []
    # - harbor.example.com

ipFamily:
  # ipv6Enabled set to true if ipv6 is enabled in cluster, currently it affected the nginx related component
  ipv6:
    enabled: true
  # ipv4Enabled set to true if ipv4 is enabled in cluster, currently it affected the nginx related component
  ipv4:
    enabled: true

# ============================================================================
# 3. HARBOR COMPONENTS
# ============================================================================
# Pattern per component:
#   config: {} -> ConfigMap (via toEnvVars)
#   secret: {} -> Secret (via toEnvVars)
#   extraEnv: [] -> Additional env vars with valueFrom support
#   K8s settings: image, replicas, resources, etc.
# ============================================================================

# --- Core ---
core:
  # -- Harbor Core application config (converted to env vars in ConfigMap)
  # Any Harbor Core config can be set here without chart changes
  # @default -- {}
  config: {}
    # Example: CSRF protection, token expiration, etc.
    # csrf_key: ""
    # token_expiration: 30

  # -- Sensitive config for Core (converted to env vars in Secret)
  # @default -- {}
  secret: {}
  # -- Use existing secret for Core secret
  existingSecret: ""
  # -- Key in existing secret containing the Core secret
  existingSecretKey: "secret"

  # -- Extra environment variables with valueFrom support
  # @default -- []
  extraEnv: []
    # - name: MY_SECRET
    #   valueFrom:
    #     secretKeyRef:
    #       name: my-secret
    #       key: value

  # -- Core image settings
  image:
    # -- Core image repository
    repository: 8gears.container-registry.com/8gcr/harbor-core
    # -- Core image tag (defaults to appVersion)
    tag: ""

  # -- Number of Core replicas
  replicas: 1

  # -- Core resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # -- Node selector for Core pods
  nodeSelector: {}

  # -- Tolerations for Core pods
  tolerations: []

  # -- Affinity rules for Core pods
  affinity: {}

  # -- Additional pod annotations for Core
  podAnnotations: {}

  # -- Additional pod labels for Core
  podLabels: {}

  # -- Service account settings for Core
  serviceAccount:
    # -- Create a service account for Core
    create: true
    # -- Service account name (auto-generated if empty)
    name: ""
    # -- Service account annotations
    annotations: {}

  # -- PodDisruptionBudget for Core
  pdb:
    # -- Enable PodDisruptionBudget
    enabled: false
    # -- Minimum available pods (can be integer or percentage)
    minAvailable: 1
    # -- Maximum unavailable pods (alternative to minAvailable)
    # maxUnavailable: 1

  # -- Security context for Core container
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    runAsGroup: 10000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # -- Pod security context for Core
  podSecurityContext:
    fsGroup: 10000

# --- Registry ---
registry:
  # -- If true, the registry returns relative URLs in Location headers
  relativeurls: false
  # -- Registry application config (converted to env vars in ConfigMap)
  # @default -- {}
  upload_purging:
    enabled: true
    age: 168h
    interval: 24h
    dryrun: false
  config: {}
  credentials:
    username: "harbor_registry_user"
    password: ""
    existingSecret: ""
    htpasswdString: ""
  # -- Registry storage configuration
  storage:
    disableredirect: false
    # -- Storage type: filesystem, s3, azure, gcs, oss
    type: filesystem
    # -- Filesystem storage settings
    filesystem:
      rootdirectory: /storage
      subPath: ""
    # -- S3 storage settings
    s3: {}
      # region: us-east-1
      # bucket: my-harbor-bucket
      # accesskey: ""
      # secretkey: ""
      # regionendpoint: ""
      # encrypt: false
      # secure: true
      # v4auth: true
      # chunksize: 5242880
      # rootdirectory: ""
    # -- Azure Blob storage settings
    azure: {}
      # accountname: ""
      # accountkey: ""
      # container: ""
      # realm: core.windows.net
    # -- Google Cloud Storage settings
    gcs: {}
      # bucket: ""
      # keyfile: ""
      # rootdirectory: ""
      # chunksize: 5242880
    # -- Alibaba Cloud OSS settings
    oss: {}
      # accesskeyid: ""
      # accesskeysecret: ""
      # region: ""
      # bucket: ""
      # endpoint: ""
      # internal: false
      # encrypt: false
      # secure: true
      # chunksize: 10485760
      # rootdirectory: ""

  # -- Sensitive config for Registry (converted to env vars in Secret)
  # @default -- {}
  secret: {}

  # -- Extra environment variables with valueFrom support
  # @default -- []
  extraEnv: []

  # -- Registry image settings
  image:
    # -- Registry image repository
    repository: 8gears.container-registry.com/8gcr/harbor-registry
    # -- Registry image tag (defaults to appVersion)
    tag: ""

  # -- Registryctl image settings
  controller:
    image:
      # -- Registryctl image repository
      repository: 8gears.container-registry.com/8gcr/harbor-registryctl
      # -- Registryctl image tag (defaults to appVersion)
      tag: ""

  # -- Number of Registry replicas
  replicas: 1

  # -- Registry persistence settings
  persistence:
    # -- Enable persistence for registry
    enabled: false
    # -- Storage class for PVC
    storageClass: ""
    # -- PVC access modes
    accessModes:
      - ReadWriteOnce
    # -- PVC size
    size: 10Gi
    # -- Existing PVC name (disables dynamic provisioning)
    existingClaim: ""
    # -- Annotations for PVC
    annotations: {}

  # -- Registry resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # -- Node selector for Registry pods
  nodeSelector: {}

  # -- Tolerations for Registry pods
  tolerations: []

  # -- Affinity rules for Registry pods
  affinity: {}

  # -- Additional pod annotations for Registry
  podAnnotations: {}

  # -- Additional pod labels for Registry
  podLabels: {}

  # -- Service account settings for Registry
  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # -- PodDisruptionBudget for Registry
  pdb:
    # -- Enable PodDisruptionBudget
    enabled: false
    # -- Minimum available pods (can be integer or percentage)
    minAvailable: 1
    # -- Maximum unavailable pods (alternative to minAvailable)
    # maxUnavailable: 1

  # -- Security context for Registry container
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    runAsGroup: 10000
    # readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # -- Pod security context for Registry
  podSecurityContext:
    fsGroup: 10000
    fsGroupChangePolicy: OnRootMismatch

# --- Portal ---
portal:
  # -- Portal application config (converted to env vars in ConfigMap)
  # @default -- {}
  config: {}

  # -- Sensitive config for Portal (converted to env vars in Secret)
  # @default -- {}
  secret: {}

  # -- Extra environment variables with valueFrom support
  # @default -- []
  extraEnv: []

  # -- Portal image settings
  image:
    # -- Portal image repository
    repository: 8gears.container-registry.com/8gcr/harbor-portal
