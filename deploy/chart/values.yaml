  # — see src/jobservice/config/config.go). You MUST set them in this
  # block; changing `.Values.logLevel` or `.Values.metrics.enabled`
  # globally will NOT propagate here:
  #   - `metric.enabled`, `metric.path`, `metric.port`
  #   - `loggers[].level`, `job_loggers[].level`
  #   - `job_loggers[].sweeper.*`
  #   - `reaper.*`
  #   - `max_retrieve_size_mb`
  # @default -- See [values.yaml](values.yaml)
  config:
    protocol: http
    port: 8080
    worker_pool:
      workers: 4
      backend: redis
      redis_pool:
        # redis_url overridden via JOB_SERVICE_POOL_REDIS_URL env at runtime
        namespace: harbor_job_service_namespace
        idle_timeout_second: 3600
    job_loggers:
      - name: FILE
        level: INFO
        settings:
          base_dir: /var/log/jobs
        sweeper:
          duration: 14
          settings:
            work_dir: /var/log/jobs
    loggers:
      - name: STD_OUTPUT
        level: INFO
    reaper:
      max_update_hours: 24
      max_dangling_hours: 168
    # Uncomment to enable Prometheus scraping (mirror .Values.metrics.enabled):
    # metric:
