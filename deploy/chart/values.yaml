jobservice:
  # -- Use an externally-managed ConfigMap containing `config.yml` instead
  # of generating one from `config:` below. Semantics match
  # `registry.existingConfigMap`.
  existingConfigMap: ""

  # -- Full Harbor jobservice `config.yml` passed through verbatim. Used
  # only when `existingConfigMap` is empty.
  #
  # Chart-managed values injected via env-var override at runtime:
  #   - `protocol`, `port` (from chart helpers)
  #   - `worker_pool.backend`, `worker_pool.workers` (when JOB_SERVICE_*
  #     env vars are wired by the chart)
  #   - `worker_pool.redis_pool.redis_url` (chart sets the URL with auth
  #     via JOB_SERVICE_POOL_REDIS_URL; you can leave a placeholder here)
  #   - `worker_pool.redis_pool.namespace`
  #
