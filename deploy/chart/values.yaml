# ============================================================================
# HARBOR NEXT HELM CHART - VALUES
# ============================================================================
# This chart uses the `toEnvVars` pattern for configuration.
# Any Harbor config option can be set via component config/secret sections
# without requiring chart updates.
# ============================================================================

# ============================================================================
# 1. GLOBAL SETTINGS
# ============================================================================

# -- Global defaults inherited by all components
global:
  # -- Number of old ReplicaSets to retain (K8s default is 10)
  revisionHistoryLimit: 3
  # -- Priority class name for all component pods
  priorityClassName: ""
  # -- Override the registry host for ALL component images at once (air-gap /
  # mirror). When set it wins over per-component `image.registry` and
  # `image.source`. Repository paths are preserved, so a flat mirror works
  # (`global.imageRegistry=mirror.io` -> `mirror.io/8gcr/harbor-core`). Propagated
  # to subcharts; the valkey subchart image must be mirrored/overridden separately
  # (it may not honor this).
  imageRegistry: ""

# -- Annotations to add to all resources this chart deploys. `checksum/*` keys are
# reserved by the chart (used for config/secret-driven pod rollout) — setting one
# here renders a duplicate key on pod templates.
commonAnnotations: {}
# -- Labels to add to all resources this chart deploys. Never applied to selectors
# (`spec.selector` / `matchLabels` stay immutable).
commonLabels: {}

# -- Credentials to pull images
# imageCredentials:
#   registry: xyz.com
#   username: xxx
#   password: yyy
#   email: zzz@xyz.com
imageCredentials: {}

# -- Global image settings
image:
  # -- Image source preset: `8gcr` (Harbor Next builds, default) or `upstream`
  # (docker.io/goharbor/*). Selects the registry + per-component repository for
  # every component. Per-component `image.registry`/`image.repository` override
  # it; `global.imageRegistry` overrides the registry on top. See the
  # `harbor.image.sourceMap` helper for the exact map (upstream renames the
  # registry image to `registry-photon` and trivy to `trivy-adapter-photon`).
  source: 8gcr
  # -- Image pull policy for all Harbor components
  pullPolicy: IfNotPresent

# -- List of image pull secrets
# @default -- []
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""

# -- Override the full name
fullnameOverride: ""

# -- External URL for Harbor (REQUIRED)
# This is the URL users will use to access Harbor (e.g., https://harbor.example.com)
# @default -- ""
externalURL: ""

# -- Log level for all components (debug, info, warning, error, fatal)
logLevel: info

# -- Harbor admin password (initial setup).
# **REQUIRED** unless `existingSecretAdminPassword` is set.
# Do not use the legacy default `Harbor12345` — it is publicly known.
# For production reference a pre-created Secret via
# `existingSecretAdminPassword` rather than passing the value here.
# Rotate from the Harbor UI after first login.
harborAdminPassword: ""

# -- Secret key for encryption (16 characters)
# Used for encrypting credentials stored in the database
# @default -- auto-generated
secretKey: ""

# -- Existing secret containing the admin password (overrides harborAdminPassword)
existingSecretAdminPassword: ""
# -- Key in the existing secret for admin password
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

# -- Allow the chart to auto-generate secret material it needs
# (encryption key, component identity secrets, CSRF key, token-service
# CA, registry htpasswd, ingress certificate). Convenient for
# `helm install`, but the generated values are random per render: GitOps
# engines that template client-side (Argo CD) rotate them on every sync
# and roll every workload. Set to `false` to instead **fail at render
# time** naming the value that must be pinned — see the GitOps section
# in the README and `example/flux/`.
autoGenSecrets: true

# -- Existing secret containing the encryption key (overrides secretKey).
# The secret must hold the 16-char key under `SECRET_KEY` and `secretKey`
# (or override the key name via `existingSecretSecretKeyKey`).
existingSecretSecretKey: ""
# -- Key in `existingSecretSecretKey` that holds the encryption key.
# Used both for the `SECRET_KEY` env on core and the `secret-key`
# volume mount (which Harbor reads as `/etc/core/key`).
existingSecretSecretKeyKey: "secretKey"

# -- Cache configuration (Redis-based caching for manifests)
cache:
  # -- Enable Redis caching
  enabled: false
  # -- Cache expiration in hours
  expireHours: 24

# The proxy settings for updating trivy vulnerabilities from the Internet and replicating
# artifacts from/to the registries that cannot be reached directly
proxy:
  httpProxy:
  httpsProxy:
  noProxy: 127.0.0.1,localhost,.local,.internal
  components:
    - core
    - jobservice
    - trivy

# ============================================================================
# 2. EXPOSE / INGRESS / GATEWAY
# ============================================================================
# Multiple expose methods are available. Enable only one at a time (enforced by template validation):
#   - ingress (default) — Kubernetes Ingress resource
#   - gateway — Gateway API HTTPRoute
#   - expose.clusterIP — Direct ClusterIP service (for in-cluster or port-forward access)
#   - expose.nodePort — NodePort service (exposes on every node IP)
#   - expose.loadBalancer — LoadBalancer service (cloud provider external IP)
#   - expose.route — OpenShift Route

# -- Direct service exposure (ClusterIP / NodePort / LoadBalancer)
# Creates a front-door service pointing to core (which proxies portal requests).
# Internal per-component services are always created regardless of this setting.
expose:
  # -- ClusterIP service for direct exposure
  clusterIP:
    # -- Enable ClusterIP expose service
    enabled: false
    # -- Service name override (defaults to fullname)
    name: ""
    # -- Static ClusterIP (empty = auto-assigned)
    staticClusterIP: ""
    ports:
      # -- HTTP port
      http: 80
      # -- HTTPS port (only used when tls.enabled=true)
      https: 443
    # -- Service annotations
    annotations: {}
    # -- Service labels
    labels: {}

  # -- NodePort service for external access via node IPs
  nodePort:
    # -- Enable NodePort expose service
    enabled: false
    # -- Service name override (defaults to fullname)
    name: ""
    ports:
      http:
        # -- Service port for HTTP
        port: 80
        # -- NodePort for HTTP (30000-32767, empty = auto-assigned)
        nodePort: 30002
      https:
        # -- Service port for HTTPS
        port: 443
        # -- NodePort for HTTPS (30000-32767, empty = auto-assigned)
        nodePort: 30003
    # -- Service annotations
    annotations: {}
    # -- Service labels
    labels: {}

  # -- LoadBalancer service for cloud provider external access
  loadBalancer:
    # -- Enable LoadBalancer expose service
    enabled: false
    # -- Service name override (defaults to fullname)
    name: ""
    # -- Static LoadBalancer IP (empty = auto-assigned, cloud-provider dependent)
    IP: ""
    ports:
      # -- HTTP port
      http: 80
      # -- HTTPS port
      https: 443
    # -- Allowed source IP ranges
    sourceRanges: []
    # -- Service annotations
    annotations: {}
    # -- Service labels
    labels: {}

  # -- OpenShift Route for external access
  route:
    # -- Enable OpenShift Route
    enabled: false
    # -- Route hostname (empty = auto-generated by OpenShift)
    host: ""
    # -- Route annotations
    annotations: {}
    # -- Route labels
    labels: {}
    tls:
      # -- TLS termination type: edge, passthrough, or reencrypt
      termination: edge
      # -- Insecure edge termination policy: Allow, Disable, Redirect
      insecureEdgeTerminationPolicy: Redirect

# -- Ingress configuration
ingress:
  # tls certificate auto-generated
  autoGenCert: true
  # -- Enable ingress
  enabled: true
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # -- Ingress labels
  labels: {}
  # -- Hostname override used by auto-generated ingress certificate
  # Defaults to first ingress host, or externalURL hostname when ingress.hosts is empty
  core: ""
  # -- Additional ingress hosts
  hosts: []
    # - host: harbor.example.com
  # -- Ingress TLS configuration
  tls: []
    # - secretName: harbor-tls
    #   hosts:
    #     - harbor.example.com

# -- Gateway API configuration (alternative to ingress)
gateway:
  # -- Enable Gateway API HTTPRoute
  enabled: false
  # -- Gateway parent references
  parentRefs: []
    # - name: my-gateway
    #   namespace: default
  # -- Hostnames for the HTTPRoute
  hostnames: []
    # - harbor.example.com
  # -- Timeouts applied to every generated rule. Gateway API durations
  # (e.g. "0s", "3600s"). Keys: `request`, `backendRequest`. The registry
  # data path (`/v2/`) often needs a long `backendRequest` for large layer
  # pushes — set it here for all rules, or per-group under `routeOverrides`.
  timeouts: {}
    # request: 0s
    # backendRequest: 3600s
  # -- HTTPRoute filters applied to every generated rule (RequestHeaderModifier,
  # ResponseHeaderModifier, RequestRedirect, URLRewrite, ...). Prefer
  # `routeOverrides.default.filters` for portal-only headers (e.g. CSP) so the
  # registry API path is left untouched.
  filters: []
  # -- Per-group overrides keyed by route group: `core` (the /api/, /v2/, ...
  # API + data paths) and `default` (the portal / catch-all). Each group
  # accepts `timeouts` (merged over gateway.timeouts, group wins) and `filters`
  # (replaces gateway.filters for that group).
  routeOverrides: {}
    # core:
    #   timeouts:
    #     backendRequest: 3600s
    # default:
    #   filters:
    #     - type: ResponseHeaderModifier
    #       responseHeaderModifier:
    #         set:
    #           - name: Content-Security-Policy
    #             value: "default-src 'self'"
  # -- Extra HTTPRoute rules appended verbatim after the chart-managed rules.
  extraRules: []

ipFamily:
  # ipv6Enabled set to true if ipv6 is enabled in cluster, currently it affected the nginx related component
  ipv6:
    enabled: true
  # ipv4Enabled set to true if ipv4 is enabled in cluster, currently it affected the nginx related component
  ipv4:
    enabled: true

# ============================================================================
# 3. HARBOR COMPONENTS
# ============================================================================
# Pattern per component:
#   config: {} -> ConfigMap (via toEnvVars)
#   secret: {} -> Secret (via toEnvVars)
#   extraEnv: [] -> Additional env vars with valueFrom support
#   K8s settings: image, replicas, resources, etc.
# ============================================================================

# --- Core ---
core:
  # -- Harbor Core application config (converted to env vars in ConfigMap)
  # Any Harbor Core config can be set here without chart changes
  # @default -- {}
  config: {}
    # Example: CSRF protection, token expiration, etc.
    # csrf_key: ""
    # token_expiration: 30

  # -- Sensitive config for Core (converted to env vars in Secret)
  # @default -- {}
  secret: {}
  # -- Use existing secret for Core secret
  existingSecret: ""
  # -- Key in existing secret containing the Core secret
  existingSecretKey: "secret"

  # -- Existing secret for token service key/cert (must contain keys: tls.key, tls.crt)
  tokenSecretName: ""
  # -- Token private key (PEM). Auto-generated if both tokenKey and tokenCert are empty and tokenSecretName is empty.
  tokenKey: ""
  # -- Token certificate (PEM, signed by tokenKey)
  tokenCert: ""

  # -- XSRF key (auto-generated if empty)
  xsrfKey: ""
  # -- Existing secret for XSRF key
  existingXsrfSecret: ""
  # -- Key in existing XSRF secret
  existingXsrfSecretKey: CSRF_KEY

  # -- Initial user settings JSON applied on first boot
  configureUserSettings: ""

  # -- Quota update provider (db or redis)
  quotaUpdateProvider: db

  # -- Artifact pull async flush duration
  artifactPullAsyncFlushDuration: ""

  # -- GDPR settings
  gdpr:
    # -- Enable user deletion for GDPR compliance
    deleteUser: false
    # -- Enable audit logs GDPR compliance
    auditLogsCompliant: false

  # -- Container probes, rendered verbatim (full Kubernetes probe spec —
  # change paths, ports, timings, or swap httpGet for exec/grpc freely).
  # `startup` gates liveness/readiness: its 2s period makes the pod Ready
  # as soon as the endpoint responds instead of after a fixed initialDelay,
  # while the failureThreshold gives slow first boots (DB migrations) a
  # 180s budget. Disable a probe by setting it to null.
  # @default -- See [values.yaml](values.yaml)
  probes:
    startup:
      httpGet:
        path: /api/v2.0/ping
        port: core-http
      periodSeconds: 2
      failureThreshold: 90
      timeoutSeconds: 2
    readiness:
      httpGet:
        path: /api/v2.0/ping
        port: core-http
      periodSeconds: 5
      failureThreshold: 2
      timeoutSeconds: 2
    liveness:
      httpGet:
        path: /api/v2.0/ping
        port: core-http
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 3

  # -- Extra environment variables with valueFrom support
  # @default -- []
  extraEnv: []
    # - name: MY_SECRET
    #   valueFrom:
    #     secretKeyRef:
    #       name: my-secret
    #       key: value

  # -- Init containers (run before main containers)
  initContainers: []
  # -- Topology spread constraints for pod scheduling
  topologySpreadConstraints: []
  # -- Host entries injected into /etc/hosts (PodSpec.hostAliases). Use for
  # private DNS that does not exist in cluster DNS — service-mesh sidecars,
  # legacy LDAP/SMTP/proxy targets, internal CAs, etc. Format matches the
  # Kubernetes PodSpec: a list of `{ip, hostnames}` entries.
  # @default -- []
  hostAliases: []
    # - ip: "10.0.0.10"
    #   hostnames:
    #     - "ldap.internal"
    #     - "smtp.internal"
  # -- Container `lifecycle` hook spec (preStop / postStart). Common use:
  # preStop `sleep` so AWS/GCP LBs deregister the pod before SIGTERM, avoiding
  # 504s on rolling upgrades. Both hook handler shapes are accepted (`exec`,
  # `httpGet`, `tcpSocket`). Tracks upstream #1722/#1739/#2156/#2157 — all
  # closed without merge, the gap was never closed there.
  # @default -- {}
  lifecycle: {}
    # preStop:
    #   exec:
    #     command: ["/bin/sh", "-c", "sleep 15"]
  # -- Deployment strategy (empty = K8s default RollingUpdate)
  # @default -- {}
  deploymentStrategy: {}
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%

  # -- Service annotations for Core service
  serviceAnnotations: {}

  # -- Core image settings
  image:
    # -- Registry host override; empty uses `image.source` (`global.imageRegistry` wins over both)
    registry: ""
    # -- Repository override (path WITHOUT registry host); empty uses `image.source`
    repository: ""
    # -- Core image tag (defaults to appVersion)
    tag: ""
    # -- Pin by digest (sha256:...); used instead of tag when set
    digest: ""

  # -- Number of Core replicas (ignored when autoscaling.enabled=true)
  replicas: 1

  # -- HorizontalPodAutoscaler configuration. When enabled the chart
  # OMITS the static `replicas:` field on the Deployment so HPA owns
  # the replica count. `maxReplicas` is REQUIRED. Tracks upstream
  # goharbor/harbor-helm#1068.
  # @default -- See [values.yaml](values.yaml)
  autoscaling:
    enabled: false
    minReplicas: 1
    # maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    # metrics: []   # raw HPAv2 metric specs (external / object / pods)
    # behavior: {}  # scaleUp / scaleDown stabilization windows

  # -- Core resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # -- Node selector for Core pods
  nodeSelector: {}

  # -- Tolerations for Core pods
  tolerations: []

  # -- Affinity rules for Core pods
  affinity: {}

  # -- Annotations for the Core workload object (Deployment)
  annotations: {}
  # -- Additional pod annotations for Core
  podAnnotations: {}

  # -- Additional pod labels for Core
  podLabels: {}

  # -- Service account settings for Core
  serviceAccount:
    # -- Create a service account for Core
    create: true
    # -- Service account name (auto-generated if empty)
    name: ""
    # -- Service account annotations
    annotations: {}
    # -- Automount service account token
    automountServiceAccountToken: false

  # -- PodDisruptionBudget for Core
  pdb:
    # -- Enable PodDisruptionBudget. When true, exactly one of
    # `minAvailable` or `maxUnavailable` must be set (Kubernetes
    # rejects PDBs with both fields).
    enabled: false
    # -- Minimum available pods (integer or percentage). Mutually
    # exclusive with maxUnavailable.
    # minAvailable: 1
    # -- Maximum unavailable pods (integer or percentage). Mutually
    # exclusive with minAvailable.
    # maxUnavailable: 1

  # -- Security context for Core container
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    runAsGroup: 10000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # -- Pod security context for Core
  podSecurityContext:
    fsGroup: 10000

# --- Registry ---
registry:
  # -- Use an externally-managed ConfigMap containing `config.yml` and
  # `ctl-config.yml` instead of generating one from `config:` below. When
  # set, the chart skips ConfigMap generation and the Deployment mounts
  # the named ConfigMap at /etc/registry. Chart-managed runtime values
  # (redis URL with auth, HTTP secret, storage credentials from
  # `storageCredentials`, log level, ports) are still injected via env-var
  # overrides on the Deployment, so they take precedence over whatever is
  # in the external ConfigMap. Use this for kustomize/GitOps workflows
  # where `config.yml` is owned by a separate manifest pipeline.
  existingConfigMap: ""

  # -- Full [distribution/distribution](https://distribution.github.io/distribution/about/configuration/)
  # `config.yml` passed through verbatim. Used only when
  # `existingConfigMap` is empty. Replace this entire block to switch
  # storage backends or add any field distribution supports (notifications,
  # health, custom middleware, etc.).
  #
  # Chart-managed values injected via env-var override at runtime (these
  # ALWAYS win over what's in this block — do not duplicate here):
  #   - `http.addr`, `http.secret`, `http.debug.prometheus.enabled`
  #   - `redis.*` (addr, password, db, tls)
  #   - `log.level` (from `.Values.logLevel`)
  #   - storage credentials when `storageCredentials.<backend>.existingSecret` is set
  #
  # See `storageCredentials` below for the BYO-Secret pattern. For inline
  # credentials use `registry.secret` (b64-encoded into the generated
  # Secret) — do not put plaintext credentials in this block, they would
  # be visible in the ConfigMap.
  # @default -- See [values.yaml](values.yaml)
  config:
    version: 0.1
    log:
      fields:
        service: registry
    # Storage driver selection: set EXACTLY ONE driver key (s3, azure, gcs,
    # oss, ...) next to the meta keys below. The chart default deliberately
    # carries NO driver — when none is set, `filesystem: {rootdirectory:
    # /storage}` is injected at render time, and setting `s3:` here simply
    # takes its place (no need to null anything out). Defining two or more
    # drivers fails at `helm install/template` time — distribution requires
    # exactly one and would otherwise CrashLoop at boot.
    storage:
      cache:
        layerinfo: redis
      maintenance:
        uploadpurging:
          enabled: true
          age: 168h
          interval: 24h
          dryrun: false
      delete:
        enabled: true
      redirect:
        disable: false
    auth:
      htpasswd:
        realm: harbor-registry-basic-realm
        path: /etc/registry/passwd
    validation:
      disabled: true
    compatibility:
      schema1:
        enabled: true
    # Example — S3 (add under `storage:` above):
    #
    # storage:
    #   s3:
    #     region: us-east-1
    #     bucket: my-harbor-bucket
    #     # forcepathstyle: true   # MinIO / Ceph RGW / SeaweedFS
    #     # v4auth: true
    #     # encrypt: false
    #
    # Example — Azure Blob:
    #
    # storage:
    #   azure:
    #     accountname: <name>
    #     container: <container>
    #
    # Example — GCS (with keyfile):
    #
    # storage:
    #   gcs:
    #     bucket: my-bucket
    #     keyfile: /etc/registry/gcs/key.json
    #
    # Example — GCS (Workload Identity, no keyfile):
    #
    # storage:
    #   gcs:
    #     bucket: my-bucket
    #
    # Example — Alibaba OSS:
    #
    # storage:
    #   oss:
    #     accesskeyid: <id>
    #     region: <region>
    #     bucket: <bucket>

  # -- BYO Secret references for storage credentials. The chart injects
  # the credential as an env var on both `registry` and `registryctl`
  # containers; distribution honors `REGISTRY_STORAGE_<BACKEND>_<KEY>`
  # env overrides for any backend. Set the entry matching the backend you
  # configured in `config.storage`. Other entries stay empty.
  #
  # Env injection is gated only on `existingSecret` being non-empty (not
  # on which backend is active in `config:`). Setting credentials for an
  # inactive backend is harmless — distribution ignores env vars not
  # matching its active driver.
  # @default -- See [values.yaml](values.yaml)
  storageCredentials:
    s3:
      # -- Existing Secret containing AWS S3 credentials.
      existingSecret: ""
      # -- Key in `existingSecret` holding the access key ID.
      existingSecretAccessKeyKey: REGISTRY_STORAGE_S3_ACCESSKEY
      # -- Key in `existingSecret` holding the secret access key.
      existingSecretSecretKeyKey: REGISTRY_STORAGE_S3_SECRETKEY
    azure:
      # -- Existing Secret containing the Azure storage account key.
      existingSecret: ""
      # -- Key in `existingSecret` holding the account key.
      existingSecretKey: REGISTRY_STORAGE_AZURE_ACCOUNTKEY
    oss:
      # -- Existing Secret containing the Alibaba OSS access key secret.
      existingSecret: ""
      # -- Key in `existingSecret` holding the access key secret.
      existingSecretKey: REGISTRY_STORAGE_OSS_ACCESSKEYSECRET
    gcs:
      # -- Existing Secret containing the GCS service-account keyfile.
      # When set, mounted at /etc/registry/gcs/key.json — reference this
      # path from `config.storage.gcs.keyfile`. Leave empty when using
      # Workload Identity (set `serviceAccount.annotations` instead).
      existingSecret: ""
      # -- Key in `existingSecret` holding the keyfile JSON content.
      existingSecretKey: gcs-key.json

  # -- Existing Secret that supplies `REGISTRY_HTTP_SECRET`. When set,
  # the generated registry Secret omits `REGISTRY_HTTP_SECRET` and the
  # deployment reads it from this Secret via env. Independent of
  # `storageCredentials`.
  existingSecret: ""
  # -- Key in `registry.existingSecret` that holds `REGISTRY_HTTP_SECRET`.
  existingSecretKey: "REGISTRY_HTTP_SECRET"

  # Credentials core/jobservice use to authenticate against the registry.
  # Resolution order:
  #   1. `existingSecret` — BYO Secret holding BOTH
  #      `REGISTRY_CREDENTIAL_PASSWORD` (plaintext password) and
  #      `REGISTRY_HTPASSWD` (matching `<username>:<bcrypt>` htpasswd line,
  #      mounted into the registry). Nothing is generated. Deterministic.
  #   2. `htpasswdString` + `password` — fixed htpasswd line in the
  #      generated Secret. Deterministic.
  #   3. `password` only — the chart runs `htpasswd` at render time;
  #      bcrypt re-salts on every render (fails when
  #      `autoGenSecrets: false`).
  # Generate the htpasswd line with:
  #   docker run --rm --entrypoint htpasswd httpd:2 -nbB <username> <password>
  credentials:
    username: "harbor_registry_user"
    password: ""
    existingSecret: ""
    htpasswdString: ""

  # -- Sensitive config for Registry. Each key is b64-encoded into the
  # generated registry Secret and injected on both `registry` and
  # `registryctl` containers via `envFrom`. Use for inline credentials,
  # e.g.:
  #
  #     secret:
  #       REGISTRY_STORAGE_S3_ACCESSKEY: <plaintext>
  #       REGISTRY_STORAGE_S3_SECRETKEY: <plaintext>
  #
  # Prefer `storageCredentials.<backend>.existingSecret` for production
  # (External-Secrets-Operator / Vault / SealedSecrets workflows).
  # @default -- {}
  secret: {}

  # -- Extra environment variables with valueFrom support
  # @default -- []
  extraEnv: []

  # -- Init containers (run before main containers)
  initContainers: []
  # -- Topology spread constraints for pod scheduling
  topologySpreadConstraints: []
  # -- Host entries injected into /etc/hosts (PodSpec.hostAliases). Use for
  # private DNS that does not exist in cluster DNS — service-mesh sidecars,
  # legacy LDAP/SMTP/proxy targets, internal CAs, etc. Format matches the
  # Kubernetes PodSpec: a list of `{ip, hostnames}` entries.
  # @default -- []
  hostAliases: []
    # - ip: "10.0.0.10"
    #   hostnames:
    #     - "ldap.internal"
    #     - "smtp.internal"
  # -- Container `lifecycle` hook spec (preStop / postStart). Common use:
  # preStop `sleep` so AWS/GCP LBs deregister the pod before SIGTERM, avoiding
  # 504s on rolling upgrades. Both hook handler shapes are accepted (`exec`,
  # `httpGet`, `tcpSocket`). Tracks upstream #1722/#1739/#2156/#2157 — all
  # closed without merge, the gap was never closed there.
  # @default -- {}
  lifecycle: {}
    # preStop:
    #   exec:
    #     command: ["/bin/sh", "-c", "sleep 15"]
  # -- Deployment strategy (empty = K8s default RollingUpdate)
  # @default -- {}
  deploymentStrategy: {}

  # -- Registry image settings
  image:
    # -- Registry host override; empty uses `image.source` (`global.imageRegistry` wins over both)
    registry: ""
    # -- Repository override (path WITHOUT registry host); empty uses `image.source`
    repository: ""
    # -- Registry image tag (defaults to appVersion)
    tag: ""
    # -- Pin by digest (sha256:...); used instead of tag when set
    digest: ""

  # -- Probes for the registry container. Full Kubernetes probe specs,
