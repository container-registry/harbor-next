# ============================================================================
# 4. DEPENDENCIES
# ============================================================================

# --- Database (EXTERNAL ONLY) ---
database:
  # -- Database host (required)
  host: ""
  # -- Database port
  port: 5432
  # -- Database username
  username: ""
  # -- Database password (ignored if existingSecret is set)
  password: ""
  # -- Database name
  database: registry
  # -- SSL mode for database connection
  sslmode: disable
  # -- Hard cap on open connections per pool (POSTGRESQL_MAX_OPEN_CONNS).
  # Core, jobservice (via core's config), and the exporter each open their
  # own pool, so the per-release total is roughly this times the number of
  # pooled components. Lower it on small/shared PostgreSQL.
  maxOpenConns: 100
  # -- Minimum idle connections kept warm per pool (POSTGRESQL_MIN_CONNS).
  # pgxpool floor; replaces the removed maxIdleConns.
  minConns: 2
  # -- Max time a connection may sit idle before the pool closes it
  # (empty/0 keeps the pool's built-in default).
  connMaxIdleTime: "300s"
  # -- Max total lifetime before a connection is recycled, useful for
  # failover/LB hygiene (empty/0 keeps the pool's built-in default).
  connMaxLifetime: "30m"
  # -- Existing secret containing database credentials
  # Default secret key: POSTGRESQL_PASSWORD
  existingSecret: ""
  existingSecretKey: ""
  # -- Secret holding the PEM-encoded CA bundle (and optionally client
  # cert + key) for verifying / authenticating to PostgreSQL. Required
  # for `verify-ca` / `verify-full` sslmode against managed PG with a
  # private CA (RDS-with-custom-CA, GCP CloudSQL, on-prem with internal
  # PKI). Tracks upstream goharbor/harbor-helm#1859.
  #
  # Expected keys (cert-manager convention):
  #   ca.crt   — CA bundle (always required when this Secret is set)
  #   tls.crt  — client cert (only when clientCertEnabled=true)
  #   tls.key  — client key  (only when clientCertEnabled=true)
  #
  # When set, the chart mounts the Secret at /etc/harbor/db-tls and
  # injects POSTGRESQL_URL env on core + jobservice. The runtime DB
  # pool honors that env over the individual fields.
  #
  # Caveats:
  #   - Exporter does not yet plumb POSTGRESQL_URL into its viper config,
  #     so its DB connection ignores client certs (it'll work fine for
  #     sslmode=verify-ca with a publicly-trusted CA).
  #   - Harbor's migration tool (NewMigrator) does not honor cfg.URL
  #     either, so schema migrations against a server that REQUIRES
  #     mTLS will fail. Use sslmode=verify-ca or migrate via an external
  #     trusted client until that's fixed upstream.
  existingTlsSecret: ""
  # -- Include client cert + key in the auto-built POSTGRESQL_URL.
  # Set to true only when PG is configured to require client certificate
  # authentication. libpq fails if `sslcert` is set but the file is missing.
  clientCertEnabled: false

# --- Valkey (Redis-compatible) ---
valkey:
  # -- Enable Valkey subchart
  enabled: true
  # -- Valkey architecture: standalone or replication
  architecture: standalone
  # -- Valkey authentication settings
  auth:
    enabled: false
    password: ""
  fullnameOverride: "valkey"
  # -- Valkey persistence configuration
  dataStorage:
    enabled: false

  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  # -- Resources for the valkey container (subchart passthrough).
  # Set like every other component so the rendered manifests pass the
  # kube-linter requests/limits checks.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  # -- Resources for the valkey init container (subchart passthrough)
  initResources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# --- External Redis (when valkey.enabled=false) ---
externalRedis:
  # -- External Redis host
  host: ""
  # -- External Redis port
  port: 6379
  # -- External Redis username
  username: ""
  # -- External Redis password
  password: ""
  # -- Sentinel master set name (for Redis Sentinel)
  sentinelMasterSet: ""
  # -- Existing secret containing Redis password
  existingSecret: ""
  # -- Key in the existing secret that holds the Redis password
  existingSecretKey: "REDIS_PASSWORD"
  # -- TLS options for external Redis. For managed Redis with a private
  # CA (self-hosted Redis, some on-prem managed offerings, custom certs
  # via cert-manager), set `existingCaSecret` to a Secret holding the
  # CA bundle. The chart mounts it on every Harbor component at
  # `/etc/harbor/extra-ca` and sets `SSL_CERT_DIR` so Go's TLS adds it
  # to the system trust pool — so the same Secret also covers private
  # CAs used for S3 endpoints, OIDC, etc. Tracks upstream
  # goharbor/harbor-helm#549.
  tlsOptions:
    # -- Enable TLS for external Redis connection
    enable: false
    # -- Name of an existing Secret containing the CA bundle. Leave
    # empty to use only the cluster's default trust store.
    existingCaSecret: ""
    # -- Key inside `existingCaSecret` that holds the PEM-encoded CA
    # bundle. Default `ca.crt` is the convention cert-manager uses.
    existingCaSecretKey: "ca.crt"

# --- Trivy Scanner ---
trivy:
  # -- Enable Trivy scanner
  enabled: false

  # -- Trivy adapter config as env vars. Trivy is env-driven (SCANNER_*);
  # nested maps flatten to UPPER_SNAKE_CASE via toEnvVars and are injected
  # via envFrom. Any adapter setting works without chart changes.
  # @default -- {}
  config: {}

  # -- Sensitive Trivy adapter config (converted to env vars in a Secret).
  # @default -- {}
  secret: {}

  # -- Extra environment variables with valueFrom support
  # @default -- []
  extraEnv: []

  # -- Container probes, rendered verbatim. See `core.probes` for the
  # tuning rationale. Startup budget 60s covers adapter init.
  # @default -- See [values.yaml](values.yaml)
  probes:
    startup:
      httpGet:
        path: /probe/ready
        port: api-server
      periodSeconds: 2
      failureThreshold: 30
      timeoutSeconds: 2
    readiness:
      httpGet:
        path: /probe/ready
        port: api-server
      periodSeconds: 5
      failureThreshold: 2
      timeoutSeconds: 2
    liveness:
      httpGet:
        path: /probe/healthy
        port: api-server
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 3

  image:
    # -- Registry host override; empty uses `image.source` (`global.imageRegistry` wins over both)
    registry: ""
    # -- Repository override (path WITHOUT registry host); empty uses `image.source`
    repository: ""
    # -- Trivy adapter image tag (defaults to appVersion)
    tag: ""
    # -- Pin by digest (sha256:...); used instead of tag when set
    digest: ""
  # -- Number of Trivy replicas (ignored when autoscaling.enabled=true)
  replicas: 1

  # -- HorizontalPodAutoscaler for the Trivy StatefulSet. See
  # `core.autoscaling` for full docs.
  # @default -- See [values.yaml](values.yaml)
  autoscaling:
    enabled: false
    minReplicas: 1
    # maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    # metrics: []
    # behavior: {}

  # -- Trivy resource requests and limits
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  # -- Debug mode for more verbose scanning log
  debugMode: false
  dbRepository:
    - mirror.gcr.io/aquasec/trivy-db
    - ghcr.io/aquasecurity/trivy-db
  javaDBRepository:
    - mirror.gcr.io/aquasec/trivy-java-db
    - ghcr.io/aquasecurity/trivy-java-db
  securityCheck: "vuln"
  # -- Vulnerability types to scan (os,library)
  vulnType: "os,library"
  # -- Severity levels to check
  severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
  # -- Skip unfixed vulnerabilities
  ignoreUnfixed: false
  # -- Skip verifying registry certificate
  insecure: false
  # -- GitHub token to download Trivy DB (optional)
  gitHubToken: ""
  # -- Skip Java DB updates
  skipJavaDBUpdate: false
  # -- Enable offline scan mode
  offlineScan: false
  # -- Skip Trivy DB updates
  skipUpdate: false
  # -- Timeout for scanning
  timeout: "5m0s"

  # -- Init containers (run before main containers)
  initContainers: []
  # -- Topology spread constraints for pod scheduling
  topologySpreadConstraints: []
  # -- Host entries injected into /etc/hosts (PodSpec.hostAliases). Use for
  # private DNS that does not exist in cluster DNS — service-mesh sidecars,
  # legacy LDAP/SMTP/proxy targets, internal CAs, etc. Format matches the
  # Kubernetes PodSpec: a list of `{ip, hostnames}` entries.
  # @default -- []
  hostAliases: []
    # - ip: "10.0.0.10"
    #   hostnames:
    #     - "ldap.internal"
    #     - "smtp.internal"
  # -- Container `lifecycle` hook spec (preStop / postStart). Common use:
  # preStop `sleep` so AWS/GCP LBs deregister the pod before SIGTERM, avoiding
  # 504s on rolling upgrades. Both hook handler shapes are accepted (`exec`,
  # `httpGet`, `tcpSocket`). Tracks upstream #1722/#1739/#2156/#2157 — all
  # closed without merge, the gap was never closed there.
  # @default -- {}
  lifecycle: {}
    # preStop:
    #   exec:
    #     command: ["/bin/sh", "-c", "sleep 15"]

  # -- Service account settings for Trivy
  serviceAccount:
    create: false
    name: ""
    annotations: {}
    # -- Automount service account token
    automountServiceAccountToken: false

  # -- PodDisruptionBudget for Trivy
  pdb:
    # -- Enable PodDisruptionBudget. When true, exactly one of
    # `minAvailable` or `maxUnavailable` must be set (Kubernetes
    # rejects PDBs with both fields).
    enabled: false
    # -- Minimum available pods (integer or percentage). Mutually
    # exclusive with maxUnavailable.
    # minAvailable: 1
    # -- Maximum unavailable pods (integer or percentage). Mutually
    # exclusive with minAvailable.
    # maxUnavailable: 1

  # -- Node selector for Trivy pods
  nodeSelector: {}
  # -- Tolerations for Trivy pods
  tolerations: []
  # -- Affinity rules for Trivy pods
  affinity: {}
  # -- Annotations for the Trivy workload object (StatefulSet)
  annotations: {}
  # -- Additional pod annotations for Trivy
  podAnnotations: {}
  # -- Additional pod labels for Trivy
  podLabels: {}
  # -- Security context for Trivy container
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    runAsGroup: 10000
  # -- Pod security context for Trivy
  podSecurityContext:
    fsGroup: 10000

  # -- Trivy persistence settings - used for cache
  persistence:
    # -- Enable persistence for registry
    enabled: false
    # -- Storage class for PVC. Omit to use the cluster default StorageClass;
    # set to "" to opt out of any StorageClass (binds only to PVs with no class).
    # storageClass: gp3
    # -- PVC access modes
    accessModes:
      - ReadWriteOnce
    # -- PVC size
    size: 5Gi
    # -- Existing PVC name (disables dynamic provisioning)
    existingClaim: ""
    # -- Annotations for PVC
    annotations: {}

# ============================================================================
# 5. TLS CONFIGURATION
# ============================================================================

tls:
  # -- Enable TLS (set to false if terminating TLS at ingress/load balancer)
  enabled: false
  # -- TLS certificate source: auto, secret, or none
  certSource: none
  certManager:
    # -- Enable cert-manager for TLS certificates
    enabled: false
    # -- cert-manager issuer reference
    issuerRef: {}
      # name: letsencrypt-prod
      # kind: ClusterIssuer
    # -- Certificate duration
    duration: 2160h  # 90 days
    # -- Certificate renewal before expiry
    renewBefore: 360h  # 15 days

  # -- Custom TLS secrets (alternative to cert-manager)
  customSecrets:
    # -- TLS secret for core/portal
    core: ""
    # -- TLS secret for registry
    registry: ""

# ============================================================================
# 6. MONITORING
# ============================================================================

metrics:
  # -- Enable metrics endpoints on all components
  enabled: false
  # -- Enable Prometheus ServiceMonitor
  serviceMonitor:
    # -- Create ServiceMonitor resource
    enabled: false
    # -- ServiceMonitor namespace (defaults to release namespace)
    namespace: ""
    # -- Additional labels for ServiceMonitor
    labels: {}
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s
    # -- Honor labels
    honorLabels: true

# ============================================================================
# 7. ESCAPE HATCHES
# ============================================================================

# -- Extra static manifests to deploy
# These are merged with chart labels and deployed as-is
# @default -- []
extraManifests: []
  # - apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-custom-config
  #   data:
  #     key: value

# -- Extra templated manifests to deploy
# These can use .Values, .Release, and other template functions
# @default -- []
extraTemplateManifests: []
  # - |
  #     apiVersion: v1
  #     kind: ConfigMap
  #     metadata:
  #       name: {{ .Release.Name }}-custom
  #     data:
  #       externalURL: {{ .Values.externalURL }}


# ============================================================================
# 8. Tracing
# ============================================================================

trace:
  enabled: false
  # trace provider: jaeger or otel
  # jaeger should be 1.26+
  provider: jaeger
  # set sample_rate to 1 if you wanna sampling 100% of trace data; set 0.5 if you wanna sampling 50% of trace data, and so forth
  sample_rate: 1
  # namespace used to differentiate different harbor services
  # namespace:
  # attributes is a key value dict contains user defined attributes used to initialize trace provider
  # attributes:
  #   application: harbor
  jaeger:
    # jaeger supports two modes:
    #   collector mode(uncomment endpoint and uncomment username, password if needed)
    #   agent mode(uncomment agent_host and agent_port)
    endpoint: http://hostname:14268/api/traces
    # username:
    # password:
    # agent_host: hostname
    # export trace data by jaeger.thrift in compact mode
    # agent_port: 6831
  otel:
    endpoint: hostname:4318
    url_path: /v1/traces
    compression: false
    insecure: true
    # timeout is in seconds
    timeout: 10
