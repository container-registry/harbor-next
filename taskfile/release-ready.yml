version: '3'

vars:
  PATCHES_REPO: '{{.PATCHES_REPO | default "github.com/container-registry/8gcr"}}'
  PATCHES_SERIES: '{{.PATCHES_SERIES | default "8gcr-ee/patches/series"}}'
  RELEASE_READY_TMP_DIR: '{{.RELEASE_READY_TMP_DIR | default ".opencode/tmp/release-ready"}}'
  RELEASE_PATCHES_TMP_DIR: '{{.RELEASE_PATCHES_TMP_DIR | default ".opencode/tmp/release-patches"}}'

tasks:
  check:
    desc: "Verify commercial release patches apply cleanly"
    dir: ..
    preconditions:
      - sh: command -v git >/dev/null 2>&1
        msg: "git is required"
      - sh: command -v task >/dev/null 2>&1
        msg: "Task is required"
    cmds:
      - |
        repo_root=$(pwd -P)
        tmp_root="${repo_root}/{{.RELEASE_READY_TMP_DIR}}"
        worktree_dir="${tmp_root}/worktree"
        patches_repo_dir="${tmp_root}/patches-repo"
        branch_name="release-ready-check-${GITHUB_RUN_ID:-local-$$}"

        cleanup() {
          git -C "${repo_root}" worktree remove --force "${worktree_dir}" >/dev/null 2>&1 || true
          git -C "${repo_root}" branch -D "${branch_name}" >/dev/null 2>&1 || true
          rm -rf "${tmp_root}"
        }

        cleanup
        trap cleanup EXIT

        mkdir -p "${tmp_root}"
        git worktree add -b "${branch_name}" "${worktree_dir}" HEAD

        task --taskfile "${repo_root}/taskfile/release-ready.yml" apply-commercial-patches \
          RELEASE_PATCH_TARGET_DIR="${worktree_dir}" \
          PATCHES_REPO="{{.PATCHES_REPO}}" \
          PATCHES_SERIES="{{.PATCHES_SERIES}}" \
          RELEASE_PATCHES_TMP_DIR="${patches_repo_dir}"

        echo "Release-ready patch validation succeeded."

  apply-commercial-patches:
    desc: "Apply commercial release patches to the current worktree"
    dir: ..
    preconditions:
      - sh: command -v git >/dev/null 2>&1
        msg: "git is required"
      - sh: command -v stg >/dev/null 2>&1
        msg: "StGit is required. Install the stg command before applying release patches."
      - sh: test -z "$(git -C '{{.RELEASE_PATCH_TARGET_DIR | default "."}}' status --porcelain)"
        msg: "release patch application requires a clean worktree"
    cmds:
      - |
        patch_target_dir="{{.RELEASE_PATCH_TARGET_DIR | default "."}}"
        if [ "${patch_target_dir#/}" = "${patch_target_dir}" ]; then
          patch_target_dir="$(pwd -P)/${patch_target_dir}"
        fi

        patches_repo_dir="{{.RELEASE_PATCHES_TMP_DIR}}"
        if [ "${patches_repo_dir#/}" = "${patches_repo_dir}" ]; then
          patches_repo_dir="$(pwd -P)/${patches_repo_dir}"
        fi
        series_file="${patches_repo_dir}/{{.PATCHES_SERIES}}"
        series_dir="$(dirname "${series_file}")"
        base_commit=$(git -C "${patch_target_dir}" rev-parse HEAD)

        stg_in_target() {
          (cd "${patch_target_dir}" && stg "$@")
        }

        cleanup_patches_repo() {
          rm -rf "${patches_repo_dir}"
        }

        cleanup_patches_repo
        trap cleanup_patches_repo EXIT

        mkdir -p "$(dirname "${patches_repo_dir}")"

        if [ -n "${PATCHES_CLONE_URL:-}" ]; then
          git clone --depth=1 "${PATCHES_CLONE_URL}" "${patches_repo_dir}"
        else
          if [ -z "${PATCHES_TOKEN:-}" ]; then
            echo "PATCHES_TOKEN is required unless PATCHES_CLONE_URL is set." >&2
            exit 1
          fi
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@{{.PATCHES_REPO}}" \
            "${patches_repo_dir}"
        fi

        if [ ! -f "${series_file}" ]; then
          echo "Patch series file not found: ${series_file}" >&2
          exit 1
        fi

        current_branch=$(git -C "${patch_target_dir}" symbolic-ref --quiet --short HEAD || true)
        if [ -z "${current_branch}" ]; then
          current_branch="release-patches-${GITHUB_RUN_ID:-local-$$}"
          git -C "${patch_target_dir}" switch -c "${current_branch}"
        fi

        if ! stg_in_target series --short >/dev/null 2>&1; then
          stg_in_target init
        fi

        while IFS= read -r patch || [ -n "${patch}" ]; do
          patch=$(printf '%s' "${patch}" | sed 's/#.*//' | xargs)
          [ -z "${patch}" ] && continue

          patch_file="${series_dir}/${patch}"
          if [ ! -f "${patch_file}" ]; then
            echo "Patch file not found: ${patch_file}" >&2
            exit 1
          fi

          echo "Applying release patch: ${patch}"
          apply_output="${patches_repo_dir}/stg-import-output.log"
          if ! stg_in_target import "${patch_file}" >"${apply_output}" 2>&1; then
            branch=$(git -C "${patch_target_dir}" symbolic-ref --quiet --short HEAD || echo "detached")
            sha=$(git -C "${patch_target_dir}" rev-parse HEAD)
            {
              echo "::error::Failed to apply release patch: ${patch}"
              echo "Failed to apply release patch: ${patch}"
              echo "Branch: ${branch}"
              echo "Commit: ${sha}"
              echo "Patch file: ${patch_file}"
              echo "StGit output:"
              cat "${apply_output}"
            } >&2
            exit 1
          fi
          rm -f "${apply_output}"
        done < "${series_file}"

        echo "Applied release patches:"
        stg_in_target series --applied --description

        git -C "${patch_target_dir}" reset --mixed "${base_commit}" >/dev/null
