version: '3'

# Documentation generation tasks:
# - helm-docs: Generate chart README from values.yaml annotations
# - svgbob:    Update Kroki SVGBob diagram URLs in all markdown files
#
# SVGBob structure in .md files:
#   <!--
#   ```SVGBob
#   <ascii diagram>
#   ```
#   -->
#   ![alt](https://kroki.io/svgbob/svg/<encoded>)   <- auto-generated
#
# '-->' handling: ASCII sequence arrows ('+----->') contain '-->', which would
# close the surrounding HTML comment early on GitHub and leak the diagram. So
# the svgbob task rewrites every '-->' in the diagram body to '-–>' (an EN DASH,
# U+2013, in the middle). SVGBob renders '-–>' byte-identically to '-->' (the en
# dash is treated as a line segment), so the image is unchanged — but the literal
# '-->' is gone, so the comment stays closed and hidden. Author the diagram with
# normal '-->'; running this task escapes it for you.
#
# If the image link is missing, it will be added automatically.

vars:
  CHART_DIR: deploy/chart

tasks:
  default:
    desc: "Generate all docs (helm-docs + SVGBob diagrams)"
    cmds:
      - task: helm-docs
      - task: svgbob

  helm-docs:
    desc: "Generate chart README from values.yaml annotations"
    cmd: helm-docs --chart-search-root={{.CHART_DIR}}

  svgbob:
    desc: "Update Kroki SVGBob diagram URLs in all markdown files"
    aliases: [kroki]
    silent: true
    cmd: |
      python3 - <<'PYTHON'
      import re, zlib, base64, subprocess

      DASH = '-–>'   # hyphen + EN DASH + '>' — renders like '-->' but isn't a comment close

      def encode(diagram):
          return base64.urlsafe_b64encode(zlib.compress(diagram.encode(), 9)).decode()

      # Iterate every tracked *.md in the repo. `git ls-files` is anchored to the
      # repo root via -C, so it works from any cwd and stays within the current
      # worktree — skipping node_modules, vendored deps, and the nested git
      # worktrees under the gitignored .claude/. Files without a SVGBob block are
      # read but left untouched.
      root = subprocess.check_output(['git', 'rev-parse', '--show-toplevel'], text=True).strip()
      out = subprocess.check_output(['git', '-C', root, 'ls-files', '-z', '*.md'])
      files = [f for f in out.decode().split('\x00') if f]

      # 1=open  2=body (tempered, up to the closing ``` line)  3=close (```...-->)
      # 4=image-prefix  5=closing-paren
      pattern = (r'(<!--\s*```SVGBob\n)'
                 r'((?:(?!\n```).)*?)'
                 r'(\n```[^>]*?-->)'
                 r'(\s*!\[[^\]]*\]\(https://kroki\.io/svgbob/svg/)[A-Za-z0-9_=-]*(\))?')

      def replace_existing(m):
          body = m.group(2).replace('-->', DASH)      # escape arrows; renders identically
          return m.group(1) + body + m.group(3) + m.group(4) + encode(body) + (m.group(5) or ')')

      # Same, but for blocks without a following image link — add one.
      pattern_missing = r'(<!--\s*```SVGBob\n)((?:(?!\n```).)*?)(\n```[^>]*?-->)(?!\s*!\[)'

      def add_url(m):
          body = m.group(2).replace('-->', DASH)
          return m.group(1) + body + m.group(3) + f'\n![Diagram](https://kroki.io/svgbob/svg/{encode(body)})'

      for rel in files:
          path = f'{root}/{rel}'
          try:
              content = original = open(path, encoding='utf-8').read()
          except (UnicodeDecodeError, FileNotFoundError):
              continue
          content = re.sub(pattern, replace_existing, content, flags=re.DOTALL)
          content = re.sub(pattern_missing, add_url, content, flags=re.DOTALL)
          if content != original:
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"Updated: {path}")
      PYTHON
